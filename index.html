<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가온길 문학 스터디 허브</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Pretendard', 'Apple SD Gothic Neo', 'sans-serif'] } } }
    }
  </script>
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-down { animation: fadeInDown 0.4s ease-out forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-custom { animation: spin 1s linear infinite; }
    .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300 font-sans">

  <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <!-- 로딩 화면 -->
  <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center dark:bg-slate-900 dark:text-white z-50">
    <i data-lucide="loader-2" class="w-10 h-10 animate-spin-custom text-indigo-500 mb-4"></i>
    <p class="font-bold">데이터를 동기화하는 중입니다...</p>
  </div>

  <!-- 인증 화면 -->
  <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-4 dark:bg-slate-900">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl max-w-md w-full border border-slate-200 dark:border-slate-700 animate-fade-in-down">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-100 dark:bg-indigo-900/50 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i data-lucide="book-open" class="w-8 h-8 text-indigo-600 dark:text-indigo-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">가온길 스터디 허브</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400">스터디원 전용 공간에 오신 것을 환영합니다.</p>
      </div>
      <div class="flex bg-slate-100 dark:bg-slate-700 p-1 rounded-xl mb-6">
        <button id="tab-login" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-white dark:bg-slate-600 text-indigo-600 dark:text-indigo-400 shadow-sm" onclick="app.setAuthMode('login')">로그인</button>
        <button id="tab-signup" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200" onclick="app.setAuthMode('signup')">스터디원 가입</button>
      </div>
      <form id="auth-form" class="space-y-4">
        <div id="auth-error" class="hidden p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm font-bold rounded-xl text-center"></div>
        <div>
          <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1 ml-1">아이디</label>
          <input required type="text" id="auth-id" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1 ml-1">비밀번호</label>
          <input required type="password" id="auth-pw" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div id="auth-name-container" class="hidden">
          <label class="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1 ml-1">사용할 이름 (스터디용)</label>
          <input type="text" id="auth-name" placeholder="예: 김국어, 이교육" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" id="auth-submit-btn" class="w-full py-3.5 mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors flex items-center justify-center disabled:opacity-70">
          <i data-lucide="log-in" class="w-5 h-5 mr-2" id="auth-submit-icon"></i> <span id="auth-submit-text">로그인</span>
        </button>
      </form>
    </div>
  </div>

  <!-- 대시보드 화면 -->
  <div id="dashboard-screen" class="hidden min-h-screen pb-20 dark:bg-slate-900 dark:text-slate-200">
    <nav class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 sticky top-0 z-40">
      <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center space-x-2">
          <i data-lucide="book-open" class="w-6 h-6 text-indigo-600 dark:text-indigo-400"></i>
          <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white hidden sm:block">가온길 문학 스터디</span>
        </div>
        <div class="flex items-center space-x-3 sm:space-x-6">
          <button onclick="app.openProfileModal()" class="flex items-center space-x-2 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1.5 rounded-full text-sm font-medium hover:bg-indigo-100 transition-colors group border border-indigo-100 dark:border-indigo-800">
            <span id="nav-username" class="text-indigo-600 dark:text-indigo-400 font-bold"></span>
            <i data-lucide="settings" class="w-4 h-4 text-indigo-400 group-hover:text-indigo-600"></i>
          </button>
          <button onclick="app.logout()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 transition-colors" title="로그아웃"><i data-lucide="log-out" class="w-5 h-5"></i></button>
          <button onclick="app.toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 transition-all"><i data-lucide="moon" id="dark-mode-icon" class="w-5 h-5"></i></button>
        </div>
      </div>
    </nav>

    <!-- 프로필 설정 모달 -->
    <div id="profile-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay hidden">
      <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700 animate-fade-in-down">
        <div class="p-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
          <h2 class="text-lg font-bold flex items-center"><i data-lucide="user-cog" class="w-5 h-5 mr-2 text-indigo-500"></i> 정보 수정</h2>
          <button onclick="app.closeProfileModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="p-5 space-y-4">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">이름 변경</label>
            <input type="text" id="edit-profile-name" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-sm outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">비밀번호 변경</label>
            <input type="password" id="edit-profile-pw" placeholder="변경할 경우에만 입력" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-sm outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white">
          </div>
          <button onclick="app.updateProfile()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm transition-colors">저장하기</button>
          
          <div class="pt-5 border-t border-slate-100 dark:border-slate-700 mt-2">
            <button onclick="app.withdrawAccount()" class="w-full py-2.5 border border-red-200 text-red-500 hover:bg-red-50 font-bold rounded-xl text-sm transition-colors dark:border-red-900/50 dark:hover:bg-red-900/20">스터디 탈퇴 (데이터 삭제)</button>
          </div>
        </div>
      </div>
    </div>

    <header class="bg-indigo-600 dark:bg-indigo-900 text-white py-10 px-4 relative overflow-hidden">
      <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] dark:opacity-5"></div>
      <div class="max-w-6xl mx-auto relative z-10 flex flex-col md:flex-row items-center justify-between">
        <div>
          <div class="inline-flex items-center space-x-2 bg-indigo-500/50 dark:bg-indigo-800/50 px-3 py-1 rounded-full text-sm font-medium mb-4">
            <i data-lucide="target" class="w-4 h-4"></i><span>정확한 키워드, 치밀한 작품 분석.</span>
          </div>
          <h1 class="text-3xl md:text-4xl font-bold mb-2">가온길 스터디 허브</h1>
        </div>
        <div class="mt-6 md:mt-0 bg-white/10 backdrop-blur-md border border-white/20 p-5 rounded-2xl text-center min-w-[180px] shadow-lg">
          <p class="text-indigo-100 text-sm font-medium mb-1">내년 중등임용 1차 D-Day</p>
          <div class="text-4xl font-extrabold tracking-tight" id="d-day-display">D-0</div>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 space-y-6">
      
      <!-- 상단: 일정 & 개인별 투두 -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1">
          <div id="schedule-container" class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 h-full flex flex-col"></div>
        </div>
        <div class="lg:col-span-2 bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
          <div id="todos-container"></div>
        </div>
      </div>
      
      <!-- 중앙: 고전시가 라운지 & 벌금 관리 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl p-8 shadow-lg text-center transform transition duration-300 hover:-translate-y-1 hover:shadow-xl flex flex-col justify-center h-full text-white">
          <h2 class="text-2xl font-bold mb-6 flex items-center justify-center">
            <i data-lucide="book-open" class="w-6 h-6 mr-2 text-indigo-200"></i> 고전시가
          </h2>
          <a href="./01/index.html" class="inline-flex items-center justify-center px-8 py-3.5 bg-white text-indigo-700 font-black rounded-xl shadow-sm hover:bg-slate-50 transition-colors w-max mx-auto">
            라운지 입장하기 <i data-lucide="arrow-right" class="w-5 h-5 ml-2"></i>
          </a>
        </div>
        <div id="fines-container" class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700"></div>
      </div>

      <!-- 하단: 룰 & 공유 드라이브 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-12">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
          <h2 class="text-lg font-bold flex items-center mb-4 text-rose-600 dark:text-rose-400"><i data-lucide="alert-circle" class="w-5 h-5 mr-2"></i> 스터디 벌금 규칙</h2>
          <ul class="space-y-3">
            <li class="flex justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg"><span class="text-sm font-medium text-slate-700 dark:text-slate-300">발제문 지각 (전날 24시)</span><span class="text-sm font-bold text-rose-500">2,000원</span></li>
            <li class="flex justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg"><span class="text-sm font-medium text-slate-700 dark:text-slate-300">스터디 지각 (10분 당)</span><span class="text-sm font-bold text-rose-500">1,000원</span></li>
            <li class="flex justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg"><span class="text-sm font-medium text-slate-700 dark:text-slate-300">과제 미수행</span><span class="text-sm font-bold text-rose-500">5,000원</span></li>
          </ul>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700 h-full flex flex-col">
          <h2 class="text-lg font-bold flex items-center mb-4 text-blue-600 dark:text-blue-400"><i data-lucide="folder-open" class="w-5 h-5 mr-2"></i> 공유 드라이브</h2>
          <div class="mb-4">
            <input type="file" id="drive-upload" class="hidden" onchange="app.handleDriveUpload(this)" />
            <label for="drive-upload" class="cursor-pointer w-full py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:hover:bg-blue-900/50 dark:text-blue-400 text-sm font-bold rounded-xl transition-colors flex items-center justify-center border border-blue-200 dark:border-blue-800/50 shadow-sm">
              <i data-lucide="upload" class="w-4 h-4 mr-2"></i> 파일 업로드 (최대 2MB)
            </label>
          </div>
          <div id="drive-files-container" class="flex-1 overflow-y-auto space-y-2 pr-1 max-h-[250px]"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDocs, collection, onSnapshot, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Global State
    const state = {
      isDarkMode: false, user: null, appAccount: null, allMembers: [],
      scheduleData: { events: [
        { id: 1, day: '수요일', time: '20:00', title: '고전시가 & 현대시 발제 (Zoom)' },
        { id: 2, day: '토요일', time: '10:00', title: '문학 기출 분석 (대면)' }
      ]},
      isEditingSchedule: false, editScheduleForm: [],
      todos: {}, activeTodoTab: '', isAddingTodo: false, newTodo: { category: '공통', desc: '' },
      finesData: { records: [] }, isAddingFine: false, newFine: { memberName: '', reason: '지각', amount: 1000 },
      driveFiles: [], authMode: 'login'
    };

    const els = {
      loading: document.getElementById('loading-screen'), auth: document.getElementById('auth-screen'),
      dashboard: document.getElementById('dashboard-screen'), authNameContainer: document.getElementById('auth-name-container'),
      authName: document.getElementById('auth-name'), authId: document.getElementById('auth-id'),
      authPw: document.getElementById('auth-pw'), authSubmitText: document.getElementById('auth-submit-text'),
      authSubmitIcon: document.getElementById('auth-submit-icon'), tabLogin: document.getElementById('tab-login'),
      tabSignup: document.getElementById('tab-signup'), dDayDisplay: document.getElementById('d-day-display'),
      navUsername: document.getElementById('nav-username'), scheduleContainer: document.getElementById('schedule-container'),
      todosContainer: document.getElementById('todos-container'), finesContainer: document.getElementById('fines-container'),
      driveContainer: document.getElementById('drive-files-container'), toast: document.getElementById('toast-container'),
      profileModal: document.getElementById('profile-modal'), editProfileName: document.getElementById('edit-profile-name'),
      editProfilePw: document.getElementById('edit-profile-pw')
    };

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `p-3 rounded-xl shadow-lg border text-sm font-bold animate-fade-in-down flex items-center ${type === 'error' ? 'bg-red-50 border-red-200 text-red-600' : type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-indigo-50 border-indigo-200 text-indigo-600'}`;
      toast.textContent = message; els.toast.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA", authDomain: "study-99725.firebaseapp.com",
      projectId: "study-99725", storageBucket: "study-99725.firebasestorage.app", messagingSenderId: "850626154259", appId: "1:850626154259:web:c3307473b7fbb09d9554e6"
    };
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-study-app';
    let firebaseApp, auth, db;
    try { firebaseApp = initializeApp(firebaseConfig); auth = getAuth(firebaseApp); db = getFirestore(firebaseApp); } catch(e) { console.warn("Firebase Init Waiting..."); }

    async function init() {
      const examDate = new Date('2027-11-20T00:00:00');
      const diffDays = Math.ceil(Math.abs(examDate - new Date()) / (1000 * 60 * 60 * 24));
      els.dDayDisplay.textContent = `D-${diffDays}`;

      state.isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', state.isDarkMode); updateDarkModeIcon();

      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
        else await signInAnonymously(auth);
      } catch (error) { showToast("인증 오류. 익명 로그인을 확인하세요.", "error"); }

      onAuthStateChanged(auth, (user) => {
        state.user = user;
        if (user) setupListeners(user.uid);
        else updateView();
      });
    }

    function setupListeners(uid) {
      onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), (snap) => {
        if (snap.exists() && snap.data().appAccountId) { state.appAccount = snap.data(); if(!state.activeTodoTab) state.activeTodoTab = state.appAccount.name; } 
        else { state.appAccount = null; } updateView();
      });
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'members'), (snap) => {
        state.allMembers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if(state.appAccount && !state.activeTodoTab) state.activeTodoTab = state.appAccount.name;
        renderTodos(); renderFines();
      });
      onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'sharedDrive'), (snap) => {
        state.driveFiles = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp); renderDriveFiles();
      });
      onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule'), (snap) => {
        if (snap.exists() && snap.data().events) state.scheduleData = snap.data(); renderSchedule();
      });
      onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'todos'), (snap) => { if (snap.exists()) state.todos = snap.data(); renderTodos(); });
      onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'fines'), (snap) => { if (snap.exists()) state.finesData = snap.data(); renderFines(); });
    }

    function updateView() {
      els.loading.classList.add('hidden');
      if (state.user && !state.appAccount) { els.auth.classList.remove('hidden'); els.dashboard.classList.add('hidden'); } 
      else if (state.user && state.appAccount) {
        els.auth.classList.add('hidden'); els.dashboard.classList.remove('hidden'); els.navUsername.textContent = state.appAccount.name;
        renderSchedule(); renderTodos(); renderFines(); renderDriveFiles(); lucide.createIcons();
      }
    }

    window.app = {
      toggleDarkMode: () => { state.isDarkMode = !state.isDarkMode; document.documentElement.classList.toggle('dark', state.isDarkMode); updateDarkModeIcon(); },
      setAuthMode: (mode) => {
        state.authMode = mode; const isLogin = mode === 'login';
        els.tabLogin.className = isLogin ? "flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-slate-600 text-indigo-600 dark:text-indigo-400 shadow-sm" : "flex-1 py-2 text-sm font-bold text-slate-500 hover:text-slate-700";
        els.tabSignup.className = !isLogin ? "flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-slate-600 text-indigo-600 dark:text-indigo-400 shadow-sm" : "flex-1 py-2 text-sm font-bold text-slate-500 hover:text-slate-700";
        els.authNameContainer.classList.toggle('hidden', isLogin); els.authSubmitText.textContent = isLogin ? '로그인' : '가입하고 시작하기'; els.authSubmitIcon.setAttribute('data-lucide', isLogin ? 'log-in' : 'user-plus'); lucide.createIcons();
      },
      logout: async () => { await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data'), { appAccountId: null, name: null }); state.appAccount = null; updateView(); },
      
      // Profile Methods
      openProfileModal: () => { els.editProfileName.value = state.appAccount.name; els.editProfilePw.value = ''; els.profileModal.classList.remove('hidden'); lucide.createIcons(); },
      closeProfileModal: () => { els.profileModal.classList.add('hidden'); },
      updateProfile: async () => {
        const newName = els.editProfileName.value.trim(), newPw = els.editProfilePw.value.trim();
        if(!newName) return showToast('이름을 입력해주세요.', 'error');
        try {
          const updateData = { name: newName }; if(newPw) updateData.password = newPw;
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', state.appAccount.appAccountId), updateData);
          await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data'), { name: newName });
          showToast('정보가 수정되었습니다.', 'success'); app.closeProfileModal();
        } catch(e) { showToast('수정 실패', 'error'); }
      },
      withdrawAccount: async () => {
        if(!confirm('정말 탈퇴하시겠습니까? 데이터가 모두 삭제됩니다.')) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', state.appAccount.appAccountId));
          await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data'));
          showToast('탈퇴가 완료되었습니다.', 'success'); state.appAccount = null; app.closeProfileModal(); updateView();
        } catch(e) { showToast('탈퇴 실패', 'error'); }
      },

      // Drive Methods
      handleDriveUpload: (input) => {
        const file = input.files[0]; if(!file) return;
        if(file.size > 1024 * 1024 * 2) return showToast('2MB 이하만 가능합니다.', 'error');
        showToast('업로드 중...', 'info'); const reader = new FileReader();
        reader.onloadend = async () => {
          try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sharedDrive'), {
              fileName: file.name, fileType: file.type || 'application/octet-stream', base64: reader.result.split(',')[1], size: file.size,
              uploadedBy: state.appAccount?.name || '익명', date: new Date().toLocaleDateString('ko-KR'), timestamp: Date.now()
            }); showToast('업로드 완료!', 'success');
          } catch(e) { showToast('업로드 실패', 'error'); } finally { input.value = ''; }
        }; reader.readAsDataURL(file);
      },
      downloadDriveFile: (id) => {
        const file = state.driveFiles.find(f => f.id === id); if(!file) return;
        const link = document.createElement('a'); link.href = `data:${file.fileType};base64,${file.base64}`; link.download = file.fileName;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      },
      deleteDriveFile: async (id) => { if(confirm('삭제하시겠습니까?')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sharedDrive', id)); },

      // Schedule Methods
      toggleEditSchedule: () => { state.isEditingSchedule = !state.isEditingSchedule; if(state.isEditingSchedule) state.editScheduleForm = JSON.parse(JSON.stringify(state.scheduleData.events || [])); renderSchedule(); },
      addScheduleEvent: () => { state.editScheduleForm.push({ id: Date.now(), day: '', time: '', title: '' }); renderSchedule(); },
      removeScheduleEvent: (idx) => { state.editScheduleForm.splice(idx, 1); renderSchedule(); },
      updateScheduleField: (idx, field, val) => { state.editScheduleForm[idx][field] = val; },
      saveSchedule: async () => { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule'), { events: state.editScheduleForm }); state.isEditingSchedule = false; showToast('저장되었습니다.', 'success'); },

      // Todo Methods
      setActiveTodoTab: (name) => { state.activeTodoTab = name; state.isAddingTodo = false; renderTodos(); },
      toggleTodoTask: async (taskId) => {
        if(state.activeTodoTab !== state.appAccount.name) return;
        const updated = state.todos[state.activeTodoTab].map(t => t.id === taskId ? { ...t, done: !t.done } : t);
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'todos'), { ...state.todos, [state.activeTodoTab]: updated });
      },
      deleteTodoTask: async (taskId, event) => {
        event.stopPropagation(); if(state.activeTodoTab !== state.appAccount.name) return;
        const updated = state.todos[state.activeTodoTab].filter(t => t.id !== taskId);
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'todos'), { ...state.todos, [state.activeTodoTab]: updated });
      },
      setAddingTodo: (val) => { state.isAddingTodo = val; if(val) state.newTodo = { desc: '' }; renderTodos(); },
      updateNewTodoDesc: (val) => { state.newTodo.desc = val; },
      submitNewTodo: async (e) => {
        e.preventDefault(); if(!state.newTodo.desc.trim()) return;
        const tasks = state.todos[state.activeTodoTab] || [];
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'todos'), { ...state.todos, [state.activeTodoTab]: [...tasks, { id: Date.now(), ...state.newTodo, done: false }] });
        state.isAddingTodo = false;
      },

      // Fines Methods
      toggleAddingFine: () => { state.isAddingFine = !state.isAddingFine; if(state.isAddingFine) state.newFine = { memberName: '', reason: '', amount: 1000 }; renderFines(); },
      updateFineField: (field, val) => { state.newFine[field] = val; },
      submitFine: async (e) => {
        e.preventDefault(); if(!state.newFine.memberName) return;
        const records = state.finesData.records || [];
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'fines'), { records: [{ id: Date.now(), ...state.newFine, amount: Number(state.newFine.amount), date: new Date().toLocaleDateString('ko-KR'), isPaid: false }, ...records] });
        state.isAddingFine = false; showToast('추가되었습니다.', 'success');
      },
      toggleFinePaid: async (id) => { const updated = state.finesData.records.map(r => r.id === id ? { ...r, isPaid: !r.isPaid } : r); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'fines'), { records: updated }); },
      deleteFine: async (id) => { const updated = state.finesData.records.filter(r => r.id !== id); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'fines'), { records: updated }); }
    };

    function updateDarkModeIcon() { const icon = document.getElementById('dark-mode-icon'); if(icon) { icon.setAttribute('data-lucide', state.isDarkMode ? 'sun' : 'moon'); lucide.createIcons(); } }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = els.authId.value.trim(), pw = els.authPw.value.trim(), name = els.authName.value.trim();
      const btn = document.getElementById('auth-submit-btn'); btn.disabled = true;
      try {
        const snapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'members'));
        const members = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        if (state.authMode === 'signup') {
          if (members.some(m => m.id === id)) throw new Error('이미 사용 중인 아이디입니다.');
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id), { password: pw, name: name });
          await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data'), { appAccountId: id, name: name });
          state.appAccount = { appAccountId: id, name: name }; updateView();
        } else {
          const member = members.find(m => m.id === id && m.password === pw);
          if (member) {
            await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data'), { appAccountId: member.id, name: member.name });
            state.appAccount = { appAccountId: member.id, name: member.name }; updateView();
          } else { throw new Error('아이디/비번 불일치'); }
        }
      } catch(err) { document.getElementById('auth-error').textContent = err.message; document.getElementById('auth-error').classList.remove('hidden'); }
      finally { btn.disabled = false; }
    });

    // Render functions
    function renderDriveFiles() {
      if(!els.driveContainer) return;
      if(state.driveFiles.length === 0) { els.driveContainer.innerHTML = `<div class="py-8 text-slate-400 text-center text-sm">파일이 없습니다.</div>`; return; }
      els.driveContainer.innerHTML = state.driveFiles.map(f => `
        <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/30 rounded-xl border border-slate-200 dark:border-slate-700 group">
          <div class="flex items-center overflow-hidden mr-2">
            <i data-lucide="file" class="w-5 h-5 text-blue-500 mr-3 flex-shrink-0"></i>
            <div class="overflow-hidden"><p class="text-sm font-bold text-slate-800 dark:text-slate-200 truncate cursor-pointer hover:underline" onclick="app.downloadDriveFile('${f.id}')">${f.fileName}</p><p class="text-[10px] text-slate-400">${f.uploadedBy} · ${f.date}</p></div>
          </div>
          <div class="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="app.downloadDriveFile('${f.id}')" class="p-1.5 text-blue-500"><i data-lucide="download" class="w-4 h-4"></i></button>
            <button onclick="app.deleteDriveFile('${f.id}')" class="p-1.5 text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
        </div>`).join(''); lucide.createIcons();
    }

    function renderSchedule() {
      let html = `<div class="flex items-center justify-between mb-6"><h2 class="text-lg font-bold flex items-center"><i data-lucide="calendar" class="w-5 h-5 mr-2 text-indigo-500"></i> 일정</h2>
        <button onclick="app.toggleEditSchedule()" class="text-slate-400 text-sm"><i data-lucide="${state.isEditingSchedule?'save':'edit-2'}" class="w-4 h-4" onclick="${state.isEditingSchedule?'app.saveSchedule()':''}"></i></button></div><div class="space-y-3">`;
      if(state.isEditingSchedule) {
        state.editScheduleForm.forEach((ev, idx) => {
          html += `<div class="flex items-center space-x-2 bg-slate-50 dark:bg-slate-700/50 p-2 rounded-lg">
            <input value="${ev.day}" placeholder="요일" onchange="app.updateScheduleField(${idx},'day',this.value)" class="w-16 text-xs p-1.5 rounded border dark:bg-slate-600 dark:text-white dark:border-slate-500" />
            <input value="${ev.title}" placeholder="내용" onchange="app.updateScheduleField(${idx},'title',this.value)" class="flex-1 text-xs p-1.5 rounded border dark:bg-slate-600 dark:text-white dark:border-slate-500" />
            <button onclick="app.removeScheduleEvent(${idx})" class="text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button>
          </div>`;
        });
        html += `<button onclick="app.addScheduleEvent()" class="w-full py-2 bg-slate-100 dark:bg-slate-700 rounded-lg text-xs font-bold">+ 추가</button>`;
      } else {
        (state.scheduleData.events || []).forEach(ev => { html += `<div class="flex items-center p-3 bg-indigo-50 dark:bg-indigo-900/20 rounded-xl"><div class="mr-4 font-bold text-indigo-600 text-sm w-10 text-center">${ev.day}</div><div><div class="text-sm font-bold text-slate-800 dark:text-slate-200">${ev.title}</div><div class="text-xs text-slate-500">${ev.time}</div></div></div>`; });
      }
      els.scheduleContainer.innerHTML = html + '</div>'; lucide.createIcons();
    }

    function renderTodos() {
      if(!state.appAccount) return;
      const members = state.allMembers.length > 0 ? state.allMembers.map(m=>m.name) : [state.appAccount.name];
      let html = `<div class="flex space-x-2 overflow-x-auto hide-scrollbar mb-4">`;
      members.forEach(name => { html += `<button onclick="app.setActiveTodoTab('${name}')" class="px-3 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap ${state.activeTodoTab === name ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 dark:bg-slate-700'}">${name}</button>`; });
      html += `</div><div class="space-y-2 max-h-[200px] overflow-y-auto pr-1">`;
      const tasks = state.todos[state.activeTodoTab] || [];
      tasks.forEach(t => {
        html += `<div onclick="app.toggleTodoTask(${t.id})" class="flex items-center justify-between p-3 bg-white dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600 cursor-pointer hover:border-indigo-300 transition-colors ${t.done?'opacity-50':''}">
          <span class="text-sm dark:text-slate-200 ${t.done?'line-through text-slate-400':''}">${t.desc}</span>
          ${state.activeTodoTab === state.appAccount.name ? `<button onclick="app.deleteTodoTask(${t.id}, event)" class="p-1 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
        </div>`;
      });
      if(state.activeTodoTab === state.appAccount.name) {
        if(state.isAddingTodo) html += `<form onsubmit="app.submitNewTodo(event)" class="mt-2"><input onchange="app.updateNewTodoDesc(this.value)" class="w-full p-3 border dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="할 일을 입력하고 Enter를 누르세요..." autofocus /></form>`;
        else html += `<button onclick="app.setAddingTodo(true)" class="w-full mt-2 py-2 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl text-slate-400 text-xs font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">+ 할 일 추가</button>`;
      }
      els.todosContainer.innerHTML = html + '</div>'; lucide.createIcons();
    }

    function renderFines() {
      const records = state.finesData.records || [];
      const unpaid = {}; state.allMembers.forEach(m => unpaid[m.name] = 0);
      records.forEach(r => { if(!r.isPaid) unpaid[r.memberName] = (unpaid[r.memberName]||0) + Number(r.amount); });
      let html = `<div class="flex justify-between items-center mb-5"><h2 class="text-lg font-bold flex items-center"><i data-lucide="wallet" class="w-5 h-5 mr-2 text-rose-500"></i> 벌금 현황</h2><button onclick="app.toggleAddingFine()" class="text-xs bg-rose-50 text-rose-600 font-bold px-3 py-1.5 rounded-lg dark:bg-rose-900/30 dark:text-rose-400">+ 추가</button></div>`;
      html += `<div class="flex flex-wrap gap-2 mb-5">`;
      state.allMembers.forEach(m => { html += `<div class="text-xs font-bold bg-slate-50 dark:bg-slate-700 border dark:border-slate-600 p-2 rounded-lg flex items-center">${m.name}: <span class="ml-1 ${unpaid[m.name]>0?'text-rose-500':'text-slate-400'}">${unpaid[m.name].toLocaleString()}원</span></div>`; });
      html += `</div>`;
      
      if(state.isAddingFine) {
        let opts = `<option value="" disabled selected>대상자 선택</option>`; state.allMembers.forEach(m => opts+=`<option value="${m.name}">${m.name}</option>`);
        html += `<form onsubmit="app.submitFine(event)" class="mb-4 p-3 bg-rose-50 dark:bg-rose-900/20 rounded-xl flex flex-col gap-2">
          <select required onchange="app.updateFineField('memberName', this.value)" class="p-2 rounded border text-sm dark:bg-slate-700 dark:border-slate-600 dark:text-white">${opts}</select>
          <div class="flex gap-2">
            <input required type="text" placeholder="사유" onchange="app.updateFineField('reason', this.value)" class="flex-1 p-2 rounded border text-sm dark:bg-slate-700 dark:border-slate-600 dark:text-white" />
            <input required type="number" value="1000" onchange="app.updateFineField('amount', this.value)" class="w-24 p-2 rounded border text-sm dark:bg-slate-700 dark:border-slate-600 dark:text-white" />
          </div>
          <button type="submit" class="w-full py-2 bg-rose-500 text-white rounded text-sm font-bold">등록</button>
        </form>`;
      }

      html += `<div class="space-y-2 max-h-[160px] overflow-y-auto pr-1">`;
      if(records.length===0) html += `<div class="text-center text-slate-400 text-sm py-4">벌금 내역이 없습니다.</div>`;
      records.forEach(r => {
        html += `<div class="flex items-center justify-between p-3 bg-white dark:bg-slate-700/50 rounded-xl border border-slate-100 dark:border-slate-700 text-sm">
          <div class="flex items-center overflow-hidden">
            <input type="checkbox" ${r.isPaid?'checked':''} onchange="app.toggleFinePaid(${r.id})" class="mr-3 w-4 h-4 cursor-pointer accent-rose-500" /> 
            <span class="truncate dark:text-slate-200 ${r.isPaid?'line-through text-slate-400 dark:text-slate-500':''}"><span class="font-bold mr-1">${r.memberName}</span>${r.reason} <span class="text-rose-500 font-bold ml-1">${Number(r.amount).toLocaleString()}원</span></span>
          </div>
          <button onclick="app.deleteFine(${r.id})" class="text-slate-300 hover:text-red-500 ml-2 flex-shrink-0"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>`;
      });
      els.finesContainer.innerHTML = html + '</div>'; lucide.createIcons();
    }

    init();
  </script>
</body>
</html>
