                        <input type="text" id="essay-work-name" placeholder="현재 풀고 있는 작품명을 입력하세요." class="w-full px-3 py-2.5 rounded-lg border border-purple-200 dark:border-purple-800/50 bg-purple-50/30 dark:bg-purple-950/30 text-xs font-bold outline-none focus:ring-2 focus:ring-purple-500/20 dark:text-white transition-all">

                    <button onclick="window.StudyApp.submitEssay()" id="submit-essay-btn" class="w-full py-3.5 bg-purple-600 hover:bg-purple-700 text-white font-black text-xs rounded-xl shadow-md transition-all active:scale-95 flex items-center justify-center">

                <!-- 커뮤니티 -->

                    <div class="bg-brand-50/50 dark:bg-brand-900/10 p-4 rounded-xl border border-brand-100 dark:border-brand-800/50 shrink-0 shadow-sm">
                        <h3 class="text-[11px] font-black text-brand-700 dark:text-brand-400 mb-1 uppercase tracking-widest flex items-center">
                            <i data-lucide="users" class="w-4 h-4 mr-1.5"></i> Shared Community
                        </h3>
                        <p class="text-[9px] text-brand-600/70 dark:text-brand-400/70 leading-relaxed">스터디원들의 답안을 확인하고 비교해보세요. (답안 제출 후에만 열람 가능합니다)</p>
                    </div>

                        <select id="comm-work-filter" onchange="window.StudyApp.renderCommunityRecords()" class="flex-1 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-[11px] font-black text-slate-700 dark:text-slate-300 outline-none rounded-lg p-2.5 shadow-sm uppercase truncate transition-all">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const GITHUB_CONFIG = { username: "kimjs2623", repo: "for-study", branch: "main", folder: "01/pdf" };
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA", projectId: "study-99725", appId: "1:850626154259:web:c3307473b7fbb09d9554e6"
    };
    
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-study-app';
    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);

    const state = {
      user: null, allFiles: [], filteredFiles: [], problemPdfBlob: null, 
      isFetching: false, mode: 'omr', weeks: [], allSubmissions: [], editingDocId: null, pdfDoc: null, pageNum: 1, pdfScale: 1.2, userZoomed: false
    };

    window.StudyApp = {
      showToast: (msg, type='info') => {
        const toast = document.createElement('div');
        toast.className = `p-4 rounded-xl shadow-2xl border text-[10px] font-black transition-all duration-300 z-[1000000] pointer-events-auto ${type==='error'?'bg-red-50 text-red-600 border-red-200':'bg-brand-50 text-brand-600 border-brand-200'}`;
        toast.textContent = msg;
        const container = document.getElementById('toast-container');
        if (container) {
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }
      },

      initUI: () => {
        const omrGrid = document.getElementById('omr-grid-container');
        if(omrGrid) {
            let html = '';
            for(let i=1; i<=10; i++) html += `<div class="space-y-1 text-center"><label class="text-[9px] font-black text-slate-400 uppercase">${i}</label><input type="text" id="omr-${i}" class="w-full p-2 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold text-center outline-none focus:ring-2 focus:ring-emerald-500/20 dark:text-white uppercase shadow-sm transition-colors"></div>`;
            omrGrid.innerHTML = html;
        }
        const essayGrid = document.getElementById('essay-grid-container');
        if(essayGrid) {
            let html = '';
            for(let i=1; i<=2; i++) html += `<div class="shadow-sm rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800"><div class="flex items-center justify-between bg-slate-50 dark:bg-slate-900/50 p-2.5 border-b border-slate-200 dark:border-slate-800"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Question 0${i}</span><input type="text" id="essay-num-${i}" placeholder="번호" class="w-14 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 text-[10px] text-center dark:text-white outline-none rounded shadow-sm py-1 transition-colors"></div><textarea id="essay-ans-${i}" placeholder="서술형 답안을 작성하세요..." class="w-full h-32 p-4 bg-white dark:bg-slate-950 text-xs resize-none outline-none focus:ring-2 focus:ring-purple-500/20 dark:text-white custom-scrollbar border-none transition-colors"></textarea></div>`;
            essayGrid.innerHTML = html;
        }
        if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      setMode: (mode) => {
        state.mode = mode;
        ['omr', 'essay', 'community'].forEach(m => {
            const el = document.getElementById(`view-${m}`);
            if(el) el.classList.toggle('hidden', m !== mode);
            const tab = document.getElementById(`tab-${m}`);
            if(tab) {
                if(m === mode) { tab.classList.add('tab-active'); tab.classList.remove('text-slate-500'); }
                else { tab.classList.remove('tab-active'); tab.classList.add('text-slate-500'); }
            }
        });
        
        // 커뮤니티 탭 진입 시에만 주차 필터 숨기기 해제 (수정 모드일 때는 보임)
        const bar = document.getElementById('week-selector-bar');
        if(bar) {
            if(mode === 'community' || state.editingDocId) bar.classList.remove('hidden');
            else bar.classList.add('hidden');
        }

        // 수정 모드가 아닌데 다른 탭으로 이동하면 수정 모드 초기화
        if (mode !== 'omr' && mode !== 'essay') {
            state.editingDocId = null;
            document.getElementById('editing-badge')?.classList.add('hidden');
            const omrBtn = document.getElementById('submit-omr-btn');
            if(omrBtn) omrBtn.innerHTML = '<i data-lucide="send" class="w-4 h-4 mr-2"></i> 정답 제출 및 공유하기';
            const essayBtn = document.getElementById('submit-essay-btn');
            if(essayBtn) essayBtn.innerHTML = '<i data-lucide="send" class="w-4 h-4 mr-2"></i> 서술형 제출 및 공유하기';
        }

        if(mode === 'community') window.StudyApp.renderCommunityRecords();
        if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      toggleDarkMode: () => {
        const isDark = document.documentElement.classList.toggle('dark');
        const icon = document.getElementById('dark-mode-icon');
        if (icon) icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      refreshFiles: () => scanGitHub(),
      filterFiles: () => {
        const searchEl = document.getElementById('file-search');
        if(!searchEl) return;
        const q = searchEl.value.toLowerCase();
        state.filteredFiles = state.allFiles.filter(f => f.name.toLowerCase().includes(q));
        renderFileList();
      },

      toggleFullScreen: () => {
        const viewer = document.getElementById('viewer-container');
        const fabBtn = document.getElementById('exit-fullscreen-fab');
        if (viewer) {
            const isFull = viewer.classList.toggle('viewer-fullscreen');
            document.body.style.overflow = isFull ? 'hidden' : '';
            if (fabBtn) fabBtn.classList.toggle('hidden', !isFull);
            if(state.pdfDoc) window.StudyApp.renderPage(state.pageNum);
        }
      },

      loadMaterial: async (name, url) => {
        if (state.isFetching) return;
        state.isFetching = true;
        const filenameDisplay = document.getElementById('viewer-filename');
        if (filenameDisplay) filenameDisplay.textContent = name;
        const placeholder = document.getElementById('viewer-placeholder');
        if (placeholder) placeholder.classList.add('hidden');
        
        document.querySelectorAll('.file-btn').forEach(b => b.classList.remove('border-brand-500', 'bg-brand-50/30'));
        const activeBtn = document.getElementById(`btn-${name.replace(/\s+/g, '')}`);
        if(activeBtn) activeBtn.classList.add('border-brand-500', 'bg-brand-50/30');
        
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          state.problemPdfBlob = blob;
          await window.StudyApp.renderPDF(blob);
          window.StudyApp.showToast(`${name} 문서 로드 완료`);
        } catch (e) { 
            window.StudyApp.showToast("PDF 로드 실패", "error"); 
            if (filenameDisplay) filenameDisplay.textContent = "Load Error";
        } finally { state.isFetching = false; }
      },

      renderPDF: async (blob) => {
        try {
            const arrayBuffer = await blob.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
            state.pdfDoc = await loadingTask.promise;
            
            const countEl = document.getElementById('page_count');
            if (countEl) countEl.textContent = state.pdfDoc.numPages;
            
            const controls = document.getElementById('pdf-controls');
            if (controls) { controls.classList.remove('hidden'); controls.classList.add('flex'); }
            
            const container = document.getElementById('pdf-canvas-container');
            if (container) container.classList.remove('hidden');
            
            state.pageNum = 1;
            state.userZoomed = false;
            window.StudyApp.renderPage(state.pageNum);
        } catch (error) { window.StudyApp.showToast("PDF 렌더링 오류", "error"); }
      },

      renderPage: (num) => {
        if(!state.pdfDoc) return;
        state.pdfDoc.getPage(num).then((page) => {
          const canvas = document.getElementById('pdf-canvas');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          let finalScale = state.pdfScale;
          const container = document.getElementById('pdf-canvas-container');
          
          if(!state.userZoomed && container) {
              const containerWidth = container.clientWidth;
              finalScale = (containerWidth - 30) / page.getViewport({scale: 1}).width;
              state.pdfScale = finalScale;
          }
          
          const viewport = page.getViewport({scale: finalScale});
          canvas.height = viewport.height; 
          canvas.width = viewport.width;
          
          page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
            canvas.classList.remove('hidden');
          });
        });
        
        const numEl = document.getElementById('page_num');
        if (numEl) numEl.textContent = num;
      },

      prevPage: () => { if (state.pageNum > 1) { state.pageNum--; window.StudyApp.renderPage(state.pageNum); } },
      nextPage: () => { if (state.pageNum < state.pdfDoc.numPages) { state.pageNum++; window.StudyApp.renderPage(state.pageNum); } },
      zoomIn: () => { state.userZoomed = true; state.pdfScale += 0.25; window.StudyApp.renderPage(state.pageNum); },
      zoomOut: () => { if (state.pdfScale > 0.5) { state.userZoomed = true; state.pdfScale -= 0.25; window.StudyApp.renderPage(state.pageNum); } },

      updateWeekDropdowns: () => {
          ['week-select', 'comm-week-filter'].forEach(id => {
              const el = document.getElementById(id);
              if(!el) return;
              const prev = el.value;
              el.innerHTML = state.weeks.map(w => `<option value="${w}">${w}</option>`).join('');
              if(state.weeks.includes(prev)) el.value = prev;
          });
          window.StudyApp.updateCommunityWorks();
      },

      updateCommunityWorks: () => {
          const filterEl = document.getElementById('comm-week-filter');
          const workSelect = document.getElementById('comm-work-filter');
          if(!filterEl || !workSelect) return;
          
          const w = filterEl.value;
          const works = [...new Set(state.allSubmissions.filter(x => x.week === w && !x.isDeleted).map(x => x.workName))];
          workSelect.innerHTML = works.length ? `<option value="">작품 선택</option>` + works.map(w => `<option value="${w}">${w}</option>`).join('') : `<option value="">기록 없음</option>`;
          window.StudyApp.renderCommunityRecords();
      },

      // 🌟 데이터 제출 및 수정 (통합 로직)
      submitOMR: async () => {
        const weekEl = document.getElementById('week-select');
        const workEl = document.getElementById('omr-work-name');
        if (!weekEl || !workEl) return;
        const week = weekEl.value;
        const workName = workEl.value.trim();
        if(!workName) return window.StudyApp.showToast("작품명을 입력하세요.", "error");
        
        const ans = [];
        for(let i=1; i<=10; i++) {
            const vEl = document.getElementById(`omr-${i}`);
            const v = vEl ? vEl.value.trim() : "";
            if(v) ans.push(`Q${i}: ${v}`);
        }
        if(!ans.length) return window.StudyApp.showToast("최소 1개의 답안을 입력하세요.", "error");

        const btn = document.getElementById('submit-omr-btn');
        btn.disabled = true;
        window.StudyApp.showToast(state.editingDocId ? "수정하는 중..." : "답안을 공유하는 중...");
        
        try {
            const userName = await getUserName();
            const recordData = { week, workName, type: "OMR", userAnswers: ans, userId: state.user.uid, userName: userName, isDeleted: false };
            
            if (state.editingDocId) {
                recordData.isEdited = true;
                recordData.editedAt = Date.now();
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', state.editingDocId), recordData);
                window.StudyApp.showToast("답안이 수정되었습니다.", "success");
            } else {
                recordData.timestamp = Date.now();
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), recordData);
                window.StudyApp.showToast("공유 완료!", "success");
            }
            
            // 초기화 후 이동
            state.editingDocId = null;
            document.getElementById('editing-badge')?.classList.add('hidden');
            btn.innerHTML = '<i data-lucide="send" class="w-4 h-4 mr-2"></i> 정답 제출 및 공유하기';
            window.StudyApp.setMode('community');
        } catch (e) {
            window.StudyApp.showToast("저장 실패", "error");
        } finally {
            btn.disabled = false;
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }
      },

      submitEssay: async () => {
        const weekEl = document.getElementById('week-select');
        const workEl = document.getElementById('essay-work-name');
        if (!weekEl || !workEl) return;
        const week = weekEl.value;
        const workName = workEl.value.trim();
        if(!workName) return window.StudyApp.showToast("작품명을 입력하세요.", "error");
        
        const ess = [];
        for(let i=1; i<=2; i++) {
            const nEl = document.getElementById(`essay-num-${i}`);
            const aEl = document.getElementById(`essay-ans-${i}`);
            const n = nEl ? nEl.value.trim() : "";
            const a = aEl ? aEl.value.trim() : "";
            if(a) ess.push(`[${n || i}번 문항] ${a}`);
        }
        if(!ess.length) return window.StudyApp.showToast("답안을 입력하세요.", "error");

        const btn = document.getElementById('submit-essay-btn');
        btn.disabled = true;
        window.StudyApp.showToast(state.editingDocId ? "수정하는 중..." : "답안을 공유하는 중...");
        
        try {
            const userName = await getUserName();
            const recordData = { week, workName, type: "Essay", userAnswers: ess, userId: state.user.uid, userName: userName, isDeleted: false };
            
            if (state.editingDocId) {
                recordData.isEdited = true;
                recordData.editedAt = Date.now();
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', state.editingDocId), recordData);
                window.StudyApp.showToast("답안이 수정되었습니다.", "success");
            } else {
                recordData.timestamp = Date.now();
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), recordData);
                window.StudyApp.showToast("공유 완료!", "success");
            }

            // 초기화 후 이동
            state.editingDocId = null;
            document.getElementById('editing-badge')?.classList.add('hidden');
            btn.innerHTML = '<i data-lucide="send" class="w-4 h-4 mr-2"></i> 서술형 제출 및 공유하기';
            window.StudyApp.setMode('community');
        } catch (e) {
            window.StudyApp.showToast("저장 실패", "error");
        } finally {
            btn.disabled = false;
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }
      },

      // 🌟 답안 수정 및 삭제 함수 추가
      editSubmission: (docId, type) => {
          const record = state.allSubmissions.find(s => s.id === docId);
          if(!record || record.isDeleted) return;
          
          state.editingDocId = docId;
          document.getElementById('editing-badge')?.classList.remove('hidden');
          document.getElementById('week-selector-bar')?.classList.remove('hidden');
          
          if(type === 'OMR') {
              window.StudyApp.setMode('omr');
              document.getElementById('week-select').value = record.week;
              document.getElementById('omr-work-name').value = record.workName;
              for(let i=1; i<=10; i++) document.getElementById(`omr-${i}`).value = ''; 
              
              record.userAnswers.forEach(ans => {
                  const match = ans.match(/Q(\d+):\s*(.*)/);
                  if(match) {
                      const input = document.getElementById(`omr-${match[1]}`);
                      if(input) input.value = match[2];
                  }
              });
              document.getElementById('submit-omr-btn').innerHTML = '<i data-lucide="edit-3" class="w-4 h-4 mr-2"></i> 수정된 답안 다시 제출하기';
              window.StudyApp.showToast("수정 모드: 답안을 수정한 뒤 하단 버튼을 클릭하세요.");
          } else if (type === 'Essay') {
              window.StudyApp.setMode('essay');
              document.getElementById('week-select').value = record.week;
              document.getElementById('essay-work-name').value = record.workName;
              for(let i=1; i<=2; i++) {
                  document.getElementById(`essay-num-${i}`).value = '';
                  document.getElementById(`essay-ans-${i}`).value = '';
              }
              
              record.userAnswers.forEach((ans, idx) => {
                  const match = ans.match(/\[(.*?)번 문항\]\s*(.*)/); // 형식 통일
                  if(match && idx < 2) {
                      document.getElementById(`essay-num-${idx+1}`).value = match[1];
                      document.getElementById(`essay-ans-${idx+1}`).value = match[2];
                  }
              });
              document.getElementById('submit-essay-btn').innerHTML = '<i data-lucide="edit-3" class="w-4 h-4 mr-2"></i> 수정된 서술형 다시 제출하기';
              window.StudyApp.showToast("수정 모드: 답안을 수정한 뒤 하단 버튼을 클릭하세요.");
          }
          if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      deleteSubmission: (docId) => {
          const modal = document.getElementById('delete-modal');
          const confirmBtn = document.getElementById('confirm-delete-btn');
          if(!modal || !confirmBtn) return;
          
          modal.classList.remove('hidden');
          confirmBtn.onclick = async () => {
              modal.classList.add('hidden');
              try {
                  const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', docId);
                  await updateDoc(docRef, { isDeleted: true, deletedAt: Date.now(), userAnswers: [] });
                  window.StudyApp.showToast("삭제되었습니다.", "success");
              } catch(e) {
                  window.StudyApp.showToast("삭제 실패", "error");
              }
          };
      },

      renderCommunityRecords: () => {
          const container = document.getElementById('community-container');
          const wFilterEl = document.getElementById('comm-week-filter');
          const workFilterEl = document.getElementById('comm-work-filter');
          if(!container || !wFilterEl || !workFilterEl) return;
          
          const wFilter = wFilterEl.value;
          const workFilter = workFilterEl.value;
          if(!wFilter || !workFilter) return;
          
          const workSubs = state.allSubmissions.filter(s => s.week === wFilter && s.workName === workFilter);
          const hasSubmitted = workSubs.some(s => s.userId === state.user.uid && !s.isDeleted);
          
          if(!hasSubmitted) {
              container.innerHTML = `
                <div class="py-16 flex flex-col items-center justify-center text-center border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-2xl mx-2 bg-slate-50 dark:bg-slate-900/50">
                    <div class="w-12 h-12 bg-slate-200 dark:bg-slate-800 rounded-full flex items-center justify-center mb-3">
                        <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <p class="text-[11px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-300">Access Locked</p>
                    <p class="text-[9px] text-slate-400 mt-1">정답을 먼저 제출해야 다른 사람의 답안을 볼 수 있습니다.</p>
                </div>`;
              if(typeof lucide !== 'undefined') lucide.createIcons(); return;
          }
          
          if(workSubs.length === 0) {
              container.innerHTML = `<div class="text-center py-16 text-[10px] text-slate-400 font-bold uppercase tracking-widest">제출된 기록이 없습니다.</div>`;
              return;
          }

          container.innerHTML = workSubs.map((r, i) => {
              const isMine = r.userId === state.user.uid;
              const isDeleted = r.isDeleted;
              const isEdited = r.isEdited && !isDeleted;
              
              // 🌟 본인 답안인 경우 수정/삭제 버튼 노출
              let actionBtns = '';
              if(isMine && !isDeleted) {
                  actionBtns = `
                    <div class="flex items-center space-x-2 ml-auto mr-3">
                        <button onclick="window.StudyApp.editSubmission('${r.id}', '${r.type}'); event.stopPropagation();" class="text-[9px] font-black text-brand-500 hover:text-brand-700 bg-brand-50 dark:bg-brand-900/30 px-2.5 py-1 rounded transition-colors flex items-center"><i data-lucide="edit" class="w-3 h-3 mr-1"></i>수정</button>
                        <button onclick="window.StudyApp.deleteSubmission('${r.id}'); event.stopPropagation();" class="text-[9px] font-black text-red-500 hover:text-red-700 bg-red-50 dark:bg-red-900/30 px-2.5 py-1 rounded transition-colors flex items-center"><i data-lucide="trash-2" class="w-3 h-3 mr-1"></i>삭제</button>
                    </div>
                  `;
              }

              return `
              <div class="bg-white dark:bg-slate-900 border ${isMine ? 'border-brand-400 shadow-sm' : 'border-slate-200 dark:border-slate-800'} ${isDeleted ? 'opacity-50' : ''} rounded-xl overflow-hidden mb-2 transition-all">
                  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-3.5 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors flex items-center justify-between">
                      <div class="flex items-center space-x-2">
                          <span class="text-[11px] font-black ${isMine ? 'text-brand-600 dark:text-brand-400' : 'text-slate-700 dark:text-slate-300'}">
                              ${isMine ? '🌟 나의 답안' : r.userName}
                              ${isEdited ? '<span class="text-amber-500 text-[8px] font-bold ml-1 tracking-tighter">[수정됨]</span>' : ''}
                              ${isDeleted ? '<span class="text-red-500 text-[8px] font-bold ml-1 tracking-tighter">[삭제됨]</span>' : ''}
                          </span>
                          <span class="text-[9px] font-bold text-slate-400 border border-slate-200 dark:border-slate-700 px-1.5 py-0.5 rounded uppercase">${r.type}</span>
                      </div>
                      ${actionBtns}
                      <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                  </div>
                  <div class="hidden border-t border-slate-100 dark:border-slate-800 p-4 bg-slate-50/50 dark:bg-slate-950/50">
                      ${!isDeleted ? `
                      <div class="text-[11px] font-bold text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed pl-2 border-l-2 border-brand-200 dark:border-brand-800">${r.userAnswers.join('\n')}</div>
                      ` : `
                      <div class="text-[10px] font-bold text-red-400 flex items-center"><i data-lucide="alert-circle" class="w-3.5 h-3.5 mr-1"></i> 작성자에 의해 삭제된 기록입니다.</div>
                      `}
                  </div>
              </div>
          `}).join('');
          if(typeof lucide !== 'undefined') lucide.createIcons();
      }
    };

    /* ==========================================
       3. 서버 통신 (GitHub & Firestore)
       ========================================== */
    async function scanGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf'));
            state.filteredFiles = [...state.allFiles];
            renderFileList();
        } catch (e) {
            const list = document.getElementById('material-list');
            if (list) list.innerHTML = `<p class="text-[10px] text-red-500 p-10 text-center font-bold">GITHUB SYNC ERROR</p>`;
        }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        if (!container) return;
        if (state.filteredFiles.length === 0) {
            container.innerHTML = `<p class="text-center text-[10px] text-slate-400 py-10 font-black uppercase">No Files Found</p>`;
            return;
        }
        container.innerHTML = state.filteredFiles.map(file => `
            <button onclick="window.StudyApp.loadMaterial('${file.name}', '${file.download_url}')" 
                id="btn-${file.name.replace(/\s+/g, '')}"
                class="file-btn w-full flex items-center p-2.5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-brand-500 transition-all text-left group">
                <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2 text-slate-300 group-hover:text-brand-500 shrink-0"></i>
                <div class="flex-1 truncate font-bold text-[10px] uppercase tracking-tighter">${file.name}</div>
            </button>
        `).join('');
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    function fetchStudySchedule() {
        const scheduleRef = doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule');
        onSnapshot(scheduleRef, (docSnap) => {
            let dbWeeks = [];
            if(docSnap.exists()) {
                const data = docSnap.data();
                dbWeeks = (data.weeks || []).map(w => {
                    const val = (typeof w === 'object' && w !== null) ? (w.weekNum || w.week) : w;
                    const str = String(val).trim();
                    return str.includes('주차') ? str : str + '주차';
                });
            }
            const existingWeeks = state.allSubmissions.map(s => String(s.week));
            state.weeks = [...new Set([...dbWeeks, ...existingWeeks])].filter(w => w && w !== 'undefined');
            if(state.weeks.length === 0) state.weeks = ['1주차'];
            state.weeks.sort((a, b) => (parseInt(a) || 0) - (parseInt(b) || 0));
            window.StudyApp.updateWeekDropdowns();
        }, (err) => console.error("Schedule Error", err));
    }

    function fetchPublicSubmissions() {
        const submissionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        onSnapshot(query(submissionsRef), (snapshot) => {
            const subs = [];
            snapshot.forEach(doc => subs.push({ id: doc.id, ...doc.data() }));
            subs.sort((a, b) => b.timestamp - a.timestamp);
            state.allSubmissions = subs;
            window.StudyApp.updateCommunityWorks();
            if(state.mode === 'community') window.StudyApp.renderCommunityRecords();
        });
    }

    /* ==========================================
       4. 앱 실행 (Life Cycle)
       ========================================== */
    const initializeAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            state.user = user;
            window.StudyApp.initUI(); 
            scanGitHub();
            fetchStudySchedule();
            fetchPublicSubmissions();
        } else {
            initializeAuth();
        }
    });

  </script>
