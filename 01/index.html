<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 문학 튜터 - 가온길 스터디</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Pretendard', 'Apple SD Gothic Neo', 'sans-serif'] } } }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-custom { animation: spin 1s linear infinite; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300 font-sans dark:bg-slate-900 dark:text-slate-200 min-h-screen pb-20">

  <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

  <nav class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-6">
        <a href="../index.html" class="flex items-center text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300 font-bold text-sm transition-colors">
          <i data-lucide="home" class="w-5 h-5 mr-1.5"></i> Home
        </a>
        <div class="h-4 w-px bg-slate-300 dark:bg-slate-600"></div>
        <span class="flex items-center text-slate-500 dark:text-slate-400 font-medium text-sm">
          <i data-lucide="book-open" class="w-5 h-5 mr-1"></i> 문학 스터디
        </span>
      </div>
      <div class="flex items-center space-x-3">
        <div class="hidden sm:flex items-center space-x-2 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1.5 rounded-full text-sm font-medium border border-indigo-100 dark:border-indigo-800/50">
          <i data-lucide="sparkles" class="w-4 h-4 text-indigo-500"></i>
          <span class="text-indigo-600 dark:text-indigo-400 font-bold">고전시가</span>
        </div>
        <button onclick="app.toggleDarkMode()" class="p-2 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
          <i data-lucide="moon" id="dark-mode-icon" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">
    
    <!-- GitHub 자료 연동 섹션 -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-700">
      <div class="flex flex-col items-center text-center mb-6">
        <h2 class="text-lg font-bold flex items-center mb-2 text-slate-900 dark:text-white">
          <i data-lucide="github" class="w-5 h-5 mr-2 text-slate-700 dark:text-slate-300"></i> GitHub 교재 연동 (최대 20MB)
        </h2>
        <p class="text-sm text-slate-500 dark:text-slate-400">GitHub에 올린 PDF의 'Raw' 주소를 입력하면 AI가 내용을 학습합니다.</p>
      </div>
      
      <div class="flex flex-col md:flex-row gap-3 max-w-2xl mx-auto">
        <input type="text" id="github-url-input" placeholder="https://raw.githubusercontent.com/.../book.pdf" 
          class="flex-1 px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 dark:text-white">
        <button id="load-url-btn" onclick="app.loadFromUrl()" class="px-6 py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl transition-colors flex items-center justify-center">
          <i data-lucide="download" class="w-4 h-4 mr-2"></i> 파일 불러오기
        </button>
      </div>

      <div id="file-status-area" class="mt-6 flex justify-center fade-in hidden">
        <!-- 파일 로드 상태 표시 영역 -->
      </div>
    </div>

    <!-- AI 튜터링 섹션 -->
    <div class="bg-gradient-to-br from-indigo-50 to-purple-50 dark:from-indigo-900/20 dark:to-purple-900/20 rounded-2xl p-6 md:p-8 shadow-sm border border-indigo-100 dark:border-indigo-800/30">
      <h2 class="text-xl font-bold flex items-center text-indigo-900 dark:text-indigo-200 mb-6">
        <i data-lucide="message-square" class="w-6 h-6 mr-2 text-indigo-500"></i> 서술형 답안 채점 & 개념 질문
      </h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-indigo-800 dark:text-indigo-300 mb-1.5 ml-1">분석 타겟 (작품명 등)</label>
          <input type="text" id="ai-tutor-target" placeholder="예: 상춘곡, 1930년대 시" class="w-full px-4 py-3.5 rounded-xl border border-indigo-200 dark:border-indigo-700 bg-white dark:bg-slate-800 text-sm outline-none transition-shadow focus:ring-2 focus:ring-indigo-500/20 dark:text-white">
        </div>
        
        <div>
          <label class="block text-sm font-bold text-indigo-800 dark:text-indigo-300 mb-1.5 ml-1">질문 또는 작성한 답안</label>
          <textarea id="ai-tutor-prompt" placeholder="작성하신 서술형 답안을 입력하고 '채점해줘'라고 하거나, 모르는 개념을 물어보세요." class="w-full min-h-[180px] p-4 rounded-xl border border-indigo-200 dark:border-indigo-700 bg-white dark:bg-slate-800 text-sm resize-none outline-none transition-shadow focus:ring-2 focus:ring-indigo-500/20 dark:text-white"></textarea>
        </div>
      </div>

      <button id="ai-tutor-btn" onclick="app.askAITutor()" class="w-full mt-6 py-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-bold text-lg rounded-xl flex items-center justify-center transition-colors shadow-md">
        <i data-lucide="sparkles" id="ai-tutor-icon" class="w-5 h-5 mr-2"></i> <span id="ai-tutor-text">AI 분석 시작</span>
      </button>
      
      <div id="ai-tutor-response" class="hidden mt-6 p-6 bg-white dark:bg-slate-800 rounded-xl border border-indigo-100 shadow-inner text-sm leading-relaxed dark:border-indigo-800/50"></div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // Firebase (인증용으로만 유지)
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA",
        projectId: "study-99725",
        appId: "1:850626154259:web:c3307473b7fbb09d9554e6"
    };

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const apiKey = ""; // Gemini API 키는 환경에서 자동 제공됨

    const state = {
      isDarkMode: false,
      centralMaterial: null, // AI에게 보낼 Base64 데이터
      fileName: ""
    };

    function showToast(msg, type='info') {
      const toast = document.createElement('div');
      toast.className = `p-3 rounded-xl shadow-lg border text-sm font-bold transition-all duration-300 transform translate-y-0 opacity-100 ${type==='error'?'bg-red-50 text-red-600 border-red-200':type==='success'?'bg-emerald-50 text-emerald-600 border-emerald-200':'bg-indigo-50 text-indigo-600 border-indigo-200'}`;
      toast.textContent = msg;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => { 
        toast.style.opacity = '0'; 
        toast.style.transform = 'translateY(-10px)';
        setTimeout(()=>toast.remove(), 300); 
      }, 3000);
    }

    async function fetchWithRetry(url, parts, systemText) {
      const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = { contents: [{ parts }], systemInstruction: { parts: [{ text: systemText }] } };
      
      const delays = [1000, 2000, 4000, 8000];
      for (let i = 0; i < delays.length + 1; i++) {
        try {
          const res = await fetch(geminiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 생성할 수 없습니다.";
        } catch (error) {
          if (i === delays.length) throw error;
          await new Promise(r => setTimeout(r, delays[i]));
        }
      }
    }

    signInAnonymously(auth).then(() => {
      onAuthStateChanged(auth, (user) => {
        if (user) console.log("AI Tutor Ready");
        lucide.createIcons();
      });
    });

    window.app = {
      toggleDarkMode: () => {
        state.isDarkMode = !state.isDarkMode;
        document.documentElement.classList.toggle('dark', state.isDarkMode);
        document.getElementById('dark-mode-icon').setAttribute('data-lucide', state.isDarkMode ? 'sun' : 'moon');
        lucide.createIcons();
      },

      loadFromUrl: async () => {
        const urlInput = document.getElementById('github-url-input');
        const url = urlInput.value.trim();
        if (!url) return showToast("URL을 입력해주세요.", "error");

        const btn = document.getElementById('load-url-btn');
        const statusArea = document.getElementById('file-status-area');
        
        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin-custom"></i> 파일 받는 중...';
        lucide.createIcons();

        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error("파일을 불러올 수 없습니다. URL을 확인해주세요.");
          
          const blob = await response.blob();
          if (blob.size > 20 * 1024 * 1024) throw new Error("파일 용량이 20MB를 초과합니다.");

          const reader = new FileReader();
          reader.onloadend = () => {
            state.centralMaterial = reader.result.split(',')[1];
            state.fileName = url.split('/').pop().split('?')[0];
            
            statusArea.classList.remove('hidden');
            statusArea.innerHTML = `
              <div class="flex items-center p-3 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 rounded-xl text-emerald-700 dark:text-emerald-300 font-bold text-sm">
                <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> ${state.fileName} 연결됨 (AI 분석 준비 완료)
              </div>
            `;
            showToast("파일이 성공적으로 로드되었습니다.", "success");
            lucide.createIcons();
          };
          reader.readAsDataURL(blob);
        } catch (err) {
          showToast(err.message, "error");
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="download" class="w-4 h-4 mr-2"></i> 파일 불러오기';
          lucide.createIcons();
        }
      },

      askAITutor: async () => {
        const target = document.getElementById('ai-tutor-target').value;
        const prompt = document.getElementById('ai-tutor-prompt').value;
        if (!prompt.trim()) return showToast("질문을 입력해주세요.", "error");

        const btn = document.getElementById('ai-tutor-btn');
        const icon = document.getElementById('ai-tutor-icon');
        const respDiv = document.getElementById('ai-tutor-response');

        btn.disabled = true;
        icon.setAttribute('data-lucide', 'loader-2');
        icon.classList.add('animate-spin-custom');
        document.getElementById('ai-tutor-text').textContent = '답안 분석 중...';
        respDiv.classList.add('hidden');
        lucide.createIcons();

        const parts = [{ text: `[분석 대상: ${target || '자료 전체'}]\n질문: ${prompt}` }];
        if (state.centralMaterial) {
          parts.push({ inlineData: { mimeType: "application/pdf", data: state.centralMaterial } });
        }

        try {
          const systemMsg = "당신은 임용고시 전공국어 문학 강사입니다. 핵심 키워드가 포함되었는지 채점하고, 부족한 개념을 명쾌하게 해설해주세요. 첨부된 파일이 있다면 그 내용을 바탕으로 답변하세요.";
          const resultText = await fetchWithRetry(parts, systemMsg);
          respDiv.innerHTML = resultText.replace(/\n/g, "<br>");
          respDiv.classList.remove('hidden');
        } catch (e) {
          showToast("AI 통신 오류", "error");
        } finally {
          btn.disabled = false;
          icon.setAttribute('data-lucide', 'sparkles');
          icon.classList.remove('animate-spin-custom');
          document.getElementById('ai-tutor-text').textContent = 'AI 분석 시작';
          lucide.createIcons();
        }
      }
    };
  </script>
</body>
</html>
