<!DOCTYPE html>
<html lang="ko">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { 
        extend: { 
          fontFamily: { sans: ['Pretendard', 'Apple SD Gothic Neo', 'sans-serif'] },

        } 
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-custom { animation: spin 1s linear infinite; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 900 !important; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    .viewer-fullscreen {
        position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
        width: 100vw !important; height: 100dvh !important;
        z-index: 99990 !important; border-radius: 0 !important; margin: 0 !important;
        display: flex !important; flex-direction: column !important;
    }
    
    .fab-button {
        position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
        z-index: 999999 !important; box-shadow: 0 10px 30px -5px rgba(79, 70, 229, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.3); transition: all 0.2s;
    }
    .fab-button:active { transform: translateX(-50%) scale(0.95); }
    canvas { background-color: white; border-radius: 4px; }

</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300 font-sans dark:bg-slate-950 dark:text-slate-200 lg:overflow-hidden flex flex-col lg:h-screen">

  <div id="toast-container" class="fixed top-6 right-6 z-[100000] flex flex-col gap-3"></div>

  <!-- 전체화면 축소 버튼 -->
  <button id="exit-fullscreen-fab" onclick="app.toggleFullScreen()" class="hidden fab-button bg-brand-600 hover:bg-brand-700 text-white px-8 py-4 rounded-full font-black text-sm items-center">
      <i data-lucide="minimize-2" class="w-5 h-5 mr-2"></i> 원래 화면으로 돌아가기
  </button>

  <nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 h-16 shrink-0 z-50 sticky top-0 lg:relative">
    <div class="max-w-[1800px] mx-auto px-4 sm:px-6 h-full flex items-center justify-between">
      <div class="flex items-center space-x-4 sm:space-x-6 h-full">
        <a href="../index.html" class="flex items-center text-brand-600 hover:text-brand-700 dark:text-brand-400 font-black text-lg tracking-tight shrink-0">
          <i data-lucide="home" class="w-5 h-5 mr-1 sm:mr-2"></i> <span class="hidden sm:inline">Home</span>
        </a>
        <div class="h-5 w-px bg-slate-200 dark:bg-slate-800 shrink-0"></div>
        <div class="flex space-x-1 sm:space-x-2 h-full items-center overflow-x-auto no-scrollbar flex-nowrap">
            <button onclick="app.setMode('tutor')" id="tab-tutor" class="tab-active text-[10px] sm:text-xs px-2 sm:px-4 py-5 rounded-lg uppercase tracking-widest text-slate-500 whitespace-nowrap shrink-0">AI Tutor</button>
            <button onclick="app.setMode('omr')" id="tab-omr" class="text-[10px] sm:text-xs px-2 sm:px-4 py-5 rounded-lg uppercase tracking-widest text-slate-500 whitespace-nowrap shrink-0">OMR Score</button>
            <button onclick="app.setMode('essay')" id="tab-essay" class="text-[10px] sm:text-xs px-2 sm:px-4 py-5 rounded-lg uppercase tracking-widest text-slate-500 whitespace-nowrap shrink-0">Essay</button>
            <button onclick="app.setMode('community')" id="tab-community" class="text-[10px] sm:text-xs px-2 sm:px-4 py-5 rounded-lg uppercase tracking-widest text-brand-500 whitespace-nowrap shrink-0 flex items-center">

        <button onclick="app.toggleDarkMode()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">

  <main class="max-w-[1800px] mx-auto px-2 sm:px-4 py-4 flex flex-col lg:flex-row gap-4 flex-1 w-full lg:min-h-0">
    
    <!-- PDF 라이브러리 목록 -->
    <aside class="w-full lg:w-[260px] flex flex-col shrink-0 h-[250px] lg:h-full z-10">
      <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 flex flex-col h-full overflow-hidden shadow-sm">
        <div class="p-3.5 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-xs font-black flex items-center text-slate-900 dark:text-white uppercase tracking-tighter">
              <i data-lucide="library" class="w-3.5 h-3.5 mr-1.5 text-brand-500"></i> Library
            </h2>
            <button onclick="app.refreshFiles()" class="p-1 text-slate-400 hover:text-brand-500 transition-colors">
              <i data-lucide="refresh-cw" class="w-3 h-3" id="refresh-icon"></i>
            </button>
          </div>
          <div class="relative">
            <input type="text" id="file-search" oninput="app.filterFiles()" placeholder="문제지 검색..." 
              class="w-full pl-7 pr-3 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white transition-all shadow-sm">
            <i data-lucide="search" class="w-3 h-3 absolute left-2.5 top-2.5 text-slate-400"></i>
          </div>
        </div>
        <div id="material-list" class="flex-1 overflow-y-auto p-2 space-y-1.5 custom-scrollbar bg-slate-50/30 dark:bg-slate-950/30">
            <div class="flex flex-col items-center justify-center py-10 text-slate-300">
                <i data-lucide="loader-2" class="w-5 h-5 animate-spin mb-2"></i>
                <p class="text-[9px] font-black uppercase tracking-widest">Scanning Files...</p>
            </div>
        </div>
      </div>
    </aside>

    <!-- 중앙 PDF 뷰어 영역 -->
    <section class="flex-1 min-w-0 flex flex-col h-[400px] lg:h-full relative z-40">
        <div id="viewer-container" class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col h-full shadow-sm transition-all duration-300 relative bg-slate-100 dark:bg-slate-950">
            <div class="bg-slate-50 dark:bg-slate-950 px-4 py-2 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between shrink-0 z-50 shadow-sm">
                <div class="flex items-center space-x-2 overflow-hidden">
                    <i data-lucide="file-text" class="w-4 h-4 text-brand-500 shrink-0"></i>
                    <span id="viewer-filename" class="text-[10px] font-black text-slate-500 uppercase italic truncate">No File Selected</span>
                </div>
                <button onclick="app.toggleFullScreen()" id="header-fullscreen-btn" class="px-2.5 py-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand-500 hover:text-brand-600 dark:hover:text-brand-400 text-slate-600 dark:text-slate-300 text-[10px] font-black rounded-lg uppercase tracking-tighter transition-all flex items-center shadow-sm active:scale-95">
                    <i data-lucide="maximize" class="w-3.5 h-3.5 sm:mr-1.5"></i> <span class="hidden sm:inline">크게 보기</span>
                </button>
            </div>

            <div id="pdf-controls" class="hidden bg-white/95 dark:bg-slate-900/95 backdrop-blur border-b border-slate-200 dark:border-slate-800 p-2 flex items-center justify-center space-x-4 z-50 shrink-0">
                <div class="flex items-center space-x-2">
                    <button onclick="app.prevPage()" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    <span class="text-[11px] font-black w-14 text-center"><span id="page_num">1</span> / <span id="page_count">-</span></span>
                    <button onclick="app.nextPage()" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                </div>
                <div class="w-px h-4 bg-slate-200 dark:bg-slate-700"></div>
                <div class="flex items-center space-x-2">
                    <button onclick="app.zoomOut()" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                    <button onclick="app.zoomIn()" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
                </div>
            </div>
            
            <div class="flex-1 flex justify-center relative overflow-hidden bg-slate-200 dark:bg-slate-950">
                <div id="pdf-canvas-container" class="hidden w-full h-full overflow-auto custom-scrollbar relative p-2 sm:p-4">
                    <div class="flex justify-center min-h-full items-center">
                        <canvas id="pdf-canvas" class="shadow-2xl"></canvas>
                    </div>
                </div>

                <div id="viewer-placeholder" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <div class="w-12 h-12 bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i data-lucide="book-open" class="w-6 h-6 text-slate-300 dark:text-slate-500"></i>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Select a document from Library</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 오른쪽 AI 작업 패널 -->
    <section class="w-full lg:w-[480px] shrink-0 flex flex-col h-auto min-h-[600px] lg:h-full z-10">
        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col h-full shadow-lg">
            
            <div id="week-selector-bar" class="bg-brand-50/80 dark:bg-brand-900/20 px-5 py-3 border-b border-brand-100 dark:border-brand-800 flex items-center justify-between shrink-0 hidden">
                <div class="flex items-center space-x-2 flex-1">
                    <i data-lucide="calendar" class="w-4 h-4 text-brand-600 dark:text-brand-400"></i>
                    <select id="week-select" onchange="app.updateCommunityWorks()" class="bg-transparent text-[11px] font-black text-brand-700 dark:text-brand-300 outline-none cursor-pointer uppercase max-w-[250px] truncate">
                        <option value="">불러오는 중...</option>
                    </select>
                </div>
                <div id="editing-badge" class="hidden ml-2 px-2 py-0.5 bg-amber-100 text-amber-700 border border-amber-200 text-[9px] font-black rounded uppercase">수정 모드</div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-5 space-y-6 relative">
                
                <!-- 1. AI 튜터 뷰 -->
                <div id="view-tutor" class="space-y-4 fade-in">
                    <div class="flex items-center justify-between pb-2 border-b border-slate-100 dark:border-slate-800">
                        <h3 class="text-[11px] font-black text-slate-900 dark:text-white uppercase tracking-widest">AI Tutoring</h3>
                    </div>
                    <div>
                        <input type="text" id="ai-tutor-target" placeholder="작품명 (예: 상춘곡)" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-xs outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white font-bold mb-3 shadow-sm">
                        <textarea id="ai-tutor-prompt" placeholder="PDF 속 내용을 질문하거나 채점을 요청하세요." class="w-full h-40 p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-xs leading-relaxed resize-none outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white custom-scrollbar shadow-sm"></textarea>
                    </div>
                    <button id="ai-tutor-btn" onclick="app.askAITutor()" class="w-full py-3.5 bg-brand-600 hover:bg-brand-700 disabled:bg-slate-200 text-white font-black text-xs rounded-xl transition-all shadow-md active:scale-95">
                        <i data-lucide="sparkles" id="ai-tutor-icon" class="w-3.5 h-3.5 mr-1.5 inline"></i> 즉시 분석 시작
                    </button>
                </div>

                <!-- 2. OMR 뷰 -->
                <div id="view-omr" class="hidden space-y-5 fade-in">
                    <div>
                        <label class="block text-[9px] font-black text-emerald-600 dark:text-emerald-400 uppercase mb-1.5 ml-1 tracking-widest"><span class="text-red-500">*</span> Target Work (작품명)</label>
                        <input type="text" id="omr-work-name" placeholder="현재 풀고 있는 작품의 이름을 입력하세요." class="w-full px-3 py-2.5 rounded-lg border border-emerald-200 dark:border-emerald-800/50 bg-emerald-50/30 dark:bg-emerald-950/30 text-xs font-bold outline-none focus:ring-2 focus:ring-emerald-500/20 dark:text-white shadow-sm">
                    </div>
                    <div class="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm">
                        <div id="omr-grid-container" class="grid grid-cols-2 sm:grid-cols-5 gap-3"></div>
                    </div>
                    <button id="ai-omr-btn" onclick="app.submitOMR()" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-200 text-white font-black text-xs rounded-xl shadow-md transition-all active:scale-95">
                        <i data-lucide="send" id="ai-omr-icon" class="w-3.5 h-3.5 mr-1.5 inline"></i> <span id="omr-btn-text">정답 제출 및 공유하기</span>
                    </button>
                </div>

                <!-- 3. 서술형 뷰 -->
                <div id="view-essay" class="hidden space-y-5 fade-in">
                    <div>
                        <label class="block text-[9px] font-black text-purple-600 dark:text-purple-400 uppercase mb-1.5 ml-1 tracking-widest"><span class="text-red-500">*</span> Target Work (작품명)</label>
                        <input type="text" id="essay-work-name" placeholder="작품명 입력 (예: 관동별곡)" class="w-full px-3 py-2.5 rounded-lg border border-purple-200 dark:border-purple-800/50 bg-purple-50/30 dark:bg-purple-950/30 text-xs font-bold outline-none focus:ring-2 focus:ring-purple-500/20 dark:text-white shadow-sm">
                    </div>
                    <div id="essay-grid-container" class="space-y-4"></div>
                    <button id="ai-essay-btn" onclick="app.submitEssay()" class="w-full py-3.5 bg-purple-600 hover:bg-purple-700 disabled:bg-slate-200 text-white font-black text-xs rounded-xl shadow-md transition-all active:scale-95">
                        <i data-lucide="send" id="ai-essay-icon" class="w-3.5 h-3.5 mr-1.5 inline"></i> <span id="essay-btn-text">서술형 제출 및 공유하기</span>
                    </button>
                </div>

                <!-- 4. 공동 기록 뷰 -->
                <div id="view-community" class="hidden space-y-4 fade-in h-full flex flex-col">
                    <div class="bg-indigo-50/50 dark:bg-indigo-900/10 p-4 rounded-xl border border-indigo-100 dark:border-indigo-800/50 shrink-0">
                        <h3 class="text-[11px] font-black text-indigo-700 dark:text-indigo-400 mb-1 uppercase tracking-widest flex items-center">
                            <i data-lucide="users" class="w-4 h-4 mr-1.5"></i> Shared Community
                        </h3>
                        <p class="text-[9px] text-indigo-600/70 dark:text-indigo-400/70 leading-relaxed">
                            정답을 제출한 후에만 다른 스터디원의 기록을 확인할 수 있습니다.
                        </p>
                    </div>

                    <div class="flex space-x-2 shrink-0">
                        <select id="comm-week-filter" onchange="app.updateCommunityWorks()" class="flex-1 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-[11px] font-black text-slate-700 dark:text-slate-300 outline-none rounded-lg p-2.5 shadow-sm uppercase truncate"></select>
                        <select id="comm-work-filter" onchange="app.renderCommunityRecords()" class="flex-1 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-[11px] font-black text-slate-700 dark:text-slate-300 outline-none rounded-lg p-2.5 shadow-sm uppercase truncate">
                            <option value="">작품 선택</option>
                        </select>
                    </div>
                    
                    <div id="community-container" class="flex-1 overflow-y-auto space-y-3 pb-10 custom-scrollbar"></div>
                </div>

                <!-- AI 결과 영역 -->
                <div id="ai-response-area" class="hidden animate-fade-in mt-4">
                    <div class="p-5 bg-brand-50/50 dark:bg-slate-800/50 rounded-2xl border border-brand-100 dark:border-slate-700 shadow-sm relative">
                        <button onclick="document.getElementById('ai-response-area').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 focus:outline-none"><i data-lucide="x" class="w-4 h-4"></i></button>
                        <div class="flex items-center mb-3">
                            <i data-lucide="bot" class="w-4 h-4 text-brand-500 mr-2"></i>
                            <span class="text-[10px] font-black text-brand-600 dark:text-brand-400 uppercase tracking-widest">AI Feedback</span>
                        </div>
                        <div id="ai-response-content" class="text-[11px] leading-relaxed dark:text-slate-300 prose prose-sm prose-slate dark:prose-invert max-w-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const GITHUB_CONFIG = {
      username: "kimjs2623", 
      repo: "for-study",             
      branch: "main",                
      folder: "01/pdf",
      answerKeyFileName: "정답해설.pdf" 
    };

    // Firebase 초기화 (전역 설정 활용)
    const firebaseConfig = JSON.parse(__firebase_config);
    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-study-app';
    
    // 🌟 API 설정 (Github 표준 버전)
    const apiKey = "AIzaSyA-frmY9mZMwNtHjR5W4UOGcNT0cBe4Tng"; 
    const GEMINI_MODEL = "gemini-1.5-flash"; 

    const state = {
      user: null,
      allFiles: [],
      filteredFiles: [],
      problemPdfBlob: null,   
      answerKeyPdfData: null, 
      currentFileName: "",
      isFetching: false,
      mode: 'tutor',
      weeks: [],
      allSubmissions: [],
      editingDocId: null,
      pdfDoc: null,
      pageNum: 1,
      pageRendering: false,
      pageNumPending: null,
      pdfScale: 1.0,
      userZoomed: false
    };

    function showToast(msg, type='info') {
      const toast = document.createElement('div');
      toast.className = `p-4 rounded-2xl shadow-2xl border text-[10px] font-black transition-all duration-300 z-[1000000] ${type==='error'?'bg-red-50 text-red-600 border-red-200':'bg-brand-50 text-brand-600 border-brand-200'}`;
      toast.textContent = msg;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
    }

    function initUI() {
        const omrGrid = document.getElementById('omr-grid-container');
        if(omrGrid) {
            let html = '';
            for(let i=1; i<=10; i++) {
                html += `<div class="space-y-1 text-center">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-1">${i}</label>
                            <input type="text" id="omr-${i}" class="w-full p-2 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold text-center outline-none focus:ring-2 focus:ring-emerald-500/20 dark:text-white shadow-sm uppercase">
                        </div>`;
            }
            omrGrid.innerHTML = html;
        }

        const essayGrid = document.getElementById('essay-grid-container');
        if(essayGrid) {
            let html = '';
            for(let i=1; i<=2; i++) {
                html += `<div class="space-y-0 shadow-sm rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800">
                            <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-900/50 p-2.5 border-b border-slate-200 dark:border-slate-800">
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Question 0${i}</span>
                                <input type="text" id="essay-num-${i}" placeholder="번호" class="w-14 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 text-[10px] text-center dark:text-white outline-none rounded shadow-sm py-1">
                            </div>
                            <textarea id="essay-ans-${i}" placeholder="서술형 답안을 작성하세요..." class="w-full h-32 p-4 bg-white dark:bg-slate-950 text-xs resize-none outline-none focus:ring-2 focus:ring-purple-500/20 dark:text-white custom-scrollbar border-none"></textarea>
                        </div>`;
            }
            essayGrid.innerHTML = html;
        }
        lucide.createIcons();
    }

    // 데이터베이스 일정 연동
    function fetchStudySchedule() {
        const scheduleRef = doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule');
        onSnapshot(scheduleRef, (docSnap) => {
            let dbWeeks = [];
            if(docSnap.exists()) {
                const data = docSnap.data();
                const weeksArray = data.weeks || [];
                dbWeeks = weeksArray.map(w => {
                    const val = (typeof w === 'object' && w !== null) ? (w.weekNum || w.week) : w;
                    const str = String(val).trim();
                    return /^\d+$/.test(str) ? str + '주차' : str;
                });
            }
            // 기존 제출된 기록에서 추출한 주차와 합치기
            const existingWeeks = state.allSubmissions.map(s => String(s.week));
            state.weeks = [...new Set([...dbWeeks, ...existingWeeks])].filter(w => w && w !== 'undefined');
            if(state.weeks.length === 0) state.weeks = ['1주차'];
            
            state.weeks.sort((a, b) => (parseInt(a) || 0) - (parseInt(b) || 0));
            app.updateWeekDropdowns();
        }, (err) => console.error("Schedule Error:", err));
    }

    // 공동 기록 연동
    function fetchPublicSubmissions() {
        const submissionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        onSnapshot(query(submissionsRef), (snapshot) => {
            const subs = [];
            snapshot.forEach(doc => subs.push({ id: doc.id, ...doc.data() }));
            subs.sort((a, b) => b.timestamp - a.timestamp);
            state.allSubmissions = subs;
            app.updateCommunityWorks();
            if(state.mode === 'community') app.renderCommunityRecords();
        });
    }

    // 🌟 명찰(이름) 정보 가져오기
    async function getUserName() {
        if(!state.user) return "익명";
        try {
            const profileRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
            const profileSnap = await getDoc(profileRef);
            if(profileSnap.exists()) {
                const data = profileSnap.data();
                return data.name || data.appAccountId || state.user.displayName || "스터디원";
            }
        } catch(e) { console.warn("Name fetch error"); }
        return state.user.displayName || `스터디원-${state.user.uid.substring(0,4)}`;
    }

    const startApp = async () => {
        initUI();
        // 인증 절차
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                state.user = user;
                scanGitHub();
                loadGlobalAnswerKey();
                fetchStudySchedule();
                fetchPublicSubmissions();
            }
        });
    };

    window.onload = startApp;

    async function loadGlobalAnswerKey() {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folder}/${GITHUB_CONFIG.answerKeyFileName}`;
        try {
            const res = await fetch(url);
            if(res.ok) {
                const blob = await res.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    state.answerKeyPdfData = reader.result.split(',')[1];
                    document.getElementById('answer-key-badge').classList.remove('hidden');
                };
                reader.readAsDataURL(blob);
            }
        } catch(e) {}
    }

    async function scanGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf') && f.name !== GITHUB_CONFIG.answerKeyFileName);
            state.filteredFiles = [...state.allFiles];
            renderFileList();
        } catch (e) {
            document.getElementById('material-list').innerHTML = `<p class="text-[10px] text-red-500 p-10 text-center font-bold">Sync Error</p>`;
        }
    }

    window.app = {
      setMode: (mode) => {
        state.mode = mode;
        ['tutor', 'omr', 'essay', 'community'].forEach(m => {
            const v = document.getElementById(`view-${m}`);
            const t = document.getElementById(`tab-${m}`);
            if(v) v.classList.toggle('hidden', m !== mode);
            if(t) {
                if(m === mode) { t.classList.add('tab-active'); t.classList.remove('text-slate-500'); }
                else { t.classList.remove('tab-active'); t.classList.add('text-slate-500'); }
            }
        });
        document.getElementById('week-selector-bar').classList.toggle('hidden', mode === 'tutor' || mode === 'community');
        document.getElementById('ai-response-area').classList.add('hidden');
        if(mode === 'community') app.renderCommunityRecords();
        lucide.createIcons();
      },

      toggleDarkMode: () => {
        const isDark = document.documentElement.classList.toggle('dark');
        document.getElementById('dark-mode-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
      },

      refreshFiles: () => scanGitHub(),
      filterFiles: () => {
        const q = document.getElementById('file-search').value.toLowerCase();
        state.filteredFiles = state.allFiles.filter(f => f.name.toLowerCase().includes(q));
        renderFileList();
      },

      toggleFullScreen: () => {
        const viewer = document.getElementById('viewer-container');
        const fabBtn = document.getElementById('exit-fullscreen-fab');
        const isFull = viewer.classList.toggle('viewer-fullscreen');
        document.body.style.overflow = isFull ? 'hidden' : '';
        fabBtn.classList.toggle('hidden', !isFull);
        if(state.pdfDoc) app.renderPage(state.pageNum);
      },

      loadMaterial: async (name, url) => {
        if (state.isFetching) return;
        state.isFetching = true;
        
        document.querySelectorAll('.file-btn').forEach(b => b.classList.remove('border-brand-500', 'bg-brand-50/30'));
        const activeBtn = document.getElementById(`btn-${name.replace(/\s+/g, '')}`);
        if(activeBtn) activeBtn.classList.add('border-brand-500', 'bg-brand-50/30');
        
        document.getElementById('viewer-filename').textContent = "LINKING DOCUMENT...";
        
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          state.problemPdfBlob = blob;

          document.getElementById('viewer-placeholder').classList.add('hidden');
          document.getElementById('viewer-filename').textContent = name;
          
          await app.renderPDF(blob);
          showToast(`${name} 로드 완료`);
        } catch (e) { showToast("PDF 로드 실패", "error"); } finally { state.isFetching = false; }
      },

      renderPDF: async (blob) => {
        try {
            const arrayBuffer = await blob.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
            state.pdfDoc = await loadingTask.promise;
            document.getElementById('page_count').textContent = state.pdfDoc.numPages;
            document.getElementById('pdf-controls').classList.remove('hidden');
            document.getElementById('pdf-controls').classList.add('flex');
            document.getElementById('pdf-canvas-container').classList.remove('hidden');
            state.pageNum = 1;
            state.userZoomed = false;
            app.renderPage(state.pageNum);
        } catch (error) { showToast("PDF 렌더링 오류", "error"); }
      },

      renderPage: (num) => {
        if(!state.pdfDoc) return;
        state.pageRendering = true;
        state.pdfDoc.getPage(num).then((page) => {
          const canvas = document.getElementById('pdf-canvas');
          const ctx = canvas.getContext('2d');
          let finalScale = state.pdfScale;
          if(!state.userZoomed) {
              const containerWidth = document.getElementById('pdf-canvas-container').clientWidth;
              finalScale = (containerWidth - 30) / page.getViewport({scale: 1}).width;
              state.pdfScale = finalScale;
          }
          const viewport = page.getViewport({scale: finalScale});
          canvas.height = viewport.height; canvas.width = viewport.width;
          const renderContext = { canvasContext: ctx, viewport: viewport };
          page.render(renderContext).promise.then(() => {
            state.pageRendering = false;
            canvas.classList.remove('hidden');
            if (state.pageNumPending !== null) { app.renderPage(state.pageNumPending); state.pageNumPending = null; }
          });
        });
        document.getElementById('page_num').textContent = num;
      },

      prevPage: () => { if (state.pageNum <= 1 || state.pageRendering) return; state.pageNum--; app.renderPage(state.pageNum); },
      nextPage: () => { if (state.pageNum >= state.pdfDoc.numPages || state.pageRendering) return; state.pageNum++; app.renderPage(state.pageNum); },
      zoomIn: () => { state.userZoomed = true; state.pdfScale += 0.25; app.renderPage(state.pageNum); },
      zoomOut: () => { if (state.pdfScale <= 0.5) return; state.userZoomed = true; state.pdfScale -= 0.25; app.renderPage(state.pageNum); },

      updateWeekDropdowns: () => {
          ['week-select', 'comm-week-filter'].forEach(id => {
              const el = document.getElementById(id);
              if(!el) return;
              const prev = el.value;
              el.innerHTML = state.weeks.map(w => `<option value="${w}">${w}</option>`).join('');
              if(state.weeks.includes(prev)) el.value = prev;
          });
          app.updateCommunityWorks();
      },

      updateCommunityWorks: () => {
          const w = document.getElementById('comm-week-filter').value;
          const s = document.getElementById('comm-work-filter');
          if(!s) return;
          const works = [...new Set(state.allSubmissions.filter(x => x.week === w && !x.isDeleted).map(x => x.workName))];
          s.innerHTML = works.length ? `<option value="">작품 선택</option>` + works.map(w => `<option value="${w}">${w}</option>`).join('') : `<option value="">기록 없음</option>`;
          app.renderCommunityRecords();
      },

      askAITutor: async () => {
        const target = document.getElementById('ai-tutor-target').value.trim();
        const prompt = document.getElementById('ai-tutor-prompt').value.trim();
        if (!prompt) return showToast("질문을 입력하세요.", "error");
        app.processAIRequest(document.getElementById('ai-tutor-btn'), null, [{ text: `[작품: ${target}]\n[질문]: ${prompt}` }], "학습 질문에 답변하세요.", null); 
      },

      submitOMR: async () => {
        const week = document.getElementById('week-select').value;
        const workName = document.getElementById('omr-work-name').value.trim();
        if(!workName) return showToast("작품명을 입력하세요.", "error");
        const ans = [];
        for(let i=1; i<=10; i++) {
            const v = document.getElementById(`omr-${i}`).value.trim();
            if(v) ans.push(`Q${i}: ${v}`);
        }
        if(!ans.length) return showToast("답안을 입력하세요.", "error");
        const recordData = { week, workName, type: "OMR", userAnswers: ans, timestamp: Date.now(), userId: state.user.uid, isDeleted: false };
        app.processAIRequest(document.getElementById('ai-omr-btn'), null, [{ text: `[작품명: ${workName}]\n[OMR 답안]:\n${ans.join('\n')}` }], "OMR 채점 및 해설을 수행하세요.", recordData);
      },

      submitEssay: async () => {
        const week = document.getElementById('week-select').value;
        const workName = document.getElementById('essay-work-name').value.trim();
        if(!workName) return showToast("작품명을 입력하세요.", "error");
        const ess = [];
        for(let i=1; i<=2; i++) {
            const n = document.getElementById(`essay-num-${i}`).value.trim();
            const a = document.getElementById(`essay-ans-${i}`).value.trim();
            if(a) ess.push(`[${n || i}번] ${a}`);
        }
        if(!ess.length) return showToast("답안을 입력하세요.", "error");
        const recordData = { week, workName, type: "Essay", userAnswers: ess, timestamp: Date.now(), userId: state.user.uid, isDeleted: false };
        app.processAIRequest(document.getElementById('ai-essay-btn'), null, [{ text: `[작품명: ${workName}]\n[서술형 답안]:\n\n${ess.join('\n\n')}` }], "서술형 채점 및 상세 피드백을 제공하세요.", recordData);
      },

      processAIRequest: async (btn, icon, parts, sysMsg, recordData) => {
        const area = document.getElementById('ai-response-area');
        const cont = document.getElementById('ai-response-content');
        btn.disabled = true; area.classList.add('hidden');

        try {
            if (state.problemPdfBlob) {
                const reader = new FileReader();
                const b64 = await new Promise(r => { reader.onloadend = () => r(reader.result.split(',')[1]); reader.readAsDataURL(state.problemPdfBlob); });
                parts.push({ inlineData: { mimeType: "application/pdf", data: b64 } });
            }
            if (state.answerKeyPdfData) parts.push({ inlineData: { mimeType: "application/pdf", data: state.answerKeyPdfData } });

            const res = await app.callGemini(parts, sysMsg);
            cont.innerHTML = res.replace(/\n/g, "<br>");
            area.classList.remove('hidden');
            area.scrollIntoView({ behavior: 'smooth' });

            if(recordData) {
                recordData.userName = await getUserName();
                recordData.aiFeedback = res;
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
                await addDoc(colRef, recordData);
                showToast("기록 저장 완료", "success");
            }
        } catch (e) { showToast("분석 실패: " + e.message, "error"); } finally { btn.disabled = false; }
      },

      callGemini: async (parts, system) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts }], systemInstruction: { parts: [{ text: system }] } }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || "AI 통신 에러");
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "응답 없음";
      },

      renderCommunityRecords: () => {
          const container = document.getElementById('community-container');
          const wFilter = document.getElementById('comm-week-filter').value;
          const workFilter = document.getElementById('comm-work-filter').value;
          if(!wFilter || !workFilter) return;

          const workSubs = state.allSubmissions.filter(s => s.week === wFilter && s.workName === workFilter);
          const hasSubmitted = workSubs.some(s => s.userId === state.user.uid && !s.isDeleted);

          if(!hasSubmitted) {
              container.innerHTML = `<div class="py-20 text-center border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-2xl mx-2 bg-slate-50/50 dark:bg-slate-900/50"><i data-lucide="lock" class="w-8 h-8 mx-auto mb-3 text-slate-400"></i><p class="text-[11px] font-black text-slate-500">Access Locked</p><p class="text-[9px] text-slate-400">답안을 제출해야 조회가 가능합니다.</p></div>`;
              lucide.createIcons(); return;
          }

          container.innerHTML = workSubs.map((r, i) => `
              <div class="bg-white dark:bg-slate-900 border ${r.userId === state.user.uid ? 'border-brand-400 shadow-sm' : 'border-slate-200 dark:border-slate-800'} rounded-xl overflow-hidden mb-2">
                  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-3.5 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors flex items-center justify-between">
                      <div class="flex items-center space-x-2">
                          <span class="text-[11px] font-black">${r.userId === state.user.uid ? '🌟 나' : r.userName}</span>
                          <span class="text-[9px] font-bold text-slate-400 uppercase border px-1 rounded">${r.type}</span>
                      </div>
                      <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                  </div>
                  <div class="hidden border-t border-slate-100 dark:border-slate-800 p-4 bg-slate-50 dark:bg-slate-950">
                      <div class="text-[11px] font-bold text-slate-700 dark:text-slate-300 mb-4 whitespace-pre-wrap">${r.userAnswers.join('\n')}</div>
                      <div class="p-3 bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 text-[11px] leading-relaxed">${r.aiFeedback.replace(/\n/g, '<br>')}</div>
                  </div>
              </div>
          `).join('');
          lucide.createIcons();
      }
    };
  </script>
</body>
</html>
