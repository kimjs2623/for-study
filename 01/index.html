  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 🌟 핵심 설정 (Direct URL 활용)
    const GITHUB_CONFIG = { username: "kimjs2623", repo: "for-study", branch: "main", folder: "01/pdf", answerKeyFileName: "정답해설.pdf" };
    const firebaseConfig = { apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA", projectId: "study-99725", appId: "1:850626154259:web:c3307473b7fbb09d9554e6" };
    const appId = 'my-study-app'; 
    
    const k1 = "AIzaSyDX";
    const k2 = "Op5VIQat";
    const k3 = "shzwM5k0lpN";
    const k4 = "WU9WkngNsUjU";
    const apiKey = k1 + k2 + k3 + k4;
    
    const GEMINI_MODEL = "gemini-1.5-flash"; 

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);

    const state = { user: null, allFiles: [], filteredFiles: [], problemPdfBlob: null, fullAnswerKeyText: "", isFetching: false, mode: 'tutor', weeks: [], allSubmissions: [], editingDocId: null, pdfDoc: null, pageNum: 1, pdfScale: 1.2, userZoomed: false, docWeeks: [] };

    async function getUserName() {
        if(!state.user) return "익명";
        try {
            const profileRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
            const profileSnap = await getDoc(profileRef);
            if(profileSnap.exists()) return profileSnap.data().name || "스터디원";
        } catch(e) {}
        return "스터디원";

    function updateGlobalWeeks() {

    async function extractTextFromBlobPDF(blob) {
        if(!blob) return "";
        try {
            const arrayBuffer = await blob.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += `--- PAGE ${i} ---\n${pageText}\n\n`;
            }
            return fullText;
        } catch(e) { return ""; }
    }

    // 🌟 강화된 정밀 검색 알고리즘
    function sliceAnswerText(fullText, targetNum, targetName) {
        if(!fullText) return "";
        
        // 1단계: 검색어에서 공백 제거하여 정규화
        const cleanFullText = fullText.replace(/\s/g, "");
        const cleanNum = targetNum.trim().replace(/\s/g, "");
        const cleanName = targetName.trim().replace(/\s/g, "");
        
        let indexStart = -1;
        
        // 2단계: 번호와 이름 조합으로 먼저 검색
        if(cleanNum && cleanName) {
            const combinedSearch = cleanNum + cleanName;
            indexStart = cleanFullText.indexOf(combinedSearch);
        }
        
        // 3단계: 번호 단독 검색 (001 등)
        if(indexStart === -1 && cleanNum) {
            indexStart = cleanFullText.indexOf(cleanNum);
        }

        // 4단계: 이름 단독 검색
        if(indexStart === -1 && cleanName) {
            indexStart = cleanFullText.indexOf(cleanName);
        }
        
        if(indexStart === -1) return "해설지에서 해당 정보를 찾지 못했습니다. 번호나 이름이 정확한지 다시 확인해주세요.";
        
        // 원본 텍스트의 대략적인 위치 계산 (추출된 텍스트가 공백을 포함하므로 약 1.5배 보정)
        const approxOriginalIndex = Math.floor(indexStart * 1.5);
        return fullText.substring(Math.max(0, approxOriginalIndex - 500), approxOriginalIndex + 6000); 
    }

    function parseMarkdown(text) {
        let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
        html = html.replace(/\*\*([^*]+)\*\*/gim, '<strong>$1</strong>');
        html = html.replace(/^\* (.*$)/gim, '<ul><li>$1</li></ul>');
        html = html.replace(/<\/ul>\n<ul>/gim, '');
        html = html.replace(/^---/gim, '<hr>');
        html = html.replace(/\n/g, '<br>');
        return html;
    }

      processAIRequest: async (btn, parts, sysMsg, recordData, workNum, workName) => {
        const originalText = btn.innerHTML; btn.disabled = true; 
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin-custom"></i> 분석 중...`;
        if(typeof lucide !== 'undefined') lucide.createIcons();
        try {
            if (state.mode === 'tutor' && state.problemPdfBlob) parts.push({ text: `\n[참고 문제지]\n${await extractTextFromBlobPDF(state.problemPdfBlob)}` });
            if (state.fullAnswerKeyText) {
                const targetText = sliceAnswerText(state.fullAnswerKeyText, workNum || "", workName || "");
                parts.push({ text: `\n[절대적 채점 기준 해설지]\n${targetText}` });
            }
            const res = await window.StudyApp.callGemini(parts, sysMsg);
            
            let displayScore = "";
            if (recordData?.type === "OMR") {
                const match = res.match(/Score:\s*(\d+\/\d+)/i);
                if (match) displayScore = match[1];
            } else if (recordData?.type === "Essay") {
                const match = res.match(/Result:\s*(Pass|Fail)/i);
                if (match) displayScore = match[1];
            }

            document.getElementById('ai-response-content').innerHTML = parseMarkdown(res);
            document.getElementById('ai-response-area').classList.remove('hidden');
            document.getElementById('ai-response-area').scrollIntoView({ behavior: 'smooth' });
            
            if(recordData) {
                recordData.userName = await getUserName(); 
                recordData.aiFeedback = res;
                recordData.displayScore = displayScore;
                if (state.editingDocId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', state.editingDocId), { ...recordData, isEdited: true, editedAt: Date.now() });
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), { ...recordData, timestamp: Date.now() });
                state.editingDocId = null; document.getElementById('editing-badge').classList.add('hidden');
                window.StudyApp.showToast("채점 및 공유 완료!", "success");
            }
        } catch (e) { window.StudyApp.showToast(`AI 에러: ${e.message}`, "error"); } 
        finally { btn.innerHTML = originalText; btn.disabled = false; if(typeof lucide !== 'undefined') lucide.createIcons(); }
      },

      callGemini: async (parts, system) => {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ contents: [{ parts }], systemInstruction: { parts: [{ text: system }] } }) 
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || "AI 통신 실패");
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "응답 없음";
      },

    async function scanGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("GitHub 목록 호출 실패 (한도 초과)");
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf') && !f.name.includes('정답'));
            state.filteredFiles = [...state.allFiles]; renderFileList();
        } catch (e) { 
            document.getElementById('material-list').innerHTML = `<p class="text-[10px] text-amber-600 p-6 text-center font-bold break-words">API 호출 제한으로 목록을 불러오지 못했습니다. 번호/작품명을 직접 입력하면 채점은 가능합니다.</p>`; 
        }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        container.innerHTML = state.filteredFiles.map(f => `
            <button onclick="window.StudyApp.loadMaterial('${f.name}', '${f.download_url}')" id="btn-${f.name.replace(/\s+/g, '')}" class="file-btn w-full flex items-center p-2.5 rounded-xl border border-slate-100 bg-white dark:bg-slate-900 text-left transition-all">
                <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2 text-slate-300"></i>
                <div class="truncate font-bold text-[10px] uppercase">${f.name}</div>
            </button>
        `).join('');
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    // 🌟 API 제한 없이 해설지 로드 (Direct Raw URL 활용)
    async function loadGlobalAnswerKey() {
        // API 한도 문제를 피하기 위해 api.github.com 대신 raw.githubusercontent.com 직접 사용
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folder}/${GITHUB_CONFIG.answerKeyFileName}`;
        const badge = document.getElementById('answer-key-badge');
        try {
            const res = await fetch(url);
            if(res.ok) {
                const blob = await res.blob();
                state.fullAnswerKeyText = await extractTextFromBlobPDF(blob);
                if (state.fullAnswerKeyText.length > 100) {
                    badge.innerHTML = `<i data-lucide="check-circle" class="w-3 h-3 mr-1"></i> AI Key Loaded`;
                    badge.className = "hidden sm:flex items-center bg-emerald-50 text-emerald-600 border border-emerald-200 px-2 py-1 rounded text-[9px] font-black uppercase";
                } else throw new Error();
            } else throw new Error();
        } catch(e) {
            badge.innerHTML = `<i data-lucide="x-circle" class="w-3 h-3 mr-1"></i> Key Load Failed`;
            badge.className = "hidden sm:flex items-center bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded text-[9px] font-black uppercase";
        }
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    function fetchStudySchedule() {
        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule'), (snap) => {
            state.docWeeks = [];
            if (snap.exists()) {
                const weeks = snap.data().weeks;
                if(weeks && Array.isArray(weeks)) {
                    weeks.forEach(w => {
                        const val = (typeof w === 'object' && w !== null) ? (w.week || w.weekNum || w.title) : w;
                        if(val && String(val) !== "[object Object]") state.docWeeks.push(String(val).includes('주차') ? val : val + '주차');
                    });
                }
            }
            updateGlobalWeeks();
        });
    }

    function fetchPublicSubmissions() {
        onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'submissions')), (snap) => {
            const subs = []; snap.forEach(doc => subs.push({ id: doc.id, ...doc.data() }));
            subs.sort((a, b) => b.timestamp - a.timestamp);
            state.allSubmissions = subs; updateGlobalWeeks();
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) { 
            state.user = user; window.StudyApp.initUI(); scanGitHub(); loadGlobalAnswerKey(); fetchStudySchedule(); fetchPublicSubmissions(); window.StudyApp.setMode('omr'); 
        } else signInAnonymously(auth);
    });
  </script>
</body>
</html>
