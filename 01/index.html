  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 1. 초기 전역 설정
    const GITHUB_CONFIG = {
      username: "kimjs2623", 
      repo: "for-study",             
      branch: "main",                
      folder: "01/pdf",
      answerKeyFileName: "정답해설.pdf" 
    };

    const firebaseConfig = JSON.parse(__firebase_config);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-study-app';
    const apiKey = "AIzaSyA-frmY9mZMwNtHjR5W4UOGcNT0cBe4Tng"; 
    const GEMINI_MODEL = "gemini-1.5-flash"; 

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);

    const state = {
      user: null,
      allFiles: [],
      filteredFiles: [],
      problemPdfBlob: null,   
      answerKeyPdfData: null, 
      currentFileName: "",
      isFetching: false,
      weeks: [],
      allSubmissions: [],
      editingDocId: null,
      pdfDoc: null,
      pageNum: 1,
      pdfScale: 1.2,
      userZoomed: false
    };

    // 🌟 showToast 함수 추가 (ReferenceError 해결)
    function showToast(msg, type='info') {
      const toast = document.createElement('div');
      toast.className = `p-4 rounded-2xl shadow-2xl border text-[10px] font-black transition-all duration-300 z-[1000000] ${type==='error'?'bg-red-50 text-red-600 border-red-200':'bg-brand-50 text-brand-600 border-brand-200'}`;
      toast.textContent = msg;
      const container = document.getElementById('toast-container');
      if (container) {
          container.appendChild(toast);
          setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
      }
    }

    function initUI() {
        const omrGrid = document.getElementById('omr-grid-container');
        if(omrGrid) {
            let html = '';
            for(let i=1; i<=10; i++) html += `<div class="space-y-1 text-center"><label class="text-[9px] font-black text-slate-400 uppercase">${i}</label><input type="text" id="omr-${i}" class="w-full p-2 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold text-center outline-none focus:ring-2 focus:ring-emerald-500/20 dark:text-white uppercase shadow-sm"></div>`;
            omrGrid.innerHTML = html;
        }
        const essayGrid = document.getElementById('essay-grid-container');
        if(essayGrid) {
            let html = '';
            for(let i=1; i<=2; i++) html += `<div class="shadow-sm rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800"><div class="flex items-center justify-between bg-slate-50 dark:bg-slate-900/50 p-2.5 border-b border-slate-200 dark:border-slate-800"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Question 0${i}</span><input type="text" id="essay-num-${i}" placeholder="번호" class="w-14 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 text-[10px] text-center dark:text-white outline-none rounded shadow-sm py-1"></div><textarea id="essay-ans-${i}" placeholder="서술형 답안을 작성하세요..." class="w-full h-32 p-4 bg-white dark:bg-slate-950 text-xs resize-none outline-none focus:ring-2 focus:ring-purple-500/20 dark:text-white custom-scrollbar border-none"></textarea></div>`;
            essayGrid.innerHTML = html;
        }
        lucide.createIcons();
    }

    async function scanGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf') && f.name !== GITHUB_CONFIG.answerKeyFileName);
            state.filteredFiles = [...state.allFiles];
            renderFileList();
        } catch (e) {
            const list = document.getElementById('material-list');
            if (list) list.innerHTML = `<p class="text-[10px] text-red-500 p-10 text-center font-bold">GITHUB SYNC ERROR</p>`;
        }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        if (!container) return;
        if (state.filteredFiles.length === 0) {
            container.innerHTML = `<p class="text-center text-[10px] text-slate-400 py-10 font-black uppercase">No Files Found</p>`;
            return;
        }
        container.innerHTML = state.filteredFiles.map(file => `
            <button onclick="window.app.loadMaterial('${file.name}', '${file.download_url}')" 
                class="file-btn w-full flex items-center p-2.5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-brand-500 transition-all text-left group">
                <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2 text-slate-300 group-hover:text-brand-500 shrink-0"></i>
                <div class="flex-1 truncate font-bold text-[10px] uppercase tracking-tighter">${file.name}</div>
            </button>
        `).join('');
        lucide.createIcons();
    }

    async function loadGlobalAnswerKey() {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folder}/${GITHUB_CONFIG.answerKeyFileName}`;
        try {
            const res = await fetch(url);
            if(res.ok) {
                const blob = await res.blob();
                const reader = new FileReader();
                reader.onloadend = () => { state.answerKeyPdfData = reader.result.split(',')[1]; document.getElementById('answer-key-badge').classList.remove('hidden'); };
                reader.readAsDataURL(blob);
            }
        } catch(e) {}
    }

    function fetchStudySchedule() {
        const scheduleRef = doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule');
        onSnapshot(scheduleRef, (docSnap) => {
            let dbWeeks = [];
            if(docSnap.exists()) {
                const data = docSnap.data();
                dbWeeks = (data.weeks || []).map(w => {
                    const val = (typeof w === 'object' && w !== null) ? (w.weekNum || w.week) : w;
                    const str = String(val).trim();
                    return str.includes('주차') ? str : str + '주차';
                });
            }
            const existingWeeks = state.allSubmissions.map(s => String(s.week));
            state.weeks = [...new Set([...dbWeeks, ...existingWeeks])].filter(w => w && w !== 'undefined');
            if(state.weeks.length === 0) state.weeks = ['1주차'];
            state.weeks.sort((a, b) => (parseInt(a) || 0) - (parseInt(b) || 0));
            window.app.updateWeekDropdowns();
        }, (err) => console.error("Schedule Error", err));
    }

    async function getUserName() {
        if(!state.user) return "익명";
        try {
            const profileRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
            const profileSnap = await getDoc(profileRef);
            if(profileSnap.exists()) {
                const data = profileSnap.data();
                return data.name || data.appAccountId || "스터디원";
            }
        } catch(e) {}
        return state.user.displayName || "스터디원";
    }

    function fetchPublicSubmissions() {
        const submissionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        onSnapshot(query(submissionsRef), (snapshot) => {
            const subs = [];
            snapshot.forEach(doc => subs.push({ id: doc.id, ...doc.data() }));
            subs.sort((a, b) => b.timestamp - a.timestamp);
            state.allSubmissions = subs;
            window.app.updateCommunityWorks();
            if(state.mode === 'community') window.app.renderCommunityRecords();
        });
    }

    // 🌟 window.app 객체 선언
    window.app = {
      setMode: (mode) => {
        state.mode = mode;
        ['tutor', 'omr', 'essay', 'community'].forEach(m => {
            const el = document.getElementById(`view-${m}`);
            if(el) el.classList.toggle('hidden', m !== mode);
            const tab = document.getElementById(`tab-${m}`);
            if(tab) {
                if(m === mode) { tab.classList.add('tab-active'); tab.classList.remove('text-slate-500'); }
                else { tab.classList.remove('tab-active'); tab.classList.add('text-slate-500'); }
            }
        });
        const bar = document.getElementById('week-selector-bar');
        if(bar) bar.classList.toggle('hidden', mode === 'tutor' || mode === 'community');
        const resp = document.getElementById('ai-response-area');
        if(resp) resp.classList.add('hidden');
        if(mode === 'community') window.app.renderCommunityRecords();
        lucide.createIcons();
      },

      toggleDarkMode: () => {
        const isDark = document.documentElement.classList.toggle('dark');
        const icon = document.getElementById('dark-mode-icon');
        if (icon) icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
      },

      refreshFiles: () => scanGitHub(),
      
      filterFiles: () => {
        const q = document.getElementById('file-search').value.toLowerCase();
        state.filteredFiles = state.allFiles.filter(f => f.name.toLowerCase().includes(q));
        renderFileList();
      },

      toggleFullScreen: () => {
        const viewer = document.getElementById('viewer-container');
        const fabBtn = document.getElementById('exit-fullscreen-fab');
        if (viewer) {
            const isFull = viewer.classList.toggle('viewer-fullscreen');
            document.body.style.overflow = isFull ? 'hidden' : '';
            if (fabBtn) fabBtn.classList.toggle('hidden', !isFull);
            if(state.pdfDoc) window.app.renderPage(state.pageNum);
        }
      },

      loadMaterial: async (name, url) => {
        if (state.isFetching) return;
        state.isFetching = true;
        const filenameDisplay = document.getElementById('viewer-filename');
        if (filenameDisplay) filenameDisplay.textContent = name;
        const placeholder = document.getElementById('viewer-placeholder');
        if (placeholder) placeholder.classList.add('hidden');
        
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          state.problemPdfBlob = blob;
          await window.app.renderPDF(blob);
          showToast(`${name} 로드 완료`);
        } catch (e) { 
            showToast("PDF 로드 실패", "error"); 
            if (filenameDisplay) filenameDisplay.textContent = "Load Error";
        } finally { state.isFetching = false; }
      },

      renderPDF: async (blob) => {
        try {
            const arrayBuffer = await blob.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
            state.pdfDoc = await loadingTask.promise;
            const countEl = document.getElementById('page_count');
            if (countEl) countEl.textContent = state.pdfDoc.numPages;
            
            const controls = document.getElementById('pdf-controls');
            if (controls) { controls.classList.remove('hidden'); controls.classList.add('flex'); }
            
            const container = document.getElementById('pdf-canvas-container');
            if (container) container.classList.remove('hidden');
            
            state.pageNum = 1;
            state.userZoomed = false;
            window.app.renderPage(state.pageNum);
        } catch (error) { showToast("PDF 렌더링 오류", "error"); }
      },

      renderPage: (num) => {
        if(!state.pdfDoc) return;
        state.pdfDoc.getPage(num).then((page) => {
          const canvas = document.getElementById('pdf-canvas');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          let finalScale = state.pdfScale;
          const container = document.getElementById('pdf-canvas-container');
          if(!state.userZoomed && container) {
              const containerWidth = container.clientWidth;
              finalScale = (containerWidth - 30) / page.getViewport({scale: 1}).width;
              state.pdfScale = finalScale;
          }
          const viewport = page.getViewport({scale: finalScale});
          canvas.height = viewport.height; canvas.width = viewport.width;
          page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
            canvas.classList.remove('hidden');
          });
        });
        const numEl = document.getElementById('page_num');
        if (numEl) numEl.textContent = num;
      },

      prevPage: () => { if (state.pageNum > 1) { state.pageNum--; window.app.renderPage(state.pageNum); } },
      nextPage: () => { if (state.pageNum < state.pdfDoc.numPages) { state.pageNum++; window.app.renderPage(state.pageNum); } },
      zoomIn: () => { state.userZoomed = true; state.pdfScale += 0.25; window.app.renderPage(state.pageNum); },
      zoomOut: () => { if (state.pdfScale > 0.5) { state.userZoomed = true; state.pdfScale -= 0.25; window.app.renderPage(state.pageNum); } },

      updateWeekDropdowns: () => {
          ['week-select', 'comm-week-filter'].forEach(id => {
              const el = document.getElementById(id);
              if(!el) return;
              const prev = el.value;
              el.innerHTML = state.weeks.map(w => `<option value="${w}">${w}</option>`).join('');
              if(state.weeks.includes(prev)) el.value = prev;
          });
          window.app.updateCommunityWorks();
      },

      updateCommunityWorks: () => {
          const filterEl = document.getElementById('comm-week-filter');
          const workSelect = document.getElementById('comm-work-filter');
          if(!filterEl || !workSelect) return;
          const w = filterEl.value;
          const works = [...new Set(state.allSubmissions.filter(x => x.week === w && !x.isDeleted).map(x => x.workName))];
          workSelect.innerHTML = works.length ? `<option value="">작품 선택</option>` + works.map(w => `<option value="${w}">${w}</option>`).join('') : `<option value="">기록 없음</option>`;
          window.app.renderCommunityRecords();
      },

      askAITutor: async () => {
        const targetEl = document.getElementById('ai-tutor-target');
        const promptEl = document.getElementById('ai-tutor-prompt');
        if (!targetEl || !promptEl) return;
        const target = targetEl.value.trim();
        const prompt = promptEl.value.trim();
        if (!prompt) return showToast("내용을 입력하세요.", "error");
        window.app.processAIRequest(document.getElementById('ai-tutor-btn'), null, [{ text: `[타겟: ${target}]\n[질문]: ${prompt}` }], "학습 질문에 대해 문학 전문가로서 상세히 답변하세요.", null); 
      },

      submitOMR: async () => {
        const weekEl = document.getElementById('week-select');
        const workEl = document.getElementById('omr-work-name');
        if (!weekEl || !workEl) return;
        const week = weekEl.value;
        const workName = workEl.value.trim();
        if(!workName) return showToast("작품명을 입력하세요.", "error");
        const ans = [];
        for(let i=1; i<=10; i++) {
            const vEl = document.getElementById(`omr-${i}`);
            const v = vEl ? vEl.value.trim() : "";
            if(v) ans.push(`Q${i}: ${v}`);
        }
        if(!ans.length) return showToast("답안을 입력하세요.", "error");
        const recordData = { week, workName, type: "OMR", userAnswers: ans, timestamp: Date.now(), userId: state.user.uid, isDeleted: false };
        window.app.processAIRequest(document.getElementById('ai-omr-btn'), null, [{ text: `[작품: ${workName}]\n[학생 OMR 답안]:\n${ans.join('\n')}` }], "제공된 정답 해설지를 바탕으로 학생의 답안을 채점하고 상세히 해설하세요.", recordData);
      },

      submitEssay: async () => {
        const weekEl = document.getElementById('week-select');
        const workEl = document.getElementById('essay-work-name');
        if (!weekEl || !workEl) return;
        const week = weekEl.value;
        const workName = workEl.value.trim();
        if(!workName) return showToast("작품명을 입력하세요.", "error");
        const ess = [];
        for(let i=1; i<=2; i++) {
            const nEl = document.getElementById(`essay-num-${i}`);
            const aEl = document.getElementById(`essay-ans-${i}`);
            const n = nEl ? nEl.value.trim() : "";
            const a = aEl ? aEl.value.trim() : "";
            if(a) ess.push(`[${n || i}번] ${a}`);
        }
        if(!ess.length) return showToast("답안을 입력하세요.", "error");
        const recordData = { week, workName, type: "Essay", userAnswers: ess, timestamp: Date.now(), userId: state.user.uid, isDeleted: false };
        window.app.processAIRequest(document.getElementById('ai-essay-btn'), null, [{ text: `[작품: ${workName}]\n[서술형 답안]:\n\n${ess.join('\n\n')}` }], "공식 해설지의 키워드를 기준으로 서술형 답안을 정밀 채점하고 피드백을 제공하세요.", recordData);
      },

      processAIRequest: async (btn, icon, parts, sysMsg, recordData) => {
        const area = document.getElementById('ai-response-area');
        const cont = document.getElementById('ai-response-content');
        if (!area || !cont || !btn) return;
        btn.disabled = true; area.classList.add('hidden');
        try {
            if (state.problemPdfBlob) {
                const reader = new FileReader();
                const b64 = await new Promise(r => { reader.onloadend = () => r(reader.result.split(',')[1]); reader.readAsDataURL(state.problemPdfBlob); });
                parts.push({ inlineData: { mimeType: "application/pdf", data: b64 } });
            }
            if (state.answerKeyPdfData) parts.push({ inlineData: { mimeType: "application/pdf", data: state.answerKeyPdfData } });
            const res = await window.app.callGemini(parts, sysMsg);
            cont.innerHTML = res.replace(/\n/g, "<br>");
            area.classList.remove('hidden'); area.scrollIntoView({ behavior: 'smooth' });
            if(recordData) {
                recordData.userName = await getUserName();
                recordData.aiFeedback = res;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), recordData);
                showToast("기록 저장 완료", "success");
            }
        } catch (e) { showToast("AI 오류: " + e.message, "error"); } finally { btn.disabled = false; }
      },

      callGemini: async (parts, system) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts }], systemInstruction: { parts: [{ text: system }] } }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || "AI 통신 에러");
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "응답 없음";
      },

      renderCommunityRecords: () => {
          const container = document.getElementById('community-container');
          const wFilterEl = document.getElementById('comm-week-filter');
          const workFilterEl = document.getElementById('comm-work-filter');
          if(!container || !wFilterEl || !workFilterEl) return;
          const wFilter = wFilterEl.value;
          const workFilter = workFilterEl.value;
          if(!wFilter || !workFilter) return;
          const workSubs = state.allSubmissions.filter(s => s.week === wFilter && s.workName === workFilter);
          const hasSubmitted = workSubs.some(s => s.userId === state.user.uid && !s.isDeleted);
          if(!hasSubmitted) {
              container.innerHTML = `<div class="py-16 text-center border-2 border-dashed border-slate-200 rounded-2xl mx-2"><i data-lucide="lock" class="w-8 h-8 mx-auto mb-2 text-slate-400"></i><p class="text-[10px] font-black uppercase">Locked</p><p class="text-[9px] text-slate-400">정답을 제출해야 열람 가능합니다.</p></div>`;
              lucide.createIcons(); return;
          }
          container.innerHTML = workSubs.map((r, i) => `
              <div class="bg-white dark:bg-slate-900 border ${r.userId === state.user.uid ? 'border-brand-400 shadow-sm' : 'border-slate-200 dark:border-slate-800'} rounded-xl overflow-hidden mb-2">
                  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-3.5 cursor-pointer hover:bg-slate-50 transition-colors flex items-center justify-between">
                      <div class="flex items-center space-x-2">
                          <span class="text-[11px] font-black">${r.userId === state.user.uid ? '🌟 나' : r.userName}</span>
                          <span class="text-[9px] font-bold text-slate-400 border px-1 rounded uppercase">${r.type}</span>
                      </div>
                      <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                  </div>
                  <div class="hidden border-t p-4 bg-slate-50/50">
                      <div class="text-[11px] font-bold text-slate-700 dark:text-slate-300 mb-4 whitespace-pre-wrap">${r.userAnswers.join('\n')}</div>
                      <div class="p-3 bg-white dark:bg-slate-900 rounded-lg border text-[11px] leading-relaxed">${r.aiFeedback.replace(/\n/g, '<br>')}</div>
                  </div>
              </div>
          `).join('');
          lucide.createIcons();
      }
    };

    // 4. 앱 초기 실행 (인증 대기 및 초기화)
    const initializeAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            state.user = user;
            initUI(); 
            scanGitHub();
            loadGlobalAnswerKey();
            fetchStudySchedule();
            fetchPublicSubmissions();
        } else {
            initializeAuth();
        }
    });

  </script>
</body>
</html>
