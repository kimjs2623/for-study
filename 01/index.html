  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /* ===============================================================
       1. 깃허브 배포 전용 완벽 하드코딩 환경 설정
       =============================================================== */
    const GITHUB_CONFIG = { username: "kimjs2623", repo: "for-study", branch: "main", folder: "01/pdf", answerKeyFileName: "정답해설.pdf" };
    
    // Firebase 연결 정보 고정
    const firebaseConfig = {
        apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA", projectId: "study-99725", appId: "1:850626154259:web:c3307473b7fbb09d9554e6"
    };
    
    // 앱 아이디 강제 고정
    const appId = 'my-study-app'; 
    
    // 🌟 제공해주신 실제 API Key 세팅
    const apiKey = "AIzaSyA-frmY9mZMwNtHjR5W4UOGcNT0cBe4Tng"; 

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);

    const state = {
      user: null, allFiles: [], filteredFiles: [], problemPdfBlob: null, answerKeyPdfData: null,
      isFetching: false, mode: 'tutor', weeks: [], allSubmissions: [], editingDocId: null, pdfDoc: null, pageNum: 1, pdfScale: 1.2, userZoomed: false,
      docWeeks: [] 
    };

    async function getUserName() {
        if(!state.user) return "익명";
        try {
            const profileRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
            const profileSnap = await getDoc(profileRef);
            if(profileSnap.exists()) {

    // 🌟 주차 목록 업데이트 로직 (빈 배열 방지 로직 포함)
    function updateGlobalWeeks() {
        const existingWeeks = state.allSubmissions.filter(s => !s.isDeleted).map(s => String(s.week));
        
        // DB에서 불러온 주차(docWeeks)와, 기존 제출된 기록이 있는 주차(existingWeeks)를 병합
        state.weeks = [...new Set([...state.docWeeks, ...existingWeeks])].filter(w => w && w !== 'undefined');
        
        let emptyMessage = "";
        if(state.weeks.length === 0) {
            emptyMessage = "[데이터 없음/DB오류]";
        } else {
            state.weeks.sort((a, b) => (parseInt(a) || 0) - (parseInt(b) || 0));
        }
        
        ['week-select', 'comm-week-filter'].forEach(id => {
            const el = document.getElementById(id);
            if(!el) return;
            if (emptyMessage) {
                // 🌟 DB가 비어있을 경우 명확히 에러 메시지로 드롭다운을 막음
                el.innerHTML = `<option value="">${emptyMessage}</option>`;
            } else {
                const prev = el.value;
                el.innerHTML = state.weeks.map(w => `<option value="${w}">${w}</option>`).join('');
                if(state.weeks.includes(prev)) el.value = prev;
            }
        });
        window.StudyApp.updateCommunityWorks();
    }

    async function extractTextFromBlobPDF(blob) {
        try {
            const arrayBuffer = await blob.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            const maxPages = Math.min(pdf.numPages, 10); 
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += `[${i}페이지]\n${pageText}\n\n`;
            }
            return fullText;
        } catch(e) { return ""; }
    }

    async function extractTextFromBase64PDF(base64Data) {
        try {
            const binaryString = atob(base64Data.replace(/\s/g, ''));
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
            const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
            let fullText = "";
            const maxPages = Math.min(pdf.numPages, 10);
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += `[${i}페이지]\n${pageText}\n\n`;
            }
            return fullText;
        } catch(e) { return ""; }
    }

        try {

            state.pdfDoc = await loadingTask.promise;
            
            const countEl = document.getElementById('page_count');

      renderPage: (num) => {
        if(!state.pdfDoc) return;
        state.pdfDoc.getPage(num).then((page) => {
          const canvas = document.getElementById('pdf-canvas');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          
          let finalScale = state.pdfScale;
          const container = document.getElementById('pdf-canvas-container');
          
          if(!state.userZoomed && container) {
              let containerWidth = container.clientWidth;
              if (containerWidth === 0) containerWidth = window.innerWidth - 40; 
              finalScale = (containerWidth - 30) / page.getViewport({scale: 1}).width;
              state.pdfScale = finalScale;
          }
          
          const viewport = page.getViewport({scale: finalScale});
          canvas.height = viewport.height; 
          canvas.width = viewport.width;
          
          page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
            canvas.classList.remove('hidden');
          });
        });
        
        const numEl = document.getElementById('page_num');
        if (numEl) numEl.textContent = num;
      },

      nextPage: () => { if (state.pageNum < state.pdfDoc.numPages) { state.pageNum++; window.StudyApp.renderPage(state.pageNum); } },
      zoomIn: () => { state.userZoomed = true; state.pdfScale += 0.25; window.StudyApp.renderPage(state.pageNum); },

        area.classList.add('hidden');

            }
            
            const res = await window.StudyApp.callGemini(parts, sysMsg);
            
            if(recordData) {
                recordData.userName = await getUserName();
                recordData.aiFeedback = res; 
                
                if (state.editingDocId) {
                    recordData.isEdited = true;
                    recordData.editedAt = Date.now();

      // 🌟 완벽한 AI 모델 Fallback 시스템 도입
      callGemini: async (parts, system) => {
        // 우선순위: 최신 플래시 -> 기본 플래시 -> 구형 프로
        const modelsToTry = [
            "gemini-1.5-flash-latest", 
            "gemini-1.5-flash", 
            "gemini-1.5-pro-latest", 
            "gemini-pro"
        ];
        
        let lastError = null;

        for (const model of modelsToTry) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            // gemini-pro 등은 systemInstruction 포맷이 다를 수 있어 안전하게 통합
            const payload = { contents: [{ parts }] };
            if (!model.includes("gemini-pro") || model.includes("1.5")) {
                payload.systemInstruction = { parts: [{ text: system }] };
            } else {
                parts.unshift({ text: `[시스템 지시사항: ${system}]\n\n` });
            }

            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                const data = await res.json();
                
                if (res.ok) {
                    console.log(`✅ AI 통신 성공 (사용된 모델: ${model})`);
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "응답이 없습니다.";
                } else {
                    const errMsg = data.error?.message || `HTTP 에러 ${res.status}`;
                    lastError = new Error(errMsg);
                    
                    // 모델 접근 권한 관련 에러면 다음 모델 시도, 아니면(API키 오류 등) 즉시 중단
                    if(errMsg.includes("not found") || errMsg.includes("not supported")) {
                        console.warn(`⚠️ ${model} 모델을 이 API 키에서 지원하지 않음. 다음 모델 시도 중...`);
                        continue;
                    } else {
                        throw lastError; 
                    }
                }
            } catch (err) {
                lastError = err;
                if(err.message.includes("not found") || err.message.includes("not supported")) {
                    continue;
                } else {
                    break;
                }
            }
        }
        
        throw lastError;
      },

          if(!record || record.isDeleted) return;

                  if(ansInput) ansInput.value = '';
              }
              
              (record.userAnswers || []).forEach((ans, idx) => {
                  const match = ans.match(/\[(.*?)번\]\s*(.*)/) || ans.match(/\[(.*?)번 문항\]\s*(.*)/);
                  if(match && idx < 2) {
                      const numInput = document.getElementById(`essay-num-${idx+1}`);
                      const ansInput = document.getElementById(`essay-ans-${idx+1}`);
                      if(numInput) numInput.value = match[1];
                      if(ansInput) ansInput.value = match[2];
                  }
              });
              const btn = document.getElementById('submit-essay-btn');
              if(btn) btn.innerHTML = '<i data-lucide="edit-3" class="w-4 h-4 mr-2"></i> 수정된 서술형 AI 재채점하기';
              window.StudyApp.showToast("수정 모드: 답안을 수정하세요.");
          }
          if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      deleteSubmission: (docId) => {
          const modal = document.getElementById('delete-modal');
          const confirmBtn = document.getElementById('confirm-delete-btn');
          if(!modal || !confirmBtn) return;
          
          modal.classList.remove('hidden');
          confirmBtn.onclick = async () => {
              modal.classList.add('hidden');
              try {
                  const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', docId);
                  await deleteDoc(docRef);
                  window.StudyApp.showToast("데이터가 완전히 삭제되었습니다.", "success");
              } catch(e) {
                  window.StudyApp.showToast("삭제 실패: 권한 부족 또는 통신 에러", "error");
              }
          };
      },

      renderCommunityRecords: () => {
          const container = document.getElementById('community-container');
          const wFilterEl = document.getElementById('comm-week-filter');
          const workFilterEl = document.getElementById('comm-work-filter');
          if(!container || !wFilterEl || !workFilterEl) return;
          
          const wFilter = wFilterEl.value;
          const workFilter = workFilterEl.value;
          if(!wFilter || !workFilter) return;
          
          const workSubs = state.allSubmissions.filter(s => s.week === wFilter && s.workName === workFilter);
          
          if(workSubs.length === 0) {
              container.innerHTML = `<div class="text-center py-16 text-[10px] text-slate-400 font-bold uppercase tracking-widest">제출된 기록이 없습니다.</div>`;
              return;
          }

          container.innerHTML = workSubs.map((r, i) => {
              const isMine = r.userId === state.user.uid;
              const isEdited = r.isEdited;
              
              let actionBtns = `<div class="flex items-center space-x-2 ml-auto mr-3">`;
              if(isMine) {
                  actionBtns += `<button onclick="window.StudyApp.editSubmission('${r.id}', '${r.type}'); event.stopPropagation();" class="text-[9px] font-black text-brand-500 hover:text-brand-700 bg-brand-50 dark:bg-brand-900/30 px-2.5 py-1 rounded transition-colors flex items-center"><i data-lucide="edit" class="w-3 h-3 mr-1"></i>수정</button>`;
              }
              // 테스트용 삭제 버튼 유지
              actionBtns += `<button onclick="window.StudyApp.deleteSubmission('${r.id}'); event.stopPropagation();" class="text-[9px] font-black text-red-500 hover:text-red-700 bg-red-50 dark:bg-red-900/30 px-2.5 py-1 rounded transition-colors flex items-center"><i data-lucide="trash-2" class="w-3 h-3 mr-1"></i>삭제</button>`;
              actionBtns += `</div>`;

              return `
              <div class="bg-white dark:bg-slate-900 border ${isMine ? 'border-brand-400 shadow-sm' : 'border-slate-200 dark:border-slate-800'} rounded-xl overflow-hidden mb-2 transition-all">
                  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-3.5 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors flex items-center justify-between">
                      <div class="flex items-center space-x-2">
                          <span class="text-[11px] font-black ${isMine ? 'text-brand-600 dark:text-brand-400' : 'text-slate-700 dark:text-slate-300'}">
                              ${isMine ? '🌟 나의 답안' : r.userName}
                              ${isEdited ? '<span class="text-amber-500 text-[8px] font-bold ml-1 tracking-tighter">[수정됨]</span>' : ''}
                          </span>
                          <span class="text-[9px] font-bold text-slate-400 border border-slate-200 dark:border-slate-700 px-1.5 py-0.5 rounded uppercase">${r.type}</span>
                      </div>
                      ${actionBtns}
                      <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                  </div>
                  <div class="hidden border-t border-slate-100 dark:border-slate-800 p-4 bg-slate-50/50 dark:bg-slate-950/50 space-y-4">
                      <div>
                          <div class="text-[9px] font-black text-slate-400 uppercase mb-1">제출 답안</div>
                          <div class="text-[11px] font-bold text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed pl-2 border-l-2 border-brand-200 dark:border-brand-800">${(r.userAnswers || []).join('\n')}</div>
                      </div>
                      ${r.aiFeedback ? `
                      <div class="p-3 bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                          <div class="flex items-center mb-2">
                              <i data-lucide="sparkles" class="w-3.5 h-3.5 text-brand-500 mr-1.5"></i>
                              <span class="text-[9px] font-black text-brand-600 dark:text-brand-400 uppercase tracking-widest">AI Feedback</span>
                          </div>
                          <div class="text-[11px] leading-relaxed dark:text-slate-300">${r.aiFeedback.replace(/\n/g, '<br>')}</div>
                      </div>
                      ` : ''}
                  </div>
              </div>
          `}).join('');
          if(typeof lucide !== 'undefined') lucide.createIcons();
      }
    };

    /* ==========================================
       3. 서버 통신 (GitHub & Firestore)
       ========================================== */
    async function scanGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf') && f.name !== GITHUB_CONFIG.answerKeyFileName);
            state.filteredFiles = [...state.allFiles];
            renderFileList();
        } catch (e) {
            const list = document.getElementById('material-list');
            if (list) list.innerHTML = `<p class="text-[10px] text-red-500 p-10 text-center font-bold">GITHUB SYNC ERROR</p>`;
        }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        if (!container) return;
        if (state.filteredFiles.length === 0) {
            container.innerHTML = `<p class="text-center text-[10px] text-slate-400 py-10 font-black uppercase">No Files Found</p>`;
            return;
        }
        container.innerHTML = state.filteredFiles.map(file => `
            <button onclick="window.StudyApp.loadMaterial('${file.name}', '${file.download_url}')" 
                id="btn-${file.name.replace(/\s+/g, '')}"
                class="file-btn w-full flex items-center p-2.5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-brand-500 transition-all text-left group">
                <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2 text-slate-300 group-hover:text-brand-500 shrink-0"></i>
                <div class="flex-1 truncate font-bold text-[10px] uppercase tracking-tighter">${file.name}</div>
            </button>
        `).join('');
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    async function loadGlobalAnswerKey() {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folder}/${GITHUB_CONFIG.answerKeyFileName}`;
        try {
            const res = await fetch(url);
            if(res.ok) {
                const blob = await res.blob();
                const reader = new FileReader();
                reader.onloadend = () => { 
                    state.answerKeyPdfData = reader.result.split(',')[1]; 
                    const badge = document.getElementById('answer-key-badge');
                    if (badge) badge.classList.remove('hidden');
                };
                reader.readAsDataURL(blob);
            }
        } catch(e) { console.warn("Answer key load failed"); }
    }

    // 🌟 DB 경로 확실히 스캔 및 에러 처리
    function fetchStudySchedule() {
        const scheduleDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule');
        
        onSnapshot(scheduleDocRef, (docSnap) => {
            state.docWeeks = [];
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.weeks && data.weeks.length > 0) {
                    data.weeks.forEach(w => {
                        const val = (typeof w === 'object' && w !== null) ? (w.weekNum || w.week || w.title) : w;
                        if(val) {
                            const str = String(val).trim();
                            state.docWeeks.push(str.includes('주차') ? str : str + '주차');
                        }
                    });
                    window.StudyApp.showToast("주차 정보를 성공적으로 불러왔습니다.", "success", 2000);
                } else {
                    window.StudyApp.showToast("데이터베이스에 주차 데이터가 비어있습니다.", "error");
                }
            } else {
                window.StudyApp.showToast("주차 DB 경로 오류: studyInfo/schedule를 찾을 수 없습니다.", "error");
            }
            updateGlobalWeeks();
        }, (e) => {
            console.error("Schedule load error:", e);
        });
    }

    function fetchPublicSubmissions() {
        const submissionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        onSnapshot(query(submissionsRef), (snapshot) => {
            const subs = [];
            snapshot.forEach(doc => subs.push({ id: doc.id, ...doc.data() }));
            subs.sort((a, b) => b.timestamp - a.timestamp);
            state.allSubmissions = subs;
            updateGlobalWeeks();
            window.StudyApp.updateCommunityWorks();
            if(state.mode === 'community') window.StudyApp.renderCommunityRecords();
        });
    }

    /* ==========================================
       4. 앱 실행 (Life Cycle)
       ========================================== */
    const initializeAuth = async () => {
        try {
            await signInAnonymously(auth);
        } catch (error) {
            console.error("Anonymous auth fallback failed:", error);
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            state.user = user;
            window.StudyApp.initUI(); 
            scanGitHub();
            loadGlobalAnswerKey(); 
            fetchStudySchedule();
            fetchPublicSubmissions();
            window.StudyApp.setMode('omr');
        } else {
            initializeAuth();
        }
    });

  </script>
</body>
