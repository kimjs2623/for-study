      darkMode: 'class',

    .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 900 !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* 전체 화면 뷰어 모드 (100dvh를 사용하여 모바일 주소창 이슈 회피) */
    .viewer-fullscreen {
        position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
        width: 100vw !important; height: 100dvh !important;
        z-index: 99990 !important; border-radius: 0 !important; margin: 0 !important;
        display: flex !important; flex-direction: column !important;
    }
    
    /* 모바일 환경 대응 최상단 Floating Button */
    .fab-button {
        position: fixed;
        bottom: max(2rem, env(safe-area-inset-bottom));
        right: max(2rem, env(safe-area-inset-right));
        z-index: 999999 !important;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

          <i data-lucide="home" class="w-5 h-5 mr-1 sm:mr-2"></i> <span class="hidden sm:inline">Home</span>
        </a>
        <div class="h-5 w-px bg-slate-200 dark:bg-slate-800 shrink-0"></div>

            <button onclick="app.setMode('omr')" id="tab-omr" class="text-[10px] sm:text-xs px-2 sm:px-4 py-5 rounded-lg uppercase tracking-widest text-slate-500 whitespace-nowrap shrink-0">OMR Score</button>

            <button onclick="app.setMode('community')" id="tab-community" class="text-[10px] sm:text-xs px-2 sm:px-4 py-5 rounded-lg uppercase tracking-widest text-brand-500 whitespace-nowrap shrink-0 flex items-center">

        </div>

    <!-- 2. 중앙: PDF Viewer (모바일 호환 PDF.js 엔진) -->

                    <button onclick="app.toggleFullScreen()" id="header-fullscreen-btn" class="px-2.5 py-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand-500 hover:text-brand-600 dark:hover:text-brand-400 text-slate-600 dark:text-slate-300 text-[10px] font-black rounded-lg uppercase tracking-tighter transition-all flex items-center shadow-sm active:scale-95">

                <button onclick="app.zoomOut()" class="p-1.5 hover:bg-slate-700 rounded-full transition-colors"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                <button onclick="app.zoomIn()" class="p-1.5 hover:bg-slate-700 rounded-full transition-colors"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>

    <!-- 3. 오른쪽: AI 작업 영역 및 커뮤니티 -->

                    <div>

                        <textarea id="ai-tutor-prompt" placeholder="PDF 속 내용을 질문하거나 채점을 요청하세요." class="w-full h-40 p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-xs leading-relaxed resize-none outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white custom-scrollbar shadow-sm"></textarea>

                    <button id="ai-tutor-btn" onclick="app.askAITutor()" class="w-full py-3.5 bg-brand-600 hover:bg-brand-700 disabled:bg-slate-200 text-white font-black text-xs rounded-xl transition-all shadow-md active:scale-95">

                <!-- 2. OMR 뷰 -->

                <!-- 3. 서술형 뷰 -->

                        <input type="text" id="essay-work-name" placeholder="작품명 기입 (예: 관동별곡)" class="w-full px-3 py-2.5 rounded-lg border border-purple-200 dark:border-purple-800/50 bg-purple-50/30 dark:bg-purple-950/30 text-xs font-bold outline-none focus:ring-2 focus:ring-purple-500/20 dark:text-white shadow-sm">
                    </div>
                    <div id="essay-grid-container" class="space-y-4"></div>
                    <button id="ai-essay-btn" onclick="app.submitEssay()" class="w-full py-3.5 bg-purple-600 hover:bg-purple-700 disabled:bg-slate-200 text-white font-black text-xs rounded-xl shadow-md transition-all active:scale-95">
                        <i data-lucide="send" id="ai-essay-icon" class="w-3.5 h-3.5 mr-1.5 inline"></i> 서술형 제출 및 공유하기
                    </button>

                <!-- 4. 공동 학습 기록 뷰 (커뮤니티) -->

                            <span class="text-red-500 font-bold">* 해당 주차/작품의 정답을 먼저 제출해야 조회가 가능합니다.</span>
                        </p>
                    </div>

                    <div class="flex space-x-2 shrink-0">
                        <select id="comm-week-filter" onchange="app.updateCommunityWorks()" class="flex-1 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-xs font-bold text-slate-700 dark:text-slate-300 outline-none rounded-lg p-2.5 shadow-sm uppercase truncate">
                            <!-- JS 렌더링 -->
                        </select>
                        <select id="comm-work-filter" onchange="app.renderCommunityRecords()" class="flex-1 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-xs font-bold text-slate-700 dark:text-slate-300 outline-none rounded-lg p-2.5 shadow-sm uppercase truncate">
                            <option value="">작품 선택</option>

                    <div id="community-container" class="flex-1 overflow-y-auto space-y-3 pb-10 custom-scrollbar">

                        <button onclick="document.getElementById('ai-response-area').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-4 h-4"></i></button>

                        <div id="ai-response-content" class="text-[11px] leading-relaxed dark:text-slate-300 prose prose-sm prose-slate dark:prose-invert"></div>
                    </div>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /**
     * ⚙️ GITHUB_CONFIG
     */
    const GITHUB_CONFIG = {
      username: "kimjs2623", 
      repo: "for-study",             
      branch: "main",                
      folder: "01/pdf",
      answerKeyFileName: "정답해설.pdf" 
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA",
        projectId: "study-99725",
        appId: "1:850626154259:web:c3307473b7fbb09d9554e6"
    };

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-study-app';
    const apiKey = ""; 

    const state = {
      user: null,
      allFiles: [],
      filteredFiles: [],
      problemPdfData: null,   
      answerKeyPdfData: null, 
      currentFileName: "",
      isFetching: false,
      mode: 'tutor',
      weeks: [], // Firestore schedule에서 불러올 주차 데이터
      allSubmissions: [],
      // 🌟 PDF.js 렌더링 상태 관리
      pdfDoc: null,
      pageNum: 1,
      pageRendering: false,
      pageNumPending: null,
      pdfScale: 1.0,
      userZoomed: false
    };

    function showToast(msg, type='info') {
      const toast = document.createElement('div');
      toast.className = `p-4 rounded-2xl shadow-2xl border text-[10px] font-black transition-all duration-300 z-[1000000] ${type==='error'?'bg-red-50 text-red-600 border-red-200':'bg-brand-50 text-brand-600 border-brand-200'}`;
      toast.textContent = msg;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // 초기 UI 세팅
    function initUI() {
        const omrGrid = document.getElementById('omr-grid-container');
        if(omrGrid) {
            let html = '';
            for(let i=1; i<=10; i++) {

    async function loadGlobalAnswerKey() {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folder}/${GITHUB_CONFIG.answerKeyFileName}`;
        try {
            const res = await fetch(url);
            if(res.ok) {
                const blob = await res.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    state.answerKeyPdfData = reader.result.split(',')[1];
                    document.getElementById('answer-key-badge').classList.remove('hidden');
                };
                reader.readAsDataURL(blob);
            }
        } catch(e) {}
    }

    async function scanGitHub() {
        const refreshIcon = document.getElementById('refresh-icon');
        refreshIcon?.classList.add('animate-spin');
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf') && f.name !== GITHUB_CONFIG.answerKeyFileName);
            state.filteredFiles = [...state.allFiles];
            renderFileList();
        } catch (e) {
            document.getElementById('material-list').innerHTML = `<p class="text-[10px] text-red-500 p-10 text-center font-bold">SYNC ERROR</p>`;
        } finally { refreshIcon?.classList.remove('animate-spin'); }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        if (state.filteredFiles.length === 0) {
            container.innerHTML = `<p class="text-center text-[10px] text-slate-400 py-10 font-bold uppercase tracking-widest">No PDFs</p>`;
            return;
        }
        container.innerHTML = state.filteredFiles.map(file => `
            <button onclick="app.loadMaterial('${file.name}', '${file.download_url}')" id="btn-${file.name}" 
                class="file-btn w-full flex items-center p-2.5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-brand-500 transition-all text-left group">

                <div class="flex-1 truncate font-bold text-[10px] text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white uppercase tracking-tighter">${file.name}</div>
            </button>

    // 🌟 Firestore 일정(schedule) 연동 로직
    function fetchStudySchedule() {
        if(!state.user) return;
        const scheduleRef = doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule');
        onSnapshot(scheduleRef, (docSnap) => {
            if(docSnap.exists()) {
                const data = docSnap.data();
                if(data.weeks && Array.isArray(data.weeks)) {
                    state.weeks = data.weeks.map(w => w.weekNum);
                }
            } else {
                state.weeks = []; 
            }
            app.updateWeekDropdowns();
        }, (error) => { console.error("Schedule Error:", error); });
    }

    function fetchPublicSubmissions() {
        if(!state.user) return;
        const submissionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        const q = query(submissionsRef);
        
        onSnapshot(q, (snapshot) => {
            const subs = [];
            snapshot.forEach(doc => subs.push({ id: doc.id, ...doc.data() }));
            subs.sort((a, b) => b.timestamp - a.timestamp);
            state.allSubmissions = subs;
            
            app.updateCommunityWorks();
            if(state.mode === 'community') app.renderCommunityRecords();
        }, (error) => { console.error("Records Error:", error); });
    }

      loadMaterial: async (name, url) => {
        if (state.isFetching) return;
        state.isFetching = true;
        
        document.querySelectorAll('.file-btn').forEach(b => b.classList.remove('border-brand-500', 'bg-brand-50/30'));

        if(activeBtn) activeBtn.classList.add('border-brand-500', 'bg-brand-50/30');
        
        // 🌟 로드 시 UI 제어
        document.getElementById('viewer-filename').textContent = "LINKING...";
        
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          
          const reader = new FileReader();
          reader.onloadend = () => {
            state.problemPdfData = reader.result.split(',')[1];
            state.currentFileName = name;
            
            // UI 요소 활성화
            document.getElementById('viewer-placeholder').classList.add('hidden');
            document.getElementById('pdf-canvas-container').classList.remove('hidden');
            document.getElementById('pdf-controls').classList.remove('hidden');
            document.getElementById('pdf-controls').classList.add('flex');
            document.getElementById('viewer-filename').textContent = name;
            
            // 🌟 PDF.js 렌더링 실행
            app.renderPDF(state.problemPdfData);
            
            showToast(`${name} 로드 완료`);
            state.isFetching = false;
          };
          reader.readAsDataURL(blob);
        } catch (e) { showToast("로드 실패", "error"); state.isFetching = false; }
      },

      // 🌟 PDF.js 전용 렌더링 로직 (모바일 하얀화면 방지)
      renderPDF: async (base64Data) => {
        try {
            const pdfData = atob(base64Data);
            const uint8Array = new Uint8Array(pdfData.length);
            for (let i = 0; i < pdfData.length; i++) {
              uint8Array[i] = pdfData.charCodeAt(i);
            }

            const loadingTask = pdfjsLib.getDocument({data: uint8Array});
            state.pdfDoc = await loadingTask.promise;
            document.getElementById('page_count').textContent = state.pdfDoc.numPages;
            state.pageNum = 1;
            state.userZoomed = false;
            app.renderPage(state.pageNum);
        } catch (error) {
            console.error('PDF Render Error:', error);
            showToast("PDF 렌더링 오류", "error");
        }
      },

      renderPage: (num) => {
        state.pageRendering = true;
        state.pdfDoc.getPage(num).then((page) => {
          const canvas = document.getElementById('pdf-canvas');
          const ctx = canvas.getContext('2d');
          
          let finalScale = state.pdfScale;
          if(!state.userZoomed) {
              const containerWidth = document.getElementById('pdf-canvas-container').clientWidth;
              const unscaledViewport = page.getViewport({scale: 1});
              // 화면 너비에 캔버스를 맞춥니다. (여백 20px)
              finalScale = (containerWidth - 20) / unscaledViewport.width; 
              state.pdfScale = finalScale;
          }

          const viewport = page.getViewport({scale: finalScale});
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          const renderContext = { canvasContext: ctx, viewport: viewport };
          
          page.render(renderContext).promise.then(() => {
            state.pageRendering = false;
            // 캔버스 노출
            canvas.classList.remove('hidden');
            if (state.pageNumPending !== null) {
              app.renderPage(state.pageNumPending);
              state.pageNumPending = null;
            }
          });
        });
        document.getElementById('page_num').textContent = num;
      },

      queueRenderPage: (num) => {
        if (state.pageRendering) state.pageNumPending = num;
        else app.renderPage(num);
      },
      prevPage: () => {
        if (state.pageNum <= 1) return;
        state.pageNum--;
        app.queueRenderPage(state.pageNum);
      },
      nextPage: () => {
        if (state.pageNum >= state.pdfDoc.numPages) return;
        state.pageNum++;
        app.queueRenderPage(state.pageNum);
      },
      zoomIn: () => {
        state.userZoomed = true;
        state.pdfScale += 0.2;
        app.queueRenderPage(state.pageNum);
      },
      zoomOut: () => {
        if (state.pdfScale <= 0.6) return;
        state.userZoomed = true;
        state.pdfScale -= 0.2;
        app.queueRenderPage(state.pageNum);
      },

      // 🌟 주차 드롭다운 업데이트 (Firestore schedule 연동)
      updateWeekDropdowns: () => {

          const currentSelectWeek = select.value;
          select.innerHTML = optionsHtml;
          if(state.weeks.includes(currentSelectWeek)) select.value = currentSelectWeek;
          
          const currentFilterWeek = filter.value;
          filter.innerHTML = optionsHtml;
          if(state.weeks.includes(currentFilterWeek)) filter.value = currentFilterWeek;
          
          app.updateCommunityWorks();

      submitEssay: async () => {

        const workName = document.getElementById('essay-work-name').value.trim();
        if(!workName) return showToast("작품명을 반드시 입력하세요.", "error");
        if(!week) return showToast("선택된 주차가 없습니다.", "error");

        for(let i=1; i<=2; i++) {
            const n = document.getElementById(`essay-num-${i}`).value.trim();
            const a = document.getElementById(`essay-ans-${i}`).value.trim();

        }
        if(ess.length === 0) return showToast("답안을 입력하세요.", "error");

        const btn = document.getElementById('ai-essay-btn');
        const icon = document.getElementById('ai-essay-icon');

        const recordData = {

            userId: state.user.uid, userName: `익명-${state.user.uid.substring(0,4)}`
        };

        const sysPrompt = "당신은 임용 국어 전문가입니다. '정답 해설지'의 핵심 키워드를 기준으로 학생의 서술형 답안을 엄격히 채점하고 예상 점수와 피드백을 제공하세요.";

      processAIRequest: async (btn, icon, parts, sysMsg, recordData) => {
        const area = document.getElementById('ai-response-area');
        const cont = document.getElementById('ai-response-content');
        
        btn.disabled = true;
        if(icon) icon.classList.add('animate-spin-custom');
        area.classList.add('hidden');

        if (state.problemPdfData) {
            parts.push({ inlineData: { mimeType: "application/pdf", data: state.problemPdfData } });
            parts[0].text += "\n\n(참조 1: 문제지)";
        }
        if (state.answerKeyPdfData) {
            parts.push({ inlineData: { mimeType: "application/pdf", data: state.answerKeyPdfData } });
            parts[0].text += "\n\n(참조 2: 공식 정답 해설지. 반드시 이것을 우선 기준으로 삼을 것.)";
        }

        try {
          const res = await app.callGemini(parts, sysMsg);
          cont.innerHTML = res.replace(/\n/g, "<br>");
          area.classList.remove('hidden');
          area.scrollIntoView({ behavior: 'smooth' });

          if(recordData && state.user) {
              recordData.aiFeedback = res;
              const submissionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
              await addDoc(submissionsRef, recordData);
              showToast("공동 기록에 공유되었습니다.", "success");
          }
        } catch (e) { showToast("AI 통신 오류", "error"); } finally { 
            btn.disabled = false; 
            if(icon) icon.classList.remove('animate-spin-custom'); 
        }
      },

      callGemini: async (parts, system) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const res = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ contents: [{ parts }], systemInstruction: { parts: [{ text: system }] } }) 
        });
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "결과 생성 실패";
      },

                          <div class="text-[11px] font-bold text-slate-700 dark:text-slate-300 mb-4 whitespace-pre-wrap pl-2 border-l-2 border-slate-300 dark:border-slate-700">${r.userAnswers.join('\n')}</div>
                          
                          <p class="text-[9px] font-black text-brand-500 mb-2 uppercase tracking-widest">AI Feedback</p>
                          <div class="p-3.5 bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 text-[11px] leading-relaxed dark:text-slate-300 prose prose-sm prose-slate dark:prose-invert max-w-none">
                              ${r.aiFeedback.replace(/\n/g, '<br>')}
                          </div>
                      </div>
                  </div>
              </div>
          `}).join('');
          lucide.createIcons();
      }
    };

  </script>
</body>
</html>
