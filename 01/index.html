  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- 환경 설정 및 보안 조립 ---
    const GITHUB_CONFIG = { username: "kimjs2623", repo: "for-study", branch: "main", folder: "01/pdf", answerKeyFileName: "정답해설.pdf" };
    const firebaseConfig = { apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA", projectId: "study-99725", appId: "1:850626154259:web:c3307473b7fbb09d9554e6" };
    const appId = 'my-study-app'; 

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);

    const state = { 
        user: null, allFiles: [], filteredFiles: [], problemPdfBlob: null,
        answerKeyPdfDoc: null, answerPageNum: 1, answerPdfScale: 1.5,
        isFetching: false, mode: 'omr', weeks: [], allSubmissions: [], editingDocId: null, 
        pdfDoc: null, pageNum: 1, pdfScale: 1.2, userZoomed: false, docWeeks: [] 
    };

    async function getUserName() {
        if(!state.user) return "익명";
        try {
            const profileRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
            const profileSnap = await getDoc(profileRef);
            if(profileSnap.exists()) return profileSnap.data().name || "스터디원";
        } catch(e) {}
        return "스터디원";
    }

    function updateGlobalWeeks() {
        const existingWeeks = state.allSubmissions.filter(s => !s.isDeleted).map(s => String(s.week));
        state.weeks = [...new Set([...state.docWeeks, ...existingWeeks])].filter(w => w && w !== 'undefined' && w !== 'null' && w !== "" && String(w) !== "[object Object]");
        state.weeks.sort((a, b) => (parseInt(a) || 0) - (parseInt(b) || 0));

        ['week-select', 'comm-week-filter'].forEach(id => {
            const el = document.getElementById(id);
            if(!el) return;
            const prev = el.value;
            el.innerHTML = `<option value="">주차 선택</option>` + state.weeks.map(w => `<option value="${w}">${w}</option>`).join('');
            if(state.weeks.includes(prev)) el.value = prev;
        });
        window.StudyApp.updateCommunityWorks();
    }

    window.StudyApp = {
      showToast: (msg, type='info') => {
        const toast = document.createElement('div');
        toast.className = `p-4 rounded-xl shadow-2xl border text-[10px] font-black transition-all duration-300 z-[1000000] pointer-events-auto flex items-center ${type==='error'?'bg-red-50 text-red-600 border-red-200':'bg-brand-50 text-brand-600 border-brand-200'}`;
        toast.innerHTML = `<i data-lucide="${type==='error'?'alert-circle':'info'}" class="w-4 h-4 mr-2"></i><span>${msg}</span>`;
        document.getElementById('toast-container').appendChild(toast);
        if(typeof lucide !== 'undefined') lucide.createIcons();
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
      },

      initUI: () => {
        const omrGrid = document.getElementById('omr-grid-container');
        if(omrGrid) {
            let html = '';
            for(let i=1; i<=10; i++) html += `<div class="space-y-1 text-center"><label class="text-[9px] font-black text-slate-400 uppercase">${i}</label><input type="text" id="omr-${i}" class="w-full p-2 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-lg text-xs font-bold text-center outline-none uppercase shadow-sm"></div>`;
            omrGrid.innerHTML = html;
        }
        const essayGrid = document.getElementById('essay-grid-container');
        if(essayGrid) {
            let html = '';
            for(let i=1; i<=2; i++) html += `<div class="shadow-sm rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 transition-all focus-within:ring-2 focus-within:ring-brand-500/10"><div class="flex items-center justify-between bg-slate-50 dark:bg-slate-900/50 p-2.5 border-b border-slate-200 dark:border-slate-800"><span class="text-[9px] font-black text-slate-400 uppercase ml-1">Question 0${i}</span><input type="text" id="essay-num-${i}" placeholder="번호" class="w-14 bg-white dark:bg-slate-950 border border-slate-200 text-[10px] text-center rounded py-1 outline-none"></div><textarea id="essay-ans-${i}" placeholder="서술형 답안을 작성하세요..." class="w-full h-32 p-4 bg-white dark:bg-slate-950 text-xs resize-none outline-none custom-scrollbar border-none transition-all"></textarea></div>`;
            essayGrid.innerHTML = html;
        }
        if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      setMode: (mode) => {
        state.mode = mode;
        ['omr', 'essay', 'community'].forEach(m => {
            const el = document.getElementById(`view-${m}`);
            if(el) el.classList.toggle('hidden', m !== mode);
            const tab = document.getElementById(`tab-${m}`);
            if(tab) {
                if(m === mode) { tab.classList.add('tab-active'); tab.classList.remove('text-slate-500'); }
                else { tab.classList.remove('tab-active'); tab.classList.add('text-slate-500'); }
            }
        });
        document.getElementById('week-selector-bar').classList.remove('hidden');
        if(mode === 'community') window.StudyApp.renderCommunityRecords();
        if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      toggleDarkMode: () => {
        const isDark = document.documentElement.classList.toggle('dark');
        const icon = document.getElementById('dark-mode-icon');
        if (icon) icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        if(typeof lucide !== 'undefined') lucide.createIcons();
      },

      refreshFiles: () => scanGitHub(),
      filterFiles: () => {
        const q = document.getElementById('file-search').value.toLowerCase();
        state.filteredFiles = state.allFiles.filter(f => f.name.toLowerCase().includes(q));
        renderFileList();
      },

      toggleFullScreen: () => {
        const viewer = document.getElementById('viewer-container');
        const isFull = viewer.classList.toggle('viewer-fullscreen');
        document.body.style.overflow = isFull ? 'hidden' : '';
        document.getElementById('exit-fullscreen-fab').classList.toggle('hidden', !isFull);
        if(state.pdfDoc) window.StudyApp.renderPage(state.pageNum);
      },

      loadMaterial: async (name, url) => {
        if (state.isFetching) return;
        state.isFetching = true;
        
        const cleanName = name.replace('.pdf', '');
        document.getElementById('viewer-filename').textContent = cleanName;
        document.getElementById('viewer-placeholder').classList.add('hidden');
        document.querySelectorAll('.file-btn').forEach(b => b.classList.remove('border-brand-500', 'bg-brand-50/30'));
        document.getElementById(`btn-${name.replace(/\s+/g, '')}`)?.classList.add('border-brand-500', 'bg-brand-50/30');
        
        // 입력칸 자동완성
        const match = cleanName.match(/^(\d+)\s*(.*)/);
        let parsedNum = "", parsedName = cleanName;
        if(match) { parsedNum = match[1]; parsedName = match[2]; }

        ['omr-work', 'essay-work'].forEach(prefix => {
            const numEl = document.getElementById(`${prefix}-num`);
            const nameEl = document.getElementById(`${prefix}-name`);
            if(numEl) numEl.value = parsedNum;
            if(nameEl) nameEl.value = parsedName;
        });

        try {
          const res = await fetch(url);
          const blob = await res.blob();
          state.problemPdfBlob = blob;
          await window.StudyApp.renderPDF(blob);
          window.StudyApp.showToast(`${cleanName} 로드 완료`);
        } catch (e) { window.StudyApp.showToast("PDF 로드 실패", "error"); }
        finally { state.isFetching = false; }
      },

      renderPDF: async (blob) => {
        const arrayBuffer = await blob.arrayBuffer();
        state.pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        document.getElementById('page_count').textContent = state.pdfDoc.numPages;
        document.getElementById('pdf-controls').classList.remove('hidden');
        document.getElementById('pdf-canvas-container').classList.remove('hidden');
        state.pageNum = 1; state.userZoomed = false;
        window.StudyApp.renderPage(state.pageNum);
      },

      renderPage: (num) => {
        state.pdfDoc.getPage(num).then((page) => {
          const canvas = document.getElementById('pdf-canvas');
          const ctx = canvas.getContext('2d');
          const container = document.getElementById('pdf-canvas-container');
          if(!state.userZoomed) state.pdfScale = (container.clientWidth - 30) / page.getViewport({scale: 1}).width;
          const viewport = page.getViewport({scale: state.pdfScale});
          canvas.height = viewport.height; canvas.width = viewport.width;
          page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => canvas.classList.remove('hidden'));
          document.getElementById('page_num').textContent = num;
        });
      },

      prevPage: () => { if (state.pageNum > 1) { state.pageNum--; window.StudyApp.renderPage(state.pageNum); } },
      nextPage: () => { if (state.pageNum < state.pdfDoc.numPages) { state.pageNum++; window.StudyApp.renderPage(state.pageNum); } },
      zoomIn: () => { state.userZoomed = true; state.pdfScale += 0.25; window.StudyApp.renderPage(state.pageNum); },
      zoomOut: () => { if (state.pdfScale > 0.5) { state.userZoomed = true; state.pdfScale -= 0.25; window.StudyApp.renderPage(state.pageNum); } },

      updateCommunityWorks: () => {
          const w = document.getElementById('comm-week-filter').value;
          const prevWork = document.getElementById('comm-work-filter').value;
          const works = [...new Set(state.allSubmissions.filter(s => s.week === w && !s.isDeleted).map(s => s.workName))];
          const el = document.getElementById('comm-work-filter');
          el.innerHTML = works.length ? `<option value="">작품 선택</option>` + works.map(w => `<option value="${w}">${w}</option>`).join('') : `<option value="">기록 없음</option>`;
          if (works.includes(prevWork)) el.value = prevWork;
          window.StudyApp.renderCommunityRecords();
      },

      // 🌟 정답해설 전문 렌더링 함수
      renderAnswerPage: (num) => {
          if(!state.answerKeyPdfDoc) return;
          state.answerKeyPdfDoc.getPage(num).then((page) => {
              const canvas = document.getElementById('answer-pdf-canvas');
              const ctx = canvas.getContext('2d');
              const viewport = page.getViewport({scale: state.answerPdfScale});
              canvas.height = viewport.height; 
              canvas.width = viewport.width;
              page.render({ canvasContext: ctx, viewport: viewport });
              document.getElementById('ans_page_num').textContent = num;
          });
      },
      prevAnswerPage: () => { if (state.answerPageNum > 1) { state.answerPageNum--; window.StudyApp.renderAnswerPage(state.answerPageNum); } },
      nextAnswerPage: () => { if (state.answerPageNum < state.answerKeyPdfDoc.numPages) { state.answerPageNum++; window.StudyApp.renderAnswerPage(state.answerPageNum); } },
      zoomInAnswer: () => { state.answerPdfScale += 0.25; window.StudyApp.renderAnswerPage(state.answerPageNum); },
      zoomOutAnswer: () => { if (state.answerPdfScale > 0.5) { state.answerPdfScale -= 0.25; window.StudyApp.renderAnswerPage(state.answerPageNum); } },

      // 🌟 제출 여부 확인 후 공식 답지(전문) 띄우는 로직
      showOfficialAnswer: async () => {
          let week = "", name = "";
          
          if (state.mode === 'omr') { 
              week = document.getElementById('week-select').value;
              name = document.getElementById('omr-work-name').value.trim(); 
          } else if (state.mode === 'essay') { 
              week = document.getElementById('week-select').value;
              name = document.getElementById('essay-work-name').value.trim(); 
          } else if (state.mode === 'community') { 
              week = document.getElementById('comm-week-filter').value;
              name = document.getElementById('comm-work-filter').value; 
          }
          
          if (!week || !name) {
              return window.StudyApp.showToast("주차와 작품명을 먼저 지정(또는 선택)해주세요.", "error");
          }
          if (!state.answerKeyPdfDoc) {
              return window.StudyApp.showToast("정답 해설지 PDF가 아직 로드되지 않았습니다.", "error");
          }

          // 🌟 1. 제출 여부 검증 (자신의 uid로 해당 주차/작품에 제출한 기록이 있는지 확인)
          const hasSubmitted = state.allSubmissions.some(s => s.userId === state.user.uid && s.week === week && s.workName === name && !s.isDeleted);
          
          if (!hasSubmitted) {
              return window.StudyApp.showToast(`[${name}]의 답안을 먼저 제출해야 해설을 확인할 수 있습니다!`, "error");
          }

          // 🌟 2. 제출 확인 시 전문 PDF 띄우기
          document.getElementById('ans_page_count').textContent = state.answerKeyPdfDoc.numPages;
          document.getElementById('answer-modal').classList.remove('hidden');
          
          state.answerPageNum = 1;
          window.StudyApp.renderAnswerPage(state.answerPageNum);
      },

      // 🌟 OMR 기록 제출
      submitOMR: async () => {
        const week = document.getElementById('week-select').value;
        if(!week) return window.StudyApp.showToast("주차를 먼저 선택해 주세요.", "error");
        const workNum = document.getElementById('omr-work-num').value.trim();
        const workName = document.getElementById('omr-work-name').value.trim();
        if(!workName) return window.StudyApp.showToast("작품 이름을 입력해주세요.", "error");
        
        const ans = [];
        for(let i=1; i<=10; i++) {
            const v = document.getElementById(`omr-${i}`).value.trim();
            if(v) ans.push(`Q${i}: ${v}`);
        }
        if(!ans.length) return window.StudyApp.showToast("답안을 입력해 주세요.", "error");

        const btn = document.getElementById('submit-omr-btn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin-custom"></i> 기록 중...`;
        if(typeof lucide !== 'undefined') lucide.createIcons();

        try {
            const userName = await getUserName();
            const recordData = { week, workName, type: "OMR", userAnswers: ans, userId: state.user.uid, userName, isDeleted: false, timestamp: Date.now() };
            
            if (state.editingDocId) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', state.editingDocId), { ...recordData, isEdited: true, editedAt: Date.now() });
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), recordData);
            }
            
            state.editingDocId = null; 
            document.getElementById('editing-badge').classList.add('hidden');
            window.StudyApp.showToast("기록 완료! 이제 해설을 볼 수 있습니다.", "success");
            
            // 제출 후 초기화
            for(let i=1; i<=10; i++) document.getElementById(`omr-${i}`).value = '';
            window.StudyApp.setMode('community');
        } catch(e) {
            window.StudyApp.showToast(`오류 발생: ${e.message}`, "error");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }
      },

      // 🌟 서술형 기록 제출
      submitEssay: async () => {
        const week = document.getElementById('week-select').value;
        if(!week) return window.StudyApp.showToast("주차를 먼저 선택해 주세요.", "error");
        const workNum = document.getElementById('essay-work-num').value.trim();
        const workName = document.getElementById('essay-work-name').value.trim();
        if(!workName) return window.StudyApp.showToast("작품 이름을 입력해주세요.", "error");
        
        const ess = [];
        for(let i=1; i<=2; i++) {
            const n = document.getElementById(`essay-num-${i}`).value.trim();
            const a = document.getElementById(`essay-ans-${i}`).value.trim();
            if(a) ess.push(`[${n || i}번 문항]\n${a}`);
        }
        if(!ess.length) return window.StudyApp.showToast("서술형 답안을 입력해 주세요.", "error");

        const btn = document.getElementById('submit-essay-btn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin-custom"></i> 기록 중...`;
        if(typeof lucide !== 'undefined') lucide.createIcons();

        try {
            const userName = await getUserName();
            const recordData = { week, workName, type: "Essay", userAnswers: ess, userId: state.user.uid, userName, isDeleted: false, timestamp: Date.now() };
            
            if (state.editingDocId) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', state.editingDocId), { ...recordData, isEdited: true, editedAt: Date.now() });
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'), recordData);
            }
            
            state.editingDocId = null; 
            document.getElementById('editing-badge').classList.add('hidden');
            window.StudyApp.showToast("서술형 기록 완료! 이제 해설을 볼 수 있습니다.", "success");

            // 제출 후 초기화
            for(let i=1; i<=2; i++) document.getElementById(`essay-ans-${i}`).value = '';
            window.StudyApp.setMode('community');
        } catch(e) {
            window.StudyApp.showToast(`오류 발생: ${e.message}`, "error");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }
      },

      editSubmission: (docId, type) => {
          const record = state.allSubmissions.find(s => s.id === docId);
          if(!record) return;
          state.editingDocId = docId; document.getElementById('editing-badge').classList.remove('hidden');
          window.StudyApp.setMode(type.toLowerCase() === 'omr' ? 'omr' : 'essay');
          window.StudyApp.showToast("수정 모드로 전환되었습니다.");
      },

      deleteSubmission: (docId) => {
          const modal = document.getElementById('delete-modal');
          modal.classList.remove('hidden');
          document.getElementById('confirm-delete-btn').onclick = async () => {
              modal.classList.add('hidden');
              await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', docId));
              window.StudyApp.showToast("삭제 완료");
          };
      },

      // Shared Records 표시
      renderCommunityRecords: () => {
          const w = document.getElementById('comm-week-filter').value;
          const work = document.getElementById('comm-work-filter').value;
          const container = document.getElementById('community-container');
          if(!w || !work) { container.innerHTML = `<p class="text-center py-10 text-[10px] text-slate-400">조회할 주차와 작품을 선택하세요.</p>`; return; }
          const subs = state.allSubmissions.filter(s => s.week === w && s.workName === work);
          
          container.innerHTML = subs.map(r => `
              <div class="bg-white dark:bg-slate-900 border ${r.userId === state.user.uid ? 'border-brand-400 shadow-sm' : 'border-slate-200 dark:border-slate-800'} rounded-xl overflow-hidden mb-2 transition-all">
                  <div onclick="this.nextElementSibling.classList.toggle('hidden')" class="p-3.5 cursor-pointer flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800/30">
                      <div class="flex items-center space-x-2">
                          <span class="text-[11px] font-black">${r.userId === state.user.uid ? '🌟 나의 답안' : r.userName}</span>
                          <span class="text-[9px] font-bold text-slate-400 border border-slate-200 dark:border-slate-700 px-1.5 py-0.5 rounded uppercase">${r.type}</span>
                      </div>
                      <div class="flex space-x-1">
                          ${r.userId === state.user.uid ? `<button onclick="window.StudyApp.editSubmission('${r.id}', '${r.type}'); event.stopPropagation();" class="text-[9px] font-bold text-brand-500 bg-brand-50 px-2 py-1 rounded transition-all hover:bg-brand-100">수정</button>` : ''}
                          <button onclick="window.StudyApp.deleteSubmission('${r.id}'); event.stopPropagation();" class="text-[9px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded transition-all hover:bg-red-100">삭제</button>
                      </div>
                  </div>
                  <div class="hidden border-t p-4 bg-slate-50/30 dark:bg-slate-800/20 space-y-3 transition-all">
                      <p class="text-xs font-medium text-slate-700 dark:text-slate-300 whitespace-pre-wrap pl-3 border-l-2 border-brand-400 leading-relaxed">${r.userAnswers.join('\n')}</p>
                  </div>
              </div>
          `).join('');
          if(typeof lucide !== 'undefined') lucide.createIcons();
      }
    };

    async function scanGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`GitHub 오류 (${res.status})`);
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf') && !f.name.includes('정답'));
            state.filteredFiles = [...state.allFiles]; renderFileList();
        } catch (e) { 
            document.getElementById('material-list').innerHTML = `<p class="text-[10px] text-amber-600 p-6 text-center font-bold break-words">${e.message}<br><br>번호/명을 수동 입력하면 정상 작동합니다.</p>`; 
        }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        container.innerHTML = state.filteredFiles.map(f => `
            <button onclick="window.StudyApp.loadMaterial('${f.name}', '${f.download_url}')" id="btn-${f.name.replace(/\s+/g, '')}" class="file-btn w-full flex items-center p-2.5 rounded-xl border border-slate-100 bg-white dark:bg-slate-900 text-left transition-all hover:bg-brand-50/10 shadow-sm">
                <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2 text-slate-300"></i>
                <div class="truncate font-bold text-[10px] uppercase">${f.name}</div>
            </button>
        `).join('');
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    async function loadGlobalAnswerKey() {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folder}/${GITHUB_CONFIG.answerKeyFileName}`;
        const badge = document.getElementById('answer-key-badge');
        try {
            const res = await fetch(url);
            if(res.ok) {
                const arrayBuffer = await res.arrayBuffer();
                state.answerKeyPdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                badge.innerHTML = `<i data-lucide="check-circle" class="w-3 h-3 mr-1"></i> Key Ready`;
                badge.className = "hidden sm:flex items-center bg-emerald-50 text-emerald-600 border border-emerald-200 px-2 py-1 rounded text-[9px] font-black uppercase transition-all";
            } else throw new Error();
        } catch(e) {
            badge.innerHTML = `<i data-lucide="x-circle" class="w-3 h-3 mr-1"></i> Key Load Failed`;
            badge.className = "hidden sm:flex items-center bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded text-[9px] font-black uppercase transition-all";
        }
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    function fetchStudySchedule() {
        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'studyInfo', 'schedule'), (snap) => {
            state.docWeeks = [];
            if (snap.exists()) {
                const weeks = snap.data().weeks;
                if(weeks && Array.isArray(weeks)) {
                    weeks.forEach(w => {
                        const val = (typeof w === 'object' && w !== null) ? (w.week || w.weekNum || w.title) : w;
                        if(val && String(val) !== "[object Object]") {
                          const formatted = String(val).includes('주차') ? val : val + '주차';
                          state.docWeeks.push(formatted);
                        }
                    });
                }
            }
            updateGlobalWeeks();
        });
    }

    function fetchPublicSubmissions() {
        onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'submissions')), (snap) => {
            const subs = []; snap.forEach(doc => subs.push({ id: doc.id, ...doc.data() }));
            subs.sort((a, b) => b.timestamp - a.timestamp);
            state.allSubmissions = subs; updateGlobalWeeks();
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) { 
            state.user = user; window.StudyApp.initUI(); scanGitHub(); loadGlobalAnswerKey(); fetchStudySchedule(); fetchPublicSubmissions(); window.StudyApp.setMode('omr'); 
        } else signInAnonymously(auth);
    });
  </script>
</body>
</html>
