<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가온길 문학 AI 스터디</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { 
        extend: { 
          fontFamily: { sans: ['Pretendard', 'Apple SD Gothic Neo', 'sans-serif'] },
          colors: {
            brand: {
              50: '#f5f7ff',
              500: '#4f46e5',
              600: '#4338ca',
            }
          }
        } 
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-custom { animation: spin 1s linear infinite; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* 분할 화면 조정 */
    .viewer-container { height: calc(100vh - 180px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300 font-sans dark:bg-slate-950 dark:text-slate-200 min-h-screen">

  <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3"></div>

  <!-- 상단 네비게이션 -->
  <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
    <div class="max-w-[1600px] mx-auto px-6 h-18 flex items-center justify-between">
      <div class="flex items-center space-x-6">
        <a href="../index.html" class="flex items-center text-brand-600 hover:text-brand-700 dark:text-brand-400 font-black text-lg tracking-tight transition-colors">
          <i data-lucide="home" class="w-5 h-5 mr-2"></i> Home
        </a>
        <div class="h-5 w-px bg-slate-200 dark:bg-slate-800"></div>
        <div class="flex space-x-6 h-full items-center overflow-x-auto no-scrollbar">
            <button onclick="app.setMode('tutor')" id="tab-tutor" class="tab-active text-[11px] font-black py-6 transition-all whitespace-nowrap uppercase tracking-widest">AI Tutor</button>
            <button onclick="app.setMode('omr')" id="tab-omr" class="text-slate-400 text-[11px] font-black py-6 transition-all whitespace-nowrap uppercase tracking-widest">OMR Score</button>
            <button onclick="app.setMode('essay')" id="tab-essay" class="text-slate-400 text-[11px] font-black py-6 transition-all whitespace-nowrap uppercase tracking-widest">Descriptive</button>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <button onclick="app.toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-105 transition-all">
          <i data-lucide="moon" id="dark-mode-icon" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-[1600px] mx-auto px-6 py-8 flex flex-col lg:flex-row gap-6">
    
    <!-- 1. 교재 라이브러리 (왼쪽 사이드바) -->
    <aside class="w-full lg:w-[320px] shrink-0 space-y-4">
      <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-xl border border-slate-200 dark:border-slate-800 flex flex-col h-[700px]">
        <div class="mb-6">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-lg font-black flex items-center text-slate-900 dark:text-white italic uppercase">
              <i data-lucide="library" class="w-5 h-5 mr-2 text-brand-500"></i> Library
            </h2>
            <button onclick="app.refreshFiles()" class="p-2 text-slate-400 hover:text-brand-500 transition-colors">
              <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
            </button>
          </div>
          <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter truncate">kimjs2623/for-study/01/pdf</p>
        </div>

        <div class="relative mb-4">
          <input type="text" id="file-search" oninput="app.filterFiles()" placeholder="작품명 검색..." 
            class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl text-xs font-medium outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white transition-all shadow-inner">
          <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-3 text-slate-400"></i>
        </div>

        <div id="material-list" class="flex-1 overflow-y-auto pr-1 custom-scrollbar space-y-2">
            <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                <i data-lucide="loader-2" class="w-6 h-6 animate-spin mb-3"></i>
                <p class="text-[10px] font-black uppercase">Syncing...</p>
            </div>
        </div>
      </div>
    </aside>

    <!-- 2. PDF 내장 뷰어 (중앙) -->
    <section class="flex-1 min-w-0">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col viewer-container">
            <div class="bg-slate-50 dark:bg-slate-950 px-6 py-3 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i data-lucide="file-text" class="w-4 h-4 text-brand-500"></i>
                    <span id="viewer-filename" class="text-[11px] font-black text-slate-500 uppercase italic">Select a document</span>
                </div>
                <div id="viewer-badge" class="hidden px-2 py-0.5 bg-brand-500 text-white text-[9px] font-black rounded uppercase">Live Viewer</div>
            </div>
            <div class="flex-1 bg-slate-100 dark:bg-slate-950 flex items-center justify-center overflow-hidden">
                <!-- PDF iframe: 브라우저 메모리 로드 방식 -->
                <iframe id="pdf-viewer" class="hidden w-full h-full border-none" src=""></iframe>
                <div id="viewer-placeholder" class="text-center p-10">
                    <div class="w-16 h-16 bg-slate-200 dark:bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="file-text" class="w-8 h-8 text-slate-400"></i>
                    </div>
                    <p class="text-xs font-bold text-slate-400">학습할 교재를 라이브러리에서 선택하세요.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 3. AI 작업 영역 (오른쪽) -->
    <section class="w-full lg:w-[450px] shrink-0 space-y-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col viewer-container overflow-y-auto custom-scrollbar">
            <!-- 탭 전환 컨텐츠 -->
            <div class="p-6 md:p-8 space-y-6">
                <!-- 1. AI 튜터 뷰 -->
                <div id="view-tutor" class="space-y-6 fade-in">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-black text-slate-900 dark:text-white uppercase tracking-tighter italic">AI Tutoring</h3>
                        <div id="ai-status" class="flex items-center text-[9px] font-bold text-slate-400 uppercase">
                            <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300 mr-2"></div>
                            <span id="status-text">Disconnected</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="ai-tutor-target" placeholder="분석 타겟 (예: 상춘곡 1~10행)" class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-xs outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white">
                        <textarea id="ai-tutor-prompt" placeholder="답안을 입력하거나 질문을 작성하세요." class="w-full h-60 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-xs leading-relaxed resize-none outline-none focus:ring-2 focus:ring-brand-500/20 dark:text-white custom-scrollbar"></textarea>
                    </div>
                    <button id="ai-tutor-btn" onclick="app.askAITutor()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 text-white font-black text-sm rounded-2xl transition-all shadow-lg active:scale-95">
                        <i data-lucide="sparkles" id="ai-tutor-icon" class="w-4 h-4 mr-2 inline"></i> 분석 및 채점
                    </button>
                </div>

                <!-- 2. OMR 뷰 -->
                <div id="view-omr" class="hidden space-y-6 fade-in">
                    <h3 class="text-sm font-black text-emerald-600 uppercase tracking-tighter italic">OMR Scorer</h3>
                    <div class="grid grid-cols-5 gap-3">
                        <script>
                            for(let i=1; i<=10; i++) {
                                document.write(`
                                    <div class="space-y-1 text-center">
                                        <label class="text-[9px] font-black text-slate-400 uppercase">${i}</label>
                                        <input type="text" id="omr-${i}" class="w-full p-2 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-lg text-xs font-bold text-center outline-none focus:ring-2 focus:ring-emerald-500/20 dark:text-white">
                                    </div>
                                `);
                            }
                        </script>
                    </div>
                    <button id="ai-omr-btn" onclick="app.gradeOMR()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-200 text-white font-black text-sm rounded-2xl transition-all shadow-lg">
                        채점하기
                    </button>
                </div>

                <!-- 3. 서술형 뷰 -->
                <div id="view-essay" class="hidden space-y-6 fade-in">
                    <h3 class="text-sm font-black text-purple-600 uppercase tracking-tighter italic">Descriptive</h3>
                    <div class="space-y-4">
                        <script>
                            for(let i=1; i<=2; i++) {
                                document.write(`
                                    <div class="space-y-2">
                                        <div class="flex items-center justify-between">
                                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Q${i}</span>
                                            <input type="text" id="essay-num-${i}" placeholder="번호" class="w-12 bg-transparent border-b border-slate-200 dark:border-slate-800 text-[10px] text-center dark:text-white outline-none">
                                        </div>
                                        <textarea id="essay-ans-${i}" placeholder="답안을 입력하세요..." class="w-full h-32 p-4 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl text-xs resize-none outline-none dark:text-white"></textarea>
                                    </div>
                                `);
                            }
                        </script>
                    </div>
                    <button id="ai-essay-btn" onclick="app.gradeEssay()" class="w-full py-4 bg-purple-600 hover:bg-purple-700 disabled:bg-slate-200 text-white font-black text-sm rounded-2xl transition-all shadow-lg">
                        서술형 채점 실행
                    </button>
                </div>

                <!-- AI 결과 표시 -->
                <div id="ai-response-area" class="hidden p-6 bg-brand-50/50 dark:bg-brand-900/10 rounded-2xl border border-brand-100 dark:border-brand-800/50 text-[11px] leading-relaxed dark:text-slate-300">
                    <div id="ai-response-content"></div>
                </div>
            </div>
        </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    /**
     * ⚙️ GITHUB_CONFIG: 질문자님의 깃허브 구조에 최적화
     */
    const GITHUB_CONFIG = {
      username: "kimjs2623", 
      repo: "for-study",             
      branch: "main",                
      folder: "01/pdf"               
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA",
        projectId: "study-99725",
        appId: "1:850626154259:web:c3307473b7fbb09d9554e6"
    };

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const apiKey = ""; // Gemini API 키 (자동 주입)

    const state = {
      allFiles: [],
      filteredFiles: [],
      fileData: null,
      currentFileName: "",
      isFetching: false,
      mode: 'tutor'
    };

    function showToast(msg, type='info') {
      const toast = document.createElement('div');
      toast.className = `p-4 rounded-2xl shadow-xl border text-[10px] font-bold transition-all duration-300 ${type==='error'?'bg-red-50 text-red-600 border-red-100':'bg-brand-50 text-brand-700 border-brand-100'}`;
      toast.textContent = msg;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    async function scanGitHub() {
        const refreshIcon = document.getElementById('refresh-icon');
        refreshIcon?.classList.add('animate-spin');
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf'));
            state.filteredFiles = [...state.allFiles];
            renderFileList();
        } catch (e) {
            document.getElementById('material-list').innerHTML = `<p class="text-[10px] text-red-500 p-10 text-center font-bold">GITHUB SYNC ERROR</p>`;
        } finally { refreshIcon?.classList.remove('animate-spin'); }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        container.innerHTML = state.filteredFiles.map(file => `
            <button onclick="app.loadMaterial('${file.name}', '${file.download_url}')" id="btn-${file.name}" 
                class="file-btn w-full flex items-center p-3 rounded-2xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-brand-500 transition-all text-left group">
                <i data-lucide="file-text" class="w-3.5 h-3.5 mr-3 text-slate-300 group-hover:text-brand-500 transition-colors"></i>
                <div class="flex-1 truncate font-black text-[10px] text-slate-500 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white uppercase tracking-tighter">${file.name}</div>
            </button>
        `).join('');
        lucide.createIcons();
    }

    signInAnonymously(auth).then(() => { onAuthStateChanged(auth, () => scanGitHub()); });

    window.app = {
      setMode: (mode) => {
        state.mode = mode;
        ['tutor', 'omr', 'essay'].forEach(m => {
            document.getElementById(`view-${m}`).classList.toggle('hidden', m !== mode);
            document.getElementById(`tab-${m}`).className = m === mode ? 'tab-active text-[11px] font-black py-6 uppercase tracking-widest' : 'text-slate-400 text-[11px] font-black py-6 uppercase tracking-widest';
        });
        lucide.createIcons();
      },

      toggleDarkMode: () => {
        const isDark = document.documentElement.classList.toggle('dark');
        document.getElementById('dark-mode-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
      },

      refreshFiles: () => scanGitHub(),

      filterFiles: () => {
        const q = document.getElementById('file-search').value.toLowerCase();
        state.filteredFiles = state.allFiles.filter(f => f.name.toLowerCase().includes(q));
        renderFileList();
      },

      loadMaterial: async (name, url) => {
        if (state.isFetching) return;
        state.isFetching = true;
        
        document.querySelectorAll('.file-btn').forEach(b => b.classList.remove('border-brand-500', 'bg-brand-50/30'));
        const activeBtn = document.getElementById(`btn-${name}`);
        if(activeBtn) activeBtn.classList.add('border-brand-500', 'bg-brand-50/30');

        document.getElementById('status-text').textContent = "LINKING...";
        document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-slate-300 animate-pulse";
        
        try {
          // 파일을 Fetch하여 브라우저 메모리에 로드 (다운로드 저장 없이 즉시 보기)
          const res = await fetch(url);
          const blob = await res.blob();
          const reader = new FileReader();
          reader.onloadend = () => {
            state.fileData = reader.result.split(',')[1];
            state.currentFileName = name;
            
            // PDF 뷰어에 Blob URL 주입 (메모리에서 즉시 렌더링)
            const blobUrl = URL.createObjectURL(blob);
            const viewer = document.getElementById('pdf-viewer');
            const placeholder = document.getElementById('viewer-placeholder');
            
            viewer.src = blobUrl;
            viewer.classList.remove('hidden');
            placeholder.classList.add('hidden');
            
            document.getElementById('viewer-filename').textContent = name;
            document.getElementById('viewer-badge').classList.remove('hidden');
            document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-brand-500 shadow-[0_0_8px_rgba(79,70,229,0.8)] animate-none";
            document.getElementById('status-text').textContent = "READY";
            
            showToast(`${name} 로드 완료`);
            state.isFetching = false;
          };
          reader.readAsDataURL(blob);
        } catch (e) { 
            showToast("로드 실패", "error"); 
            state.isFetching = false; 
            document.getElementById('status-text').textContent = "ERROR";
        }
      },

      askAITutor: async () => {
        const target = document.getElementById('ai-tutor-target').value;
        const prompt = document.getElementById('ai-tutor-prompt').value;
        if (!prompt.trim()) return showToast("분석할 내용을 입력하세요.", "error");

        const btn = document.getElementById('ai-tutor-btn');
        const icon = document.getElementById('ai-tutor-icon');
        app.processAIRequest(btn, icon, [
            { text: `[타겟: ${target}]\n[질문/답안]: ${prompt}` }
        ], "전공 국어 임용고시 문학 전문가입니다. 서술형 답안 채점 및 해설을 제공하세요.");
      },

      gradeOMR: async () => {
        const ans = [];
        for(let i=1; i<=10; i++) {
            const v = document.getElementById(`omr-${i}`).value.trim();
            if(v) ans.push(`Q${i}: ${v}`);
        }
        if(ans.length === 0) return showToast("답안을 입력하세요.", "error");

        const btn = document.getElementById('ai-omr-btn');
        const icon = btn.querySelector('i');
        app.processAIRequest(btn, icon, [
            { text: `다음 객관식/단답형 답안을 PDF 자료의 문항과 대조하여 채점하고 정답 근거를 설명하세요:\n${ans.join('\n')}` }
        ], "PDF 교재 내 문항의 정답과 대조하여 정오표와 해설을 제공하는 강사입니다.");
      },

      gradeEssay: async () => {
        const ess = [];
        for(let i=1; i<=2; i++) {
            const n = document.getElementById(`essay-num-${i}`).value.trim();
            const a = document.getElementById(`essay-ans-${i}`).value.trim();
            if(a) ess.push(`[${n || i}번 문항]\n답안: ${a}`);
        }
        if(ess.length === 0) return showToast("답안을 입력하세요.", "error");

        const btn = document.getElementById('ai-essay-btn');
        const icon = btn.querySelector('i');
        app.processAIRequest(btn, icon, [
            { text: `다음 서술형 답안들을 임용고시 채점 기준(키워드 포함 여부)에 맞춰 채점하세요:\n\n${ess.join('\n\n')}` }
        ], "전공 국어 전문가로서 서술형 답안을 채점하고 상세 피드백을 제공하세요.");
      },

      processAIRequest: async (btn, icon, parts, sys) => {
        const area = document.getElementById('ai-response-area');
        const cont = document.getElementById('ai-response-content');
        
        btn.disabled = true;
        if(icon) icon.classList.add('animate-spin-custom');
        area.classList.add('hidden');

        if (state.fileData) {
            parts.push({ inlineData: { mimeType: "application/pdf", data: state.fileData } });
        }

        try {
          const res = await app.callGemini(parts, sys);
          cont.innerHTML = res.replace(/\n/g, "<br>");
          area.classList.remove('hidden');
          area.scrollIntoView({ behavior: 'smooth' });
        } catch (e) { showToast("AI 통신 오류", "error"); } finally { 
            btn.disabled = false; 
            if(icon) icon.classList.remove('animate-spin-custom'); 
        }
      },

      callGemini: async (parts, system) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const res = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ contents: [{ parts }], systemInstruction: { parts: [{ text: system }] } }) 
        });
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "결과 생성 실패";
      }
    };

    lucide.createIcons();
  </script>
</body>
</html>
