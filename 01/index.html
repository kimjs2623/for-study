  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /**
     * ⚙️ GITHUB_CONFIG: 질문자님의 깃허브 정보
     */
    const GITHUB_CONFIG = {
      username: "kimjs2623", 
      repo: "for-study",             
      branch: "main",                
      folder: "01/pdf",
      // 🌟 공통 해설지 파일명 지정 (01/pdf 폴더 내에 있어야 함)
      answerKeyFileName: "정답해설.pdf" 
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD2jQ_ElbhPq2ycvS_FTu3Uel5FFLoC8oA",
        projectId: "study-99725",
        appId: "1:850626154259:web:c3307473b7fbb09d9554e6"
    };

    const appAuth = initializeApp(firebaseConfig);
    const auth = getAuth(appAuth);
    const db = getFirestore(appAuth);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-study-app';
    const apiKey = ""; 

    const state = {
      user: null,
      allFiles: [],
      filteredFiles: [],
      problemPdfData: null,   // 현재 풀고 있는 문제지 Base64
      answerKeyPdfData: null, // 공통 정답 해설지 Base64
      currentFileName: "",
      isFetching: false,
      mode: 'tutor',
      weeks: ['1주차'],
      myRecords: [] // Firestore에서 가져온 내 제출 기록
    };

    function showToast(msg, type='info') {
      const toast = document.createElement('div');
      toast.className = `p-4 rounded-xl shadow-xl border text-[10px] font-black transition-all duration-300 z-[10001] ${type==='error'?'bg-red-50 text-red-600 border-red-200':'bg-brand-50 text-brand-600 border-brand-200'}`;
      toast.textContent = msg;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // 1. 공통 정답 해설지 백그라운드 로드
    async function loadGlobalAnswerKey() {
        const url = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folder}/${GITHUB_CONFIG.answerKeyFileName}`;
        try {
            const res = await fetch(url);
            if(res.ok) {
                const blob = await res.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    state.answerKeyPdfData = reader.result.split(',')[1];
                    document.getElementById('answer-key-badge').classList.remove('hidden');
                    console.log("Global Answer Key Loaded!");
                };
                reader.readAsDataURL(blob);
            } else {
                console.warn("해설지를 찾을 수 없습니다. (이름이 일치하는지 확인하세요)");
            }
        } catch(e) { console.warn("해설지 로드 중 오류", e); }
    }

    // 2. 문제지 목록 스캔
    async function scanGitHub() {
        const refreshIcon = document.getElementById('refresh-icon');
        refreshIcon?.classList.add('animate-spin');
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.folder}?ref=${GITHUB_CONFIG.branch}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            // 해설지는 목록에서 숨기고 일반 PDF만 보여줍니다.
            state.allFiles = data.filter(f => f.name.toLowerCase().endsWith('.pdf') && f.name !== GITHUB_CONFIG.answerKeyFileName);
            state.filteredFiles = [...state.allFiles];
            renderFileList();
        } catch (e) {
            document.getElementById('material-list').innerHTML = `<p class="text-[10px] text-red-500 p-10 text-center font-bold">SYNC ERROR</p>`;
        } finally { refreshIcon?.classList.remove('animate-spin'); }
    }

    function renderFileList() {
        const container = document.getElementById('material-list');
        if (state.filteredFiles.length === 0) {
            container.innerHTML = `<p class="text-center text-[10px] text-slate-400 py-10 font-bold uppercase tracking-widest">No Problem PDFs found.</p>`;
            return;
        }
        container.innerHTML = state.filteredFiles.map(file => `
            <button onclick="app.loadMaterial('${file.name}', '${file.download_url}')" id="btn-${file.name}" 
                class="file-btn w-full flex items-center p-2.5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-brand-500 transition-all text-left group">
                <i data-lucide="file-text" class="w-3.5 h-3.5 mr-2.5 text-slate-300 group-hover:text-brand-500"></i>
                <div class="flex-1 truncate font-bold text-[10px] text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white">${file.name}</div>
            </button>
        `).join('');
        lucide.createIcons();
    }

    // 3. Firestore 기록 불러오기
    function fetchMyRecords() {
        if(!state.user) return;
        const recordsRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'study_records');
        const q = query(recordsRef); // orderBy는 규칙에 따라 생략, JS 메모리에서 정렬
        
        onSnapshot(q, (snapshot) => {
            const records = [];
            snapshot.forEach(doc => records.push({ id: doc.id, ...doc.data() }));
            // 메모리 정렬 (최신순)
            records.sort((a, b) => b.timestamp - a.timestamp);
            state.myRecords = records;
            
            // 기존 주차 목록에 없는 주차가 DB에 있다면 추가
            records.forEach(r => { if(!state.weeks.includes(r.week)) state.weeks.push(r.week); });
            app.updateWeekDropdowns();
            app.renderRecords();
        }, (error) => { console.error("Records Error:", error); });
    }

    // 초기화
    signInAnonymously(auth).then((result) => { 
        state.user = result.user;
        scanGitHub(); 
        loadGlobalAnswerKey();
        fetchMyRecords();
        app.updateWeekDropdowns();
    });

    window.app = {
      setMode: (mode) => {
        state.mode = mode;
        ['tutor', 'omr', 'essay', 'records'].forEach(m => {
            const view = document.getElementById(`view-${m}`);
            const tab = document.getElementById(`tab-${m}`);
            if(view) view.classList.toggle('hidden', m !== mode);
            if(tab) {
                if(m === mode) { tab.classList.add('tab-active'); tab.classList.remove('text-slate-500', 'text-slate-400'); }
                else { tab.classList.remove('tab-active'); tab.classList.add('text-slate-400'); }
            }
        });
        
        // 주차 선택 바 보이기 (Tutor, Records 탭 제외)
        const weekBar = document.getElementById('week-selector-bar');
        if(mode === 'omr' || mode === 'essay') weekBar.classList.remove('hidden');
        else weekBar.classList.add('hidden');

        document.getElementById('ai-response-area').classList.add('hidden');
        lucide.createIcons();
      },

      toggleDarkMode: () => {
        const isDark = document.documentElement.classList.toggle('dark');
        document.getElementById('dark-mode-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
      },

      refreshFiles: () => scanGitHub(),
      filterFiles: () => {
        const q = document.getElementById('file-search').value.toLowerCase();
        state.filteredFiles = state.allFiles.filter(f => f.name.toLowerCase().includes(q));
        renderFileList();
      },

      // 뷰어 관련 (전체화면 기능)
      toggleFullScreen: () => {
        const viewer = document.getElementById('viewer-container');
        const icon = document.getElementById('fullscreen-icon');
        const text = document.getElementById('fullscreen-text');
        
        viewer.classList.toggle('viewer-fullscreen');
        if(viewer.classList.contains('viewer-fullscreen')) {
            icon.setAttribute('data-lucide', 'minimize');
            text.textContent = "원래대로";
        } else {
            icon.setAttribute('data-lucide', 'maximize');
            text.textContent = "크게 보기";
        }
        lucide.createIcons();
      },

      loadMaterial: async (name, url) => {
        if (state.isFetching) return;
        state.isFetching = true;
        
        document.querySelectorAll('.file-btn').forEach(b => b.classList.remove('border-brand-500', 'bg-brand-50/30'));
        const activeBtn = document.getElementById(`btn-${name}`);
        if(activeBtn) activeBtn.classList.add('border-brand-500', 'bg-brand-50/30');
        
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          const pdfBlob = new Blob([blob], { type: 'application/pdf' });
          const blobUrl = URL.createObjectURL(pdfBlob);
          
          const reader = new FileReader();
          reader.onloadend = () => {
            state.problemPdfData = reader.result.split(',')[1];
            state.currentFileName = name;
            
            document.getElementById('pdf-embed').src = blobUrl;
            document.getElementById('pdf-container').classList.remove('hidden');
            document.getElementById('viewer-placeholder').classList.add('hidden');
            
            document.getElementById('viewer-filename').textContent = name;
            document.getElementById('viewer-badge').classList.remove('hidden');
            
            showToast(`${name} 로드 완료`);
            state.isFetching = false;
          };
          reader.readAsDataURL(pdfBlob);
        } catch (e) { showToast("로드 실패", "error"); state.isFetching = false; }
      },

      // 주차(Week) 관리
      addWeek: () => {
          const newWeek = prompt("새로운 주차 이름을 입력하세요 (예: 2주차, 모의고사 1회)");
          if(newWeek && newWeek.trim() !== "" && !state.weeks.includes(newWeek.trim())) {
              state.weeks.push(newWeek.trim());
              app.updateWeekDropdowns();
              showToast(`'${newWeek.trim()}' 추가됨`, "success");
          }
      },
      updateWeekDropdowns: () => {
          const select = document.getElementById('week-select');
          const filter = document.getElementById('record-week-filter');
          if(!select || !filter) return;
          
          select.innerHTML = state.weeks.map(w => `<option value="${w}">${w}</option>`).join('');
          filter.innerHTML = `<option value="all">모든 주차 보기</option>` + state.weeks.map(w => `<option value="${w}">${w}</option>`).join('');
      },

      // 1. 단순 튜터 (기록 안 됨)
      askAITutor: async () => {
        const target = document.getElementById('ai-tutor-target').value.trim() || '교재 전체';
        const prompt = document.getElementById('ai-tutor-prompt').value.trim();
        if (!prompt) return showToast("내용을 입력하세요.", "error");

        const btn = document.getElementById('ai-tutor-btn');
        const icon = document.getElementById('ai-tutor-icon');
        app.processAIRequest(btn, icon, [
            { text: `[질문/답안]: ${prompt}` }
        ], "문학 강사입니다. 학습자의 질문에 답변하세요.", null); // 기록 저장 안 함
      },

      // 2. OMR 제출 및 채점
      submitOMR: async () => {
        const week = document.getElementById('week-select').value;
        const workName = document.getElementById('omr-work-name').value.trim();
        if(!workName) return showToast("작품명을 반드시 입력해주세요.", "error");

        const ans = [];
        for(let i=1; i<=10; i++) {
            const v = document.getElementById(`omr-${i}`).value.trim();
            if(v) ans.push(`Q${i}: ${v}`);
        }
        if(ans.length === 0) return showToast("최소 1개 이상의 답안을 입력하세요.", "error");

        const btn = document.getElementById('ai-omr-btn');
        const icon = document.getElementById('ai-omr-icon');
        
        // 채점 후 저장할 데이터 구성
        const recordData = {
            week: week,
            workName: workName,
            type: "OMR",
            userAnswers: ans,
            timestamp: Date.now()
        };

        const sysPrompt = "당신은 임용 국어 문학 강사입니다. 제공된 '정답 해설지(Answer Key)'를 반드시 참조하여 학생의 OMR 답안을 채점하세요. 정답과 해설지에 명시된 문학적 근거를 바탕으로 오답에 대한 설명을 제공하세요.";
        
        app.processAIRequest(btn, icon, [
            { text: `[채점 대상 작품]: ${workName}\n[학생 OMR 답안]:\n${ans.join('\n')}` }
        ], sysPrompt, recordData);
      },

      // 3. 서술형 제출 및 채점
      submitEssay: async () => {
        const week = document.getElementById('week-select').value;
        const workName = document.getElementById('essay-work-name').value.trim();
        if(!workName) return showToast("작품명을 반드시 입력해주세요.", "error");

        const ess = [];
        for(let i=1; i<=2; i++) {
            const n = document.getElementById(`essay-num-${i}`).value.trim();
            const a = document.getElementById(`essay-ans-${i}`).value.trim();
            if(a) ess.push(`[${n || i}번 문항] ${a}`);
        }
        if(ess.length === 0) return showToast("답안을 입력하세요.", "error");

        const btn = document.getElementById('ai-essay-btn');
        const icon = document.getElementById('ai-essay-icon');

        const recordData = {
            week: week,
            workName: workName,
            type: "Descriptive",
            userAnswers: ess,
            timestamp: Date.now()
        };

        const sysPrompt = "당신은 임용 국어 전문가입니다. 제공된 '정답 해설지'에 명시된 핵심 키워드를 기준으로 학생의 서술형 답안을 엄격히 채점하세요. 키워드 누락 여부와 논리적 구성을 평가하여 상세 피드백과 예상 점수를 제공하세요.";

        app.processAIRequest(btn, icon, [
            { text: `[채점 대상 작품]: ${workName}\n[학생 서술형 답안]:\n\n${ess.join('\n\n')}` }
        ], sysPrompt, recordData);
      },

      // 공통 AI 요청 처리 및 DB 저장
      processAIRequest: async (btn, icon, parts, sysMsg, recordData) => {
        const area = document.getElementById('ai-response-area');
        const cont = document.getElementById('ai-response-content');
        
        btn.disabled = true;
        if(icon) icon.classList.add('animate-spin-custom');
        area.classList.add('hidden');

        // 문제지 탑재
        if (state.problemPdfData) {
            parts.push({ inlineData: { mimeType: "application/pdf", data: state.problemPdfData } });
            parts[0].text += "\n\n(첨부 파일 1: 학생이 보고 있는 문제지)";
        }
        
        // 🌟 핵심: 글로벌 해설지 탑재
        if (state.answerKeyPdfData) {
            parts.push({ inlineData: { mimeType: "application/pdf", data: state.answerKeyPdfData } });
            parts[0].text += "\n\n(첨부 파일 2: 공식 정답 해설지. 채점 시 반드시 이 해설지의 내용을 우선적으로 따를 것.)";
        }

        try {
          const res = await app.callGemini(parts, sysMsg);
          cont.innerHTML = res.replace(/\n/g, "<br>");
          area.classList.remove('hidden');
          area.scrollIntoView({ behavior: 'smooth' });

          // 답안 제출인 경우 Firestore에 저장
          if(recordData && state.user) {
              recordData.aiFeedback = res;
              const recordsRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'study_records');
              await addDoc(recordsRef, recordData);
              showToast("답안이 안전하게 제출 및 기록되었습니다.", "success");
              
              // 제출 후 입력칸 초기화 (선택사항, 일단 유지)
          }

        } catch (e) { showToast("AI 통신 오류", "error"); } finally { 
            btn.disabled = false; 
            if(icon) icon.classList.remove('animate-spin-custom'); 
        }
      },

      callGemini: async (parts, system) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const res = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ contents: [{ parts }], systemInstruction: { parts: [{ text: system }] } }) 
        });
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "결과 생성 실패";
      },

      // 4. 나의 기록 렌더링
      renderRecords: () => {
          const container = document.getElementById('records-container');
          const filter = document.getElementById('record-week-filter').value;
          
          let filtered = state.myRecords;
          if(filter !== 'all') filtered = filtered.filter(r => r.week === filter);

          if(filtered.length === 0) {
              container.innerHTML = `<div class="text-center py-10 text-[11px] text-slate-400 font-bold uppercase tracking-widest">제출된 기록이 없습니다.</div>`;
              return;
          }

          container.innerHTML = filtered.map((r, i) => `
              <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm">
                  <!-- 요약 헤더 (클릭 시 펼치기) -->
                  <div onclick="document.getElementById('rec-detail-${i}').classList.toggle('hidden')" class="p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors flex items-center justify-between">
                      <div class="flex items-center space-x-3">
                          <span class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-[9px] font-black rounded uppercase">${r.week}</span>
                          <span class="text-[11px] font-black text-brand-600 dark:text-brand-400">${r.workName}</span>
                          <span class="text-[9px] font-bold text-slate-400 uppercase">${r.type}</span>
                      </div>
                      <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                  </div>
                  <!-- 상세 내용 -->
                  <div id="rec-detail-${i}" class="hidden border-t border-slate-100 dark:border-slate-800">
                      <div class="p-4 bg-slate-50 dark:bg-slate-950">
                          <p class="text-[9px] font-black text-slate-400 mb-2 uppercase tracking-widest">내 제출 답안</p>
                          <div class="text-[11px] font-bold text-slate-700 dark:text-slate-300 mb-4 whitespace-pre-wrap">${r.userAnswers.join('\n')}</div>
                          
                          <p class="text-[9px] font-black text-brand-500 mb-2 uppercase tracking-widest">AI 채점 결과 & 해설지 반영</p>
                          <div class="p-4 bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 text-[11px] leading-relaxed dark:text-slate-300 prose prose-sm prose-slate dark:prose-invert max-w-none">
                              ${r.aiFeedback.replace(/\n/g, '<br>')}
                          </div>
                      </div>
                  </div>
              </div>
          `).join('');
          lucide.createIcons();
      }
    };

  </script>
</body>
</html>
